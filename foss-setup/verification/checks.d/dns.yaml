# DNS resolution chain checks.
# Primary resolver: AdGuard Home on mini (192.168.10.2:53) -> unbound upstream (127.0.0.1:5335).
# Secondary resolver: AdGuard Home on NAS (192.168.10.4:53) — live since dns-02 closed;
# these checks guard against regression (the header's old "currently DOWN" era is over).
checks:
  - id: dns-mini-internal
    tier: fast
    name: "AdGuard (mini) resolves internal name home.tabaska.us"
    host: mini
    cmd: dig +short +time=3 +tries=1 @192.168.10.2 home.tabaska.us
    expect: '^192\.168\.10\.[0-9]+$'
    severity: crit
    task_id: dns-01
    runbook: wiki/runbooks/dns.md
    enabled: true

  - id: dns-mini-external
    tier: fast
    name: "AdGuard (mini) resolves external name example.com"
    host: mini
    cmd: dig +short +time=3 +tries=1 @192.168.10.2 example.com
    expect: '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+'
    severity: crit
    task_id: dns-01
    runbook: wiki/runbooks/dns.md
    enabled: true

  - id: dns-mini-unbound-upstream
    name: "unbound upstream on mini answers directly (127.0.0.1:5335)"
    host: mini
    cmd: dig +short +time=3 +tries=1 @127.0.0.1 -p 5335 example.com
    expect: '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+'
    severity: warn
    task_id: dns-01
    runbook: wiki/runbooks/dns.md
    enabled: true

  # The two checks below guard reopened task dns-02 (secondary resolver on the NAS).
  # They FAIL today (connection refused) — that is correct and desired until dns-02 is redone.
  - id: dns-nas-internal
    name: "Secondary resolver (NAS 192.168.10.4) resolves home.tabaska.us"
    host: mini
    # anchored: dig prints ";; communications error to 192.168.10.4#53" on stdout,
    # which a loose '192\.168\.10\.' regex would false-match
    cmd: dig +short +time=3 +tries=1 @192.168.10.4 home.tabaska.us
    expect: '^192\.168\.10\.[0-9]+$'
    severity: crit
    task_id: dns-02
    runbook: wiki/runbooks/dns.md
    enabled: true

  # 3 attempts: a single 3s UDP try false-failed the sweep twice on 2026-07-09
  # (one dropped packet / slow upstream cache-miss = crit page) while manual
  # 10/10 retests answered in 4ms. Retries page only on sustained failure.
  - id: dns-nas-external
    name: "Secondary resolver (NAS 192.168.10.4) resolves example.com"
    host: mini
    cmd: >-
      for i in 1 2 3; do
      dig +short +time=3 +tries=1 @192.168.10.4 example.com && break; sleep 2; done
    expect: '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+'
    severity: crit
    task_id: dns-02
    runbook: wiki/runbooks/dns.md
    enabled: true

  # ── fix-45 (L20 class) · docker embedded DNS actually resolving for containers ─
  # 2026-07-08/09: every container lookup on mini failed for ~14h ('127.0.0.11:53
  # server misbehaving') and nothing noticed — miniflux fetches died silently.
  # Host-level DNS checks can't see this layer; probe from INSIDE an always-on
  # container (healthchecks, a python app). Two attempts to ride out a blip.
  - id: mini-container-dns-egress
    name: "mini: containers can resolve external names via docker DNS"
    host: mini
    cmd: >-
      docker exec healthchecks python3 -c
      "import socket;print(socket.gethostbyname('api.github.com') and 'RESOLVES')"
      2>/dev/null
      || { sleep 5; docker exec healthchecks python3 -c
      "import socket;print(socket.gethostbyname('api.github.com') and 'RESOLVES')"
      2>&1 || echo DNS_DEAD; }
    expect: '^RESOLVES$'
    severity: warn
    task_id: fix-45
    runbook: wiki/docs/runbooks/fleet-hygiene.md
    enabled: true
