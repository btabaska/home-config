# Services on the NAS (Synology, NO sudo). HTTP probes run FROM mini (curl to nas),
# ssh checks use the mini->nas key (btabaska@nas, installed 2026-07-07).
# Expected codes captured live: plex 401 = up-but-unauthenticated (normal); *arr 302 = login redirect.
checks:
  - id: nas-ssh
    tier: fast
    name: "NAS reachable over SSH from mini"
    host: nas
    cmd: echo nas-ssh-ok
    expect: '^nas-ssh-ok$'
    severity: crit
    task_id: nas-01
    runbook: wiki/runbooks/nas.md
    enabled: true

  # observability hardening (2026-07-14): flaresolverr + rreading-glasses had
  # manifest+container coverage only — an "Up but the job is dead" state was
  # invisible, and both feed the arr search/metadata path (an "up but broken"
  # flaresolverr silently zeroes Prowlarr indexer results = the sonarr-no-grabs
  # class; a dead rreading-glasses is the libreseerr-edition / phantom-author
  # incident class). These probe the actual service, not just container presence.
  # Run on the NAS (localhost) since both bind internally for the arr network.
  - id: nas-flaresolverr
    name: "flaresolverr Cloudflare solver healthy (Prowlarr/arr search dependency)"
    host: nas
    cmd: curl -sm 8 http://localhost:8191/health
    expect: '"ok"'
    severity: warn
    task_id: nas-01
    runbook: wiki/runbooks/nas.md
    enabled: true

  - id: nas-rreading-glasses
    name: "rreading-glasses metadata provider serving on :8788 (readarr/libreseerr)"
    host: nas
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://localhost:8788/
    expect: '^200$'
    severity: warn
    task_id: nas-01
    runbook: wiki/runbooks/nas.md
    enabled: true

  - id: nas-immich
    tier: fast
    name: "immich API ping on nas:2283"
    host: mini
    cmd: curl -s -m 8 http://nas:2283/api/server/ping
    expect: 'pong'
    severity: crit
    task_id: nas-09
    runbook: wiki/runbooks/nas.md
    enabled: true

  - id: nas-plex
    tier: fast
    name: "plex answers on nas:32400 (401 unauthenticated = up)"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://nas:32400/
    expect: '^401$'
    severity: crit
    task_id: media-01
    runbook: wiki/runbooks/nas.md
    enabled: true

  - id: nas-cwa
    name: "calibre-web-automated answers on nas:8083"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://nas:8083/
    expect: '^302$'
    severity: warn
    task_id: ebook-04
    runbook: wiki/runbooks/nas.md
    enabled: true

  - id: nas-sonarr
    name: "sonarr answers on nas:8989"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://nas:8989/
    expect: '^302$'
    severity: warn
    task_id: media-02
    runbook: wiki/runbooks/nas.md
    enabled: true

  - id: nas-radarr
    name: "radarr answers on nas:7878"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://nas:7878/
    expect: '^302$'
    severity: warn
    task_id: media-02
    runbook: wiki/runbooks/nas.md
    enabled: true

  - id: nas-lidarr
    name: "lidarr answers on nas:8686"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://nas:8686/
    expect: '^302$'
    severity: warn
    task_id: media-03
    runbook: wiki/runbooks/nas.md
    enabled: true

  - id: nas-prowlarr
    name: "prowlarr answers on nas:9696"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://nas:9696/
    expect: '^302$'
    severity: warn
    task_id: media-02
    runbook: wiki/runbooks/nas.md
    enabled: true

  - id: nas-readarr
    name: "readarr answers on nas:8787"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://nas:8787/
    expect: '^302$'
    severity: warn
    task_id: ebook-02
    runbook: wiki/runbooks/nas.md
    enabled: true

  # observability hardening (2026-07-14): stash had container coverage only. This
  # GraphQL version query proves the app + DB handshake (a static 200 could hide a
  # wedged backend). :9999 is published on the NAS host so mini can reach it.
  - id: stash-serving
    name: "stash answers its GraphQL version query (:9999)"
    host: mini
    cmd: >-
      curl -s -m 8 -X POST http://nas:9999/graphql -H 'Content-Type: application/json'
      -d '{"query":"{version{version}}"}'
    expect: '"version":"v[0-9]'
    severity: warn
    task_id: nas-01
    runbook: wiki/runbooks/nas.md
    enabled: true
