  # shape as nas-readarr); the full books-check migration is bmig-06.
  - id: nas-bookshelf
    name: "bookshelf answers on nas:8790"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://nas:8790/
    expect: '^302$'
    severity: warn
    task_id: bmig-02
    runbook: wiki/runbooks/nas.md
    enabled: true

  # observability hardening (2026-07-14): stash had container coverage only. This
  # GraphQL version query proves the app + DB handshake (a static 200 could hide a
  # wedged backend). :9999 is published on the NAS host so mini can reach it.
  - id: stash-serving
    name: "stash answers its GraphQL version query (:9999)"
    host: mini
    cmd: >-
      curl -s -m 8 -X POST http://nas:9999/graphql -H 'Content-Type: application/json'
      -d '{"query":"{version{version}}"}'
    expect: '"version":"v[0-9]'
    severity: warn
    task_id: nas-01
    runbook: wiki/runbooks/nas.md
    enabled: true

  # beets = the YouTube-audio tagging layer (nas-30): MeTube writes audio to
  # /music/YouTube, beets tags strong MusicBrainz matches in place (fromfilename),
  # skips weak ones. NOT redundant with Lidarr (Lidarr writeAudioTags=sync handles
  # its own imports; beets only touches the non-Lidarr YouTube path). Two signals:
  # the always-on beet-web container serves :8337, and the daily import must run.
  - id: nas-beets
    name: "beets youtube-tagging web UI serving on :8337"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://nas:8337/
    expect: '^200$'
    severity: warn
    task_id: nas-30
    runbook: wiki/runbooks/nas.md
    enabled: true

  - id: nas-beets-ingest-fresh
    name: "beets youtube-ingest tagging ran recently (import.log < 30h)"
    host: nas
    cmd: >-
      find /volume1/docker/beets/import.log -mmin -1800 2>/dev/null
      | grep -q . && echo ingest=fresh || echo ingest=STALE
    expect: '^ingest=fresh$'
    severity: warn
    task_id: nas-30
    runbook: wiki/runbooks/nas.md
    enabled: true

  # seed-13 (2026-07-14): Whisparr v2 adult-scene automation feeds the Stash
  # library. /ping is unauthenticated and returns {"status":"OK"} only when the
  # app + its DB are actually serving (a wedged backend fails this), so it beats
  # bare container-liveness for the "up but broken" class shared by the other *arrs.
  - id: nas-whisparr
    name: "whisparr answers its /ping (adult automation :6969, seed-13)"
    host: mini
    cmd: curl -s -m 8 http://nas:6969/ping
    expect: '"status":\s*"OK"'
    severity: warn
    task_id: seed-13
    runbook: wiki/runbooks/nas.md
    enabled: true

  # ---------------------------------------------------------------------------
  # IMMICH content checks (fix-35, 2026-07-18). The 2026-07-16 audit found the
  # flagship monitoring-vs-reality gap: every Immich probe (ping/version/dump
  # dead-man) was green for 14 days around a library with ZERO assets — the
  # mobile app was never paired, so the service's entire purpose (phone photo
  # backup) never happened (H17/H28). These two checks probe the CONTENT, not
  # the process. Both are expected to FAIL until a phone pairs — that alert is
  # the operator's standing reminder (decision 2026-07-18: prep now, pair later).
  # Auth: 'verification-monitor' API key (vault immich.verify_api_key), scoped
  # to server.statistics only, deployed as IMMICH_API_KEY in /etc/verification/env.
  # ---------------------------------------------------------------------------

  # REGRESSION (H17): photos actually exist AND landed recently, agreed by BOTH
  # the API (DB truth via admin statistics) and the filesystem (originals on
  # disk under /volume1/photo, world-readable). Catches never-flowed (now) and
  # stopped-flowing (later) with one invariant: fresh content within 7 days.
  - id: nas-immich-backup-freshness
    name: "immich library has assets and a file landed in the last 7 days (phone backup flowing)"
    host: mini
    cmd: >-
      t=$(curl -sm 10 -H "x-api-key: $IMMICH_API_KEY" "$IMMICH_URL/api/server/statistics"
      | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d["photos"]+d["videos"])'
      2>/dev/null || echo api_err);
      f=$(ssh -o BatchMode=yes -o ConnectTimeout=10 nas
      "find /volume1/photo/upload /volume1/photo/library -type f -not -name .immich -mtime -7 2>/dev/null | head -1" 2>/dev/null);
      [ "$t" != api_err ] && [ "$t" -gt 0 ] && [ -n "$f" ]
      && echo backup=fresh || echo "backup=STALE assets=$t fresh_file=${f:-none}"
    expect: '^backup=fresh$'
    severity: warn
    task_id: fix-35
    runbook: wiki/runbooks/photos.md
    enabled: true

  # CLASS (H28 root cause): a mobile client is actually paired — at least one
  # iOS/Android session row exists. Guards the whole "server green but no
  # consumer ever connected" class: never-paired (the audit state), all-devices
  # revoked after a reset, or a family member's account (kaelyn92) that never
  # completed setup. DB truth via the established nas-sudo psql idiom.
  - id: nas-immich-mobile-paired
    name: "immich has at least one mobile (iOS/Android) session paired"
    host: mini
    cmd: >-
      n=$(printf '%s\n' "$NAS_SUDO_PASSWORD"
      | ssh -o BatchMode=yes -o ConnectTimeout=10 nas
      "sudo -S -p '' /usr/local/bin/docker exec immich_postgres psql -U postgres -d immich
      -tAc \"SELECT count(*) FROM session WHERE \\\"deviceOS\\\" ILIKE '%ios%' OR \\\"deviceOS\\\" ILIKE '%android%'\""
      2>/dev/null); [ -n "$n" ] && [ "$n" -gt 0 ]
      && echo paired=yes || echo "paired=NO mobile_sessions=${n:-query_failed}"
    expect: '^paired=yes$'
    severity: warn
    task_id: fix-35
    runbook: wiki/runbooks/photos.md
    enabled: true
