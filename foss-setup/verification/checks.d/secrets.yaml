# Secrets & filesystem-permission hygiene — fix-23 (quality-gate M7/M26/M43/M44/M45,
# resolved 2026-07-17). The incident class: plaintext credentials sitting world-readable
# (health.env 0777 with an ntfy token — a token that was ADMIN-scoped, read-write to all
# topics — plus broad 0777 across /volume1/docker), and live credentials existing only on
# host filesystems while the handoff vault said ''. The vault-side class check is
# scripts/secrets/vault-lint.py, which runs on the macbook (the vault never leaves it)
# and is wired into publish-deploy.sh; these checks cover the host-side class.
checks:
  # fix-23 regression (M7): the exact file that leaked. Ownership root:root mode 600 —
  # the consumer (nas-docker-health.sh) runs as root from a DSM scheduled task, so
  # nothing but root needs to read it. stat works unprivileged (needs only dir x).
  - id: nas-health-env-perms
    name: "health.env is root:root 600 (was 0777 with a live ntfy admin token)"
    host: nas
    cmd: stat -c '%a %U:%G' /volume1/scripts/nas/health.env
    expect: '^600 root:root$'
    severity: crit
    task_id: fix-23
    runbook: wiki/runbooks/secrets-hygiene.md
    enabled: true

  # fix-23 class check (M7): no credential-bearing file under /volume1/docker may be
  # group- or world-readable. Catches the drift path that created M7: DSM share ACLs
  # default new files to 0777, and app upgrades rewrite config.xml — so a green result
  # today can regress on the next container update. btabaska owns the app dirs, so an
  # unprivileged find sees them all; DSM-internal dirs are excluded.
  - id: nas-secret-file-perms
    name: "no group/world-readable .env|config.ini|config.xml under /volume1/docker"
    host: nas
    cmd: sh -c 'find /volume1/docker \( -name @eaDir -o -name "#recycle" \) -prune -o -type f \( -name "*.env" -o -name ".env" -o -name "config.ini" -o -name "config.xml" \) -perm /0044 -print 2>/dev/null | wc -l'
    expect: '^0$'
    severity: crit
    task_id: fix-23
    runbook: wiki/runbooks/secrets-hygiene.md
    enabled: true

  # fix-23 class check (M7 broad): nothing world-writable anywhere under the docker
  # tree or /volume1/scripts (the audit found near-everything 0777). World-write is how a
  # compromised low-priv container tampers with a neighbour's config.
  - id: nas-worldwritable-sweep
    name: "no world-writable files under /volume1/docker or /volume1/scripts"
    host: nas
    cmd: sh -c 'find /volume1/docker /volume1/scripts \( -name @eaDir -o -name "#recycle" \) -prune -o ! -type l -perm -0002 -print 2>/dev/null | wc -l'
    expect: '^0$'
    severity: warn
    task_id: fix-23
    runbook: wiki/runbooks/secrets-hygiene.md
    enabled: true

  # fix-23 class check (token-leak blast radius): the leaked nas-health token was
  # printed into a committed audit doc; it is revoked, but the guarantee that makes a
  # future leak survivable is NTFY_AUTH_DEFAULT_ACCESS=deny-all — anonymous publish to
  # the alert topic must stay 403 so alerts can't be spoofed/flooded without a token.
  - id: ntfy-anon-publish-denied
    name: "ntfy denies anonymous publish to homelab-alerts (deny-all intact)"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' -X POST -d probe https://ntfy.tabaska.us/homelab-alerts
    expect: '^403$'
    severity: crit
    task_id: fix-23
    runbook: wiki/runbooks/secrets-hygiene.md
    enabled: true
