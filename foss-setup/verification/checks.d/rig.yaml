# rig (CachyOS gaming/AI box, 3090 Ti 24GB).
# 24/7 host (decision 2026-07-08): the rig now runs continuously, so these
# checks are enabled and a rig that is down/unreachable is an INCIDENT.
# These are HTTP probes (host: url, curl from mini) BY DESIGN — they test the
# actual service endpoints clients reach over the tailnet. (mini->rig SSH works
# now; the old "blocked by tailnet ACL" note was stale as of 2026-07-09 — that
# ACL rule only ever blocked mini->seedbox, a different node.) The container->
# host Ollama hop, which HTTP-from-mini can't see, is covered separately by the
# rig-local ai-stack-watchdog.timer.
# Recovery if the rig is down: wakeonlan -i 192.168.10.255 50:eb:f6:b5:82:c6
# (llm-triage.sh attempts this automatically as the recovery path).
checks:
  # ai-01 (2026-07-15): ollama on :11434 is now a COMPAT SHIM — it serves only
  # llama3.2:3b (HA Assist), tag:fast (Obsidian AI Tagger) and nomic-embed-text
  # (Obsidian Smart Connections). All big models moved to llama-swap/llama.cpp
  # (:9292, in-compose). Do NOT re-pull big models into ollama.
  - id: rig-ollama
    name: "ollama SHIM answers on rig:11434 (HA Assist + Obsidian compat)"
    host: url
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://cachyos.tailb31641.ts.net:11434/api/tags
    expect: '^200$'
    severity: warn
    task_id: ai-01
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident

  - id: rig-litellm
    name: "litellm proxy answers on rig:4000 (401 without key = up)"
    host: url
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://cachyos.tailb31641.ts.net:4000/v1/models
    expect: '^(200|401)$'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident

  - id: rig-open-webui
    name: "open-webui answers on rig:3000"
    host: url
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://cachyos.tailb31641.ts.net:3000/
    expect: '^200$'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident

  # ai-01: the shim must keep HA Assist's model. (The old expect qwen3-coder:30b
  # is obsolete — big models were trimmed from ollama 2026-07-15; llm-triage now
  # rides llama-swap :9292 instead.)
  - id: rig-ollama-models
    name: "ollama shim holds HA Assist's model (llama3.2:3b)"
    host: url
    cmd: curl -s -m 8 http://cachyos.tailb31641.ts.net:11434/api/tags
    expect: 'llama3.2:3b'
    severity: warn
    task_id: ai-01
    runbook: wiki/runbooks/rig.md
    enabled: true    # HA Assist voice LLM depends on this exact model

  # ---- ai-01 llama.cpp stack (llama-swap + llama-server, replaces ollama) ----
  # llama-swap swaps one big model at a time on demand (group "big"), keeps the
  # 262MB embedder persistent, unloads after ttl idle, and force-unloads on an
  # Apollo session start (gpu-yield hook). Config: local-ai-tooling
  # docker/llama-swap-config.yaml; UI: http://rig:9292/ui
  - id: rig-llama-swap
    tier: fast
    name: "llama-swap model server healthy on rig:9292"
    host: url
    cmd: curl -s -m 8 http://cachyos.tailb31641.ts.net:9292/health
    expect: '^OK$'
    severity: warn
    task_id: ai-01
    runbook: wiki/runbooks/rig.md
    enabled: true

  - id: rig-llama-swap-models
    name: "llama-swap serves the coder lineup (bake-off winner + embedder)"
    host: url
    cmd: curl -s -m 8 http://cachyos.tailb31641.ts.net:9292/v1/models
    expect: '(?s)qwen3.6-35b-a3b.*qwen3-embed|qwen3-embed.*qwen3.6-35b-a3b'
    severity: warn
    task_id: ai-01
    runbook: wiki/runbooks/rig.md
    enabled: true

  # 2026-07-18: three creative/RP models added (cydonia, dolphin-venice, goetia —
  # Mistral-Small-24B Q5_K_M, Tekken template). This asserts all three stay
  # CONFIGURED in llama-swap (order-independent lookaheads), catching a dropped
  # entry / reverted config. Cheap by design — lists config, does NOT load a
  # model; per the established pattern, big-model generation stays out of the
  # recurring loop (validated end-to-end once at deploy via LiteLLM `cydonia`).
  - id: rig-llama-swap-creative
    name: "llama-swap serves the creative/RP lineup (cydonia + dolphin-venice + goetia)"
    host: url
    cmd: curl -s -m 8 http://cachyos.tailb31641.ts.net:9292/v1/models
    expect: '(?s)(?=.*cydonia-24b)(?=.*dolphin-venice-24b)(?=.*goetia-24b)'
    severity: warn
    task_id: ai-01
    runbook: wiki/runbooks/rig.md
    enabled: true

  # ai-01 GPU-yield behavioral check: a model loads ON DEMAND, answers, then
  # the admin unload frees VRAM (measured 182ms; gaming gets the full card).
  # Uses the tiny fast-3b (2.8GB, ~2s cold) to keep GPU cost negligible. The
  # unload-all is safe: anything in use reloads on the next request. Can flap
  # during sustained bulk embedding (first wiki-RAG sync class) — that state
  # is rare; budgets are sized for normal contention.
  - id: rig-ai-gpu-yield
    name: "llama-swap loads on demand + VRAM frees on unload (gaming yield)"
    host: rig
    cmd: >-
      curl -sm 90 http://localhost:9292/v1/chat/completions
      -H 'Content-Type: application/json'
      -d '{"model":"fast-3b","messages":[{"role":"user","content":"Say OK"}],"max_tokens":5}'
      | grep -q '"content"' &&
      { curl -sm 30 -X POST http://localhost:9292/api/models/unload -o /dev/null || true; } &&
      sleep 3 &&
      v=$(nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits) &&
      { [ "$v" -lt 3000 ] && echo "YIELD_OK vram=${v}MiB" || echo "YIELD_FAIL vram=${v}MiB"; }
    expect: 'YIELD_OK'
    severity: warn
    task_id: ai-01
    runbook: wiki/runbooks/rig.md
    enabled: true

  # ai-01 ops pillar: fleet-mcp serves the read-only fleet tools for ollmcp,
  # OWUI (via mcpo) and ops_probe. HTTP 406 on a bare GET = transport alive
  # (streamable-http wants proper Accept headers).
  - id: rig-fleet-mcp
    name: "fleet-mcp ops tool server active on rig:8765"
    host: rig
    cmd: >-
      echo "svc=$(systemctl is-active fleet-mcp)
      http=$(curl -sm 5 -o /dev/null -w '%{http_code}' http://localhost:8765/mcp)"
    expect: 'svc=active http=406'
    severity: warn
    task_id: ai-01
    runbook: wiki/runbooks/rig.md
    enabled: true

  # ai-01: mcpo must actually EXPOSE the fleet tools (an "Up but bridge broken"
  # state — e.g. the UFW docker->host regression — leaves /fleet/docs 200 with
  # an EMPTY tool list; this checks a real tool route exists).
  - id: rig-mcpo-fleet-tools
    name: "mcpo bridges the fleet ops tools to OWUI (gpu_status route present)"
    host: url
    cmd: curl -s -m 8 http://cachyos.tailb31641.ts.net:8000/fleet/openapi.json
    expect: 'gpu_status'
    severity: warn
    task_id: ai-01
    runbook: wiki/runbooks/rig.md
    enabled: true

  # ai-01 ops-agent liveness: one bounded agentic loop — LLM (LiteLLM `coder`)
  # picks a fleet tool, calls it, answers. Proves the whole ops chain:
  # litellm -> llama-swap -> model -> fleet-mcp tools. ~10-40s on GPU.
  - id: rig-ops-agent-e2e
    name: "ops agent answers a canned question via fleet tools (bounded loop)"
    host: rig
    cmd: >-
      set -a && . ~/.config/fleet-mcp/env && set +a &&
      timeout 180 /opt/llm/fleet-venv/bin/python
      ~/Documents/GitHub/local-ai-tooling/ops/ops_probe.py
      --quiet --max-turns 4
      "Use the gpu_status tool and report how much VRAM is used right now."
    expect: '(?i)(vram|mib|gpu)'
    severity: warn
    task_id: ai-01
    runbook: wiki/runbooks/rig.md
    enabled: true

  # game-13 GPU-contention policy: the single 3090 Ti is shared by the Apollo
  # stream, the game servers, and Ollama inference. OLLAMA_KEEP_ALIVE=0 makes
  # each model unload immediately after its request so VRAM frees between
  # requests (validated 2026-07-14: llama3.2:3b loaded to ~5 GB during a request,
  # back to the 724 MiB baseline within 1s). This SSH check guards against the
  # setting silently reverting — e.g. re-running an old 01-ollama-tune.sh, or a
  # hand-edit without a daemon-reload (systemctl show reflects the merged drop-in
  # config, so it also catches "edited the file but forgot to reload"). Source of
  # truth: local-ai-tooling scripts/01-ollama-tune.sh (separate repo, NOT this
  # one). host: rig => the mini runner SSHes to the rig (mini->rig SSH confirmed
  # working 2026-07-09); the lookahead rejects any nonzero value — 0m/0s/-1/00
  # and fractional 0.5 (the '.' in the class stops =0 matching the '0' of =0.5).
  - id: rig-ollama-keepalive
    name: "ollama KEEP_ALIVE=0 on rig (VRAM frees after each request — GPU contention)"
    host: rig
    cmd: systemctl show ollama -p Environment
    expect: 'OLLAMA_KEEP_ALIVE=0(?![.0-9a-zA-Z])'
    severity: warn
    task_id: game-13
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — a reverted keep-alive contends VRAM with gaming/streaming

  # game-09 idle-power baseline (rig is 24/7): the GPU power-limit + persistence
  # tune (gpu-power-tune.service, from game-10) must stay applied so the card sits
  # at its ~17W idle floor instead of a higher P-state, and persistence-mode keeps
  # the driver resident (avoids re-init power spikes). A kernel/driver update or a
  # failed oneshot can silently drop either. Guards the config, not a wall reading
  # (the <100W wall-draw verify still needs a smart plug — pending). CPU governor is
  # left to the OS (intel_pstate powersave default) and not asserted here since it
  # may be raised intentionally under load.
  - id: rig-gpu-power-tune
    name: "rig GPU power-tune applied (persistence on + gpu-power-tune.service active)"
    host: rig
    cmd: >-
      echo "svc=$(systemctl is-active gpu-power-tune.service)
      persist=$(nvidia-smi --query-gpu=persistence_mode --format=csv,noheader | tr -d ' ')"
    expect: 'svc=active persist=Enabled'
    severity: warn
    task_id: game-09
    runbook: wiki/runbooks/rig.md
    enabled: true

  # media-06: the rig's ~/Music is an ALAC-only derived mirror (FLAC lives on the
  # NAS master; nas-music-mirror.service transcodes FLAC->.m4a and copies mp3/aac
  # verbatim). A FLAC file appearing here means the retired verbatim-rsync mirror
  # (music-mirror.service, --delete-after) came back or something copied lossless
  # onto the rig — which also creates flac/m4a duplicates. 0 is the invariant.
  - id: rig-music-no-flac
    name: "rig ~/Music holds no FLAC (ALAC-only mirror, no dupes — media-06)"
    host: rig
    cmd: find /home/btabaska/Music -type f -iname '*.flac' 2>/dev/null | wc -l | tr -d ' '
    expect: '^0$'
    severity: warn
    task_id: media-06
    runbook: wiki/runbooks/rig.md
    enabled: true

  # observability-audit (2026-07-14): palworld was the #1 blind spot — a 24/7
  # player-facing server with ZERO checks, so a player noticed an outage before we
  # did. Its REST API on :8212 is tailnet-reachable and probeable. This asserts the
  # game LOOP is alive (serverfps present in /v1/api/metrics), catching a crashed or
  # hung server, not just a missing container. (Palworld's public UDP path through
  # playit stays unprobeable — a full playit-edge flap still surfaces via the
  # playit-java/bedrock-public checks below.) Needs PALWORLD_ADMIN_PASSWORD in
  # /etc/verification/env (vault palworld.admin_password).
  - id: palworld-rest-liveness
    tier: fast
    name: "palworld game server alive (REST :8212 reports serverfps)"
    host: url
    cmd: >-
      curl -sm 8 -u "admin:$PALWORLD_ADMIN_PASSWORD"
      http://cachyos.tailb31641.ts.net:8212/v1/api/metrics
    expect: '"serverfps":'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true

  # Public game paths through the playit edge (dedicated IP). Real protocol
  # pings, NOT port probes: when the agent's claim leg wedges (seen live
  # 2026-07-09, TCP variant of the known UDP claim gotcha), the agent logs
  # "connected; tunnels loaded", the edge still ACCEPTS bare TCP connects,
  # and only a data-carrying protocol exchange fails. Fix = restart the
  # playit container on the rig. host: url puts these in the hourly quick tier.
  # 4 tries, pass on first success: 2026-07-09 playit's claim leg dropped ~50%
  # of connections (upstream — our WAN was 0% loss, playit status page green).
  # Retries page only on HARD outage (e.g. wedged claims = 100% fail); partial
  # degradation shows in the output ("try N") without hourly alert flapping.
  - id: playit-java-public
    tier: fast
    name: "Minecraft Java public path (playit edge 69.9.181.17:1105, real status ping)"
    host: url
    cmd: >-
      for i in 1 2 3 4; do
      python3 /opt/verification/bin/mc-status-ping.py 69.9.181.17 1105 minecraft.tabaska.us
      && { echo "pass on try $i/4"; break; }; sleep 3; done
    expect: '"version"'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true

  - id: playit-bedrock-public
    tier: fast
    name: "Minecraft Bedrock public path (playit edge 69.9.181.17:1111, RakNet ping)"
    host: url
    cmd: >-
      for i in 1 2 3 4; do
      python3 /opt/verification/bin/mc-bedrock-ping.py 69.9.181.17 1111
      && { echo "pass on try $i/4"; break; }; sleep 3; done
    expect: "version"
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true

  # 2026-07-09 regression: rig UFW hardening (LAN+tailnet scoping) silently blocked
  # docker containers -> host ollama (172.x hits INPUT chain, no rule matched), so
  # ai.tabaska.us showed "no models" while every port probe above stayed green.
  # This end-to-end completion exercises open-webui/litellm's actual path to ollama.
  # Needs LITELLM_MASTER_KEY in /etc/verification/env (vault: litellm.master_key).
  # NUM_PARALLEL=1: if a big model is mid-generation the request queues and can blow
  # the 50s budget — one isolated failure = retry before treating it as an outage.
  # observability hardening (2026-07-14): mcpo (the MCP tool host that Open WebUI
  # calls for tools) had manifest+container-health coverage only — an "Up but the
  # tool server is broken" state was invisible. This probes its OpenAPI surface.
  - id: rig-mcpo
    name: "mcpo tool host serving on rig:8000 (OWUI tools)"
    host: url
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://cachyos.tailb31641.ts.net:8000/docs
    expect: '^200$'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true

  # ai-01 (2026-07-15): this now exercises litellm -> llama-swap -> llama-server
  # (`utility` alias = fast-3b on llama.cpp), container-to-container in compose.
  # It doubles as the canned-completion LATENCY budget: -m 50 fails a stack that
  # answers slower than 50s cold (measured: 1.3-11s incl. model load).
  - id: rig-ai-e2e
    name: "litellm end-to-end completion (gateway -> llama-swap -> model)"
    host: url
    cmd: >-
      curl -s -m 50 -H "Authorization: Bearer $LITELLM_MASTER_KEY"
      -H "Content-Type: application/json"
      -d '{"model":"utility","messages":[{"role":"user","content":"Say OK"}],"max_tokens":5}'
      http://cachyos.tailb31641.ts.net:4000/v1/chat/completions
    expect: '"finish_reason"'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident

  # 2026-07-16 incident: the btrfs-recovery reinstall dropped the (live-only,
  # never-codified) suspend mask, and KDE powerdevil idle-suspended the 24/7 rig
  # three times in one day — palworld/minecraft/playit/AI all dark until someone
  # walked into the office. Desired state now lives in ansible roles/base (masks
  # sleep/suspend/hibernate/hybrid-sleep fleet-wide); this guards against the
  # same silent revert class (rebuild, recovery, or a helpful GUI toggle).
  - id: rig-suspend-masked
    tier: fast
    name: "rig systemd sleep targets masked (24/7 box must never suspend)"
    host: rig
    cmd: systemctl is-enabled sleep.target suspend.target hibernate.target hybrid-sleep.target | sort -u | tr '\n' ' '
    expect: '^masked\s*$'
    severity: crit
    task_id: game-08
    runbook: wiki/runbooks/rig.md
    enabled: true

  # ==== fix-20 (2026-07-16 incident): rig root btrfs went READ-ONLY ====
  # C1/C2/C3: a 'corrupt leaf' on the marginal OS NVMe (WDS200T3X0C @ PCIe 74:00.0)
  # forced the root btrfs read-only at 22:49 EDT 2026-07-15. The cascade (restic,
  # ansible-pull, palworld, litellm-db segfault, OWUI write-death) ran for ~12h
  # while EVERY liveness/HTTP probe stayed green and `docker ps` falsely reported
  # dead containers "Up (healthy)" — the daemon couldn't persist state on the RO
  # disk. The missing signal was a CONSUMER-level "can the host actually WRITE?"
  # probe. This is that regression check: a real write to the /@home subvol plus
  # the mount flags of / and /home. crit + fast tier so a forced-ro remount
  # (btrfs error, ENOSPC, dying disk) pages within ~10 min instead of ~12h.
  # Runbook: recovery = salvage-readable → offline `btrfs check --repair` from USB
  # → reseat the marginal NVMe. See runbooks/rig-btrfs-readonly-recovery.
  - id: rig-root-fs-writable
    tier: fast
    name: "rig root + /home are READ-WRITE (real write probe — catches silent RO remount)"
    host: rig
    cmd: >-
      p="/home/btabaska/.verify-rw-probe";
      if ( : > "$p" ) 2>/dev/null; then rm -f "$p"; w=OK; else w=FAIL; fi;
      echo "write=$w root=$(findmnt -no OPTIONS / | cut -d, -f1) home=$(findmnt -no OPTIONS /home | cut -d, -f1)"
    expect: 'write=OK root=rw home=rw'
    severity: crit
    task_id: fix-20
    runbook: wiki/docs/runbooks/rig-btrfs-readonly-recovery.md
    enabled: true

  # fix-20 / M57 / H25 / H26: during the RO incident litellm-db segfaulted (exit
  # 139) and LiteLLM returned 503 no_db_connection to EVERY virtual-key client —
  # yet the master-key liveness probes (rig-ai-e2e above, /health/liveliness) kept
  # answering 200, so all dashboards showed the stack "up". This CLASS check closes
  # that liveness-masks-correctness gap: it exercises the DB-backed auth path with
  # a real VIRTUAL key, so a dead or corrupt litellm-db — invisible to master-key
  # probes — is caught at the consumer end. Needs LITELLM_VKEY in the mini
  # /etc/verification/env (vault ai_stack.litellm_ops_agent_key). The master-key
  # rig-ai-e2e above stays as the pure gateway/model liveness probe; this one is
  # the correctness probe. host: url runs it from the mini with that env.
  - id: rig-litellm-vkey-e2e
    name: "litellm answers a VIRTUAL-key completion (DB-auth path — catches litellm-db down that master-key probes miss)"
    host: url
    cmd: >-
      curl -s -m 50 -H "Authorization: Bearer $LITELLM_VKEY"
      -H "Content-Type: application/json"
      -d '{"model":"utility","messages":[{"role":"user","content":"Say OK"}],"max_tokens":5}'
      http://cachyos.tailb31641.ts.net:4000/v1/chat/completions
    expect: '"finish_reason"'
    severity: warn
    task_id: fix-20
    runbook: wiki/docs/runbooks/rig-btrfs-readonly-recovery.md
    enabled: true
