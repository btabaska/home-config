# rig (CachyOS gaming/AI box, 3090 Ti 24GB).
# 24/7 host (decision 2026-07-08): the rig now runs continuously, so these
# checks are enabled and a rig that is down/unreachable is an INCIDENT.
# These are HTTP probes (host: url, curl from mini) BY DESIGN — they test the
# actual service endpoints clients reach over the tailnet. (mini->rig SSH works
# now; the old "blocked by tailnet ACL" note was stale as of 2026-07-09 — that
# ACL rule only ever blocked mini->seedbox, a different node.) The container->
# host Ollama hop, which HTTP-from-mini can't see, is covered separately by the
# rig-local ai-stack-watchdog.timer.
# Recovery if the rig is down: wakeonlan -i 192.168.10.255 50:eb:f6:b5:82:c6
# (llm-triage.sh attempts this automatically as the recovery path).
checks:
  - id: rig-ollama
    name: "ollama API answers on rig:11434"
    host: url
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://cachyos.tailb31641.ts.net:11434/api/tags
    expect: '^200$'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident

  - id: rig-litellm
    name: "litellm proxy answers on rig:4000 (401 without key = up)"
    host: url
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://cachyos.tailb31641.ts.net:4000/v1/models
    expect: '^(200|401)$'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident

  - id: rig-open-webui
    name: "open-webui answers on rig:3000"
    host: url
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://cachyos.tailb31641.ts.net:3000/
    expect: '^200$'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident

  - id: rig-ollama-models
    name: "ollama has the triage model pulled (qwen3-coder:30b)"
    host: url
    cmd: curl -s -m 8 http://cachyos.tailb31641.ts.net:11434/api/tags
    expect: 'qwen3-coder:30b'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident

  # game-13 GPU-contention policy: the single 3090 Ti is shared by the Apollo
  # stream, the game servers, and Ollama inference. OLLAMA_KEEP_ALIVE=0 makes
  # each model unload immediately after its request so VRAM frees between
  # requests (validated 2026-07-14: llama3.2:3b loaded to ~5 GB during a request,
  # back to the 724 MiB baseline within 1s). This SSH check guards against the
  # setting silently reverting — e.g. re-running an old 01-ollama-tune.sh, or a
  # hand-edit without a daemon-reload (systemctl show reflects the merged drop-in
  # config, so it also catches "edited the file but forgot to reload"). Source of
  # truth: local-ai-tooling scripts/01-ollama-tune.sh (separate repo, NOT this
  # one). host: rig => the mini runner SSHes to the rig (mini->rig SSH confirmed
  # working 2026-07-09); the lookahead rejects any nonzero value — 0m/0s/-1/00
  # and fractional 0.5 (the '.' in the class stops =0 matching the '0' of =0.5).
  - id: rig-ollama-keepalive
    name: "ollama KEEP_ALIVE=0 on rig (VRAM frees after each request — GPU contention)"
    host: rig
    cmd: systemctl show ollama -p Environment
    expect: 'OLLAMA_KEEP_ALIVE=0(?![.0-9a-zA-Z])'
    severity: warn
    task_id: game-13
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — a reverted keep-alive contends VRAM with gaming/streaming

  # Public game paths through the playit edge (dedicated IP). Real protocol
  # pings, NOT port probes: when the agent's claim leg wedges (seen live
  # 2026-07-09, TCP variant of the known UDP claim gotcha), the agent logs
  # "connected; tunnels loaded", the edge still ACCEPTS bare TCP connects,
  # and only a data-carrying protocol exchange fails. Fix = restart the
  # playit container on the rig. host: url puts these in the hourly quick tier.
  # 4 tries, pass on first success: 2026-07-09 playit's claim leg dropped ~50%
  # of connections (upstream — our WAN was 0% loss, playit status page green).
  # Retries page only on HARD outage (e.g. wedged claims = 100% fail); partial
  # degradation shows in the output ("try N") without hourly alert flapping.
  - id: playit-java-public
    name: "Minecraft Java public path (playit edge 69.9.181.17:1105, real status ping)"
    host: url
    cmd: >-
      for i in 1 2 3 4; do
      python3 /opt/verification/bin/mc-status-ping.py 69.9.181.17 1105 minecraft.tabaska.us
      && { echo "pass on try $i/4"; break; }; sleep 3; done
    expect: '"version"'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true

  - id: playit-bedrock-public
    name: "Minecraft Bedrock public path (playit edge 69.9.181.17:1111, RakNet ping)"
    host: url
    cmd: >-
      for i in 1 2 3 4; do
      python3 /opt/verification/bin/mc-bedrock-ping.py 69.9.181.17 1111
      && { echo "pass on try $i/4"; break; }; sleep 3; done
    expect: "version"
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true

  # 2026-07-09 regression: rig UFW hardening (LAN+tailnet scoping) silently blocked
  # docker containers -> host ollama (172.x hits INPUT chain, no rule matched), so
  # ai.tabaska.us showed "no models" while every port probe above stayed green.
  # This end-to-end completion exercises open-webui/litellm's actual path to ollama.
  # Needs LITELLM_MASTER_KEY in /etc/verification/env (vault: litellm.master_key).
  # NUM_PARALLEL=1: if a big model is mid-generation the request queues and can blow
  # the 50s budget — one isolated failure = retry before treating it as an outage.
  - id: rig-ai-e2e
    name: "litellm end-to-end completion (containers reach host ollama)"
    host: url
    cmd: >-
      curl -s -m 50 -H "Authorization: Bearer $LITELLM_MASTER_KEY"
      -H "Content-Type: application/json"
      -d '{"model":"utility","messages":[{"role":"user","content":"Say OK"}],"max_tokens":5}'
      http://cachyos.tailb31641.ts.net:4000/v1/chat/completions
    expect: '"finish_reason"'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident
