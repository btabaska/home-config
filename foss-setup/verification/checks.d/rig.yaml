# rig (CachyOS gaming/AI box, 3090 Ti 24GB, NO sudo).
# 24/7 host (decision 2026-07-08): the rig now runs continuously, so these
# checks are enabled and a rig that is down/unreachable is an INCIDENT.
# All checks are HTTP probes executed from mini: mini->rig SSH is blocked by
# tailnet ACL policy ("tailnet policy does not permit you to SSH to this node"),
# so host: url (curl from mini) is used instead of host: rig.
# Recovery if the rig is down: wakeonlan -i 192.168.10.255 50:eb:f6:b5:82:c6
# (llm-triage.sh attempts this automatically as the recovery path).
checks:
  - id: rig-ollama
    name: "ollama API answers on rig:11434"
    host: url
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://cachyos.tailb31641.ts.net:11434/api/tags
    expect: '^200$'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident

  - id: rig-litellm
    name: "litellm proxy answers on rig:4000 (401 without key = up)"
    host: url
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://cachyos.tailb31641.ts.net:4000/v1/models
    expect: '^(200|401)$'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident

  - id: rig-open-webui
    name: "open-webui answers on rig:3000"
    host: url
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://cachyos.tailb31641.ts.net:3000/
    expect: '^200$'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident

  - id: rig-ollama-models
    name: "ollama has the triage model pulled (qwen3-coder:30b)"
    host: url
    cmd: curl -s -m 8 http://cachyos.tailb31641.ts.net:11434/api/tags
    expect: 'qwen3-coder:30b'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident

  # 2026-07-09 regression: rig UFW hardening (LAN+tailnet scoping) silently blocked
  # docker containers -> host ollama (172.x hits INPUT chain, no rule matched), so
  # ai.tabaska.us showed "no models" while every port probe above stayed green.
  # This end-to-end completion exercises open-webui/litellm's actual path to ollama.
  # Needs LITELLM_MASTER_KEY in /etc/verification/env (vault: litellm.master_key).
  # NUM_PARALLEL=1: if a big model is mid-generation the request queues and can blow
  # the 50s budget — one isolated failure = retry before treating it as an outage.
  - id: rig-ai-e2e
    name: "litellm end-to-end completion (containers reach host ollama)"
    host: url
    cmd: >-
      curl -s -m 50 -H "Authorization: Bearer $LITELLM_MASTER_KEY"
      -H "Content-Type: application/json"
      -d '{"model":"utility","messages":[{"role":"user","content":"Say OK"}],"max_tokens":5}'
      http://cachyos.tailb31641.ts.net:4000/v1/chat/completions
    expect: '"finish_reason"'
    severity: warn
    task_id: game-10
    runbook: wiki/runbooks/rig.md
    enabled: true    # rig is 24/7 — failure here is an incident
