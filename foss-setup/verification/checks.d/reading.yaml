# Reading/CWA flow — added by fix-38 (quality-gate M35/L47/I68, 2026-07-18).
# The 2026-07-16 audit found this cluster green-but-drifted: store passthrough
# silently flipped vs its documentation (M35), the CWA image came from a young
# pseudonymous fork account on a MUTABLE tag (I68), and bulk grabs had quietly
# split author identities / imported foreign editions (L47). These checks probe
# the CONSUMER end (a Kobo device's sync call, the supply-chain pin, the library
# the Kobo actually renders) — not container liveness (nas-cwa already does that).
#
# Secrets: CWA_KOBO_SYNC_URL_ADMIN / CWA_KOBO_SYNC_URL_KOBO2 in /etc/verification/env
# (vault cwa.kobo_api_endpoint_admin / cwa.kobo2_api_endpoint — URLs embed sync tokens,
# never commit them). NAS_SUDO_PASSWORD (vault sudo.nas_password) as in docker-fleet.yaml.
checks:
  # ── M35 consumer end: a real Kobo sync request must succeed for BOTH devices ──
  # This is the exact regression the 07-09 passthrough disable was protecting
  # against (kobo2's sync stalling). Runs the proxied books.tabaska.us path a
  # real device uses, and requires parseable JSON, not just a 200.
  - id: cwa-kobo-sync-consumer
    name: "CWA Kobo sync answers valid JSON for both device users (M35 consumer end)"
    host: mini
    cmd: >-
      ok=1;
      for u in "$CWA_KOBO_SYNC_URL_ADMIN" "$CWA_KOBO_SYNC_URL_KOBO2"; do
      code=$(curl -s -o /tmp/cwa-kobo-probe.json -m 30 -w '%{http_code}' "$u");
      if [ "$code" != "200" ] || ! python3 -c 'import json;json.load(open("/tmp/cwa-kobo-probe.json"))' 2>/dev/null;
      then ok=0; echo "KOBO_SYNC_FAIL code=$code"; fi; done;
      rm -f /tmp/cwa-kobo-probe.json; [ "$ok" = 1 ] && echo KOBO_SYNC_OK
    expect: '^KOBO_SYNC_OK$'
    severity: warn
    task_id: fix-38
    runbook: wiki/docs/runbooks/reading-cwa.md
    enabled: true

  # ── M35 drift regression: config_kobo_proxy must match documented intent ──
  # Intent as of 2026-07-18 (fix-38): ENABLED (=1). The bug was not the value,
  # it was the SILENT flip vs documentation — this alerts on any future flip in
  # either direction; change the expect only together with the vault note.
  - id: cwa-kobo-proxy-intent
    name: "CWA store passthrough matches documented intent (ENABLED, fix-38/M35)"
    host: nas
    cmd: >-
      sqlite3 "file:/volume1/docker/calibre-web-automated/config/app.db?mode=ro"
      "select 'proxy='||config_kobo_proxy||' sync='||config_kobo_sync from settings;"
    expect: '^proxy=1 sync=1$'
    severity: warn
    task_id: fix-38
    runbook: wiki/docs/runbooks/reading-cwa.md
    enabled: true

  # ── I68 regression: fork image must stay digest-pinned, and the running ──
  # container must run exactly what the compose file pins.
  - id: cwa-image-digest-pinned
    name: "CWA runs the digest-pinned fork image, compose pin present (I68)"
    host: mini
    cmd: >-
      img=$(printf '%s\n' "$NAS_SUDO_PASSWORD"
      | ssh -o BatchMode=yes -o ConnectTimeout=10 nas
      "sudo -S -p '' /usr/local/bin/docker inspect calibre-web-automated --format '{{.Config.Image}}'" 2>/dev/null);
      pin=$(ssh -o BatchMode=yes -o ConnectTimeout=10 nas
      "grep -oE 'image: *[^ ]+' /volume1/docker/calibre-web-automated/docker-compose.yml" 2>/dev/null | awk '{print $2}');
      if [ -n "$img" ] && [ "$img" = "$pin" ] && printf '%s' "$img" | grep -qE '@sha256:[0-9a-f]{64}$';
      then echo PIN_OK; else echo "PIN_BAD running=$img compose=$pin"; fi
    expect: '^PIN_OK$'
    severity: warn
    task_id: fix-38
    runbook: wiki/docs/runbooks/reading-cwa.md
    enabled: true

  # ── I68 class: supply-chain tamper tripwire — the ghcr tag must still point ──
  # at the vetted digest. A young pseudonymous account re-pointing v4.0.7 is the
  # exact attack the digest pin defends against; this notices the attempt itself.
  - id: cwa-ghcr-tag-digest-drift
    name: "ghcr v4.0.7 tag still points at the vetted digest (I68 tamper tripwire)"
    host: mini
    cmd: >-
      pin=$(ssh -o BatchMode=yes -o ConnectTimeout=10 nas
      "grep -oE 'image: *[^ ]+' /volume1/docker/calibre-web-automated/docker-compose.yml" 2>/dev/null
      | grep -oE 'sha256:[0-9a-f]{64}');
      tok=$(curl -s -m 20 "https://ghcr.io/token?scope=repository:new-usemame/calibre-web-nextgen:pull"
      | python3 -c 'import sys,json;print(json.load(sys.stdin).get("token",""))');
      remote=$(curl -sI -m 20 -H "Authorization: Bearer $tok"
      -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json"
      "https://ghcr.io/v2/new-usemame/calibre-web-nextgen/manifests/v4.0.7"
      | tr -d '\r' | awk 'tolower($1)=="docker-content-digest:"{print $2}');
      if [ -z "$pin" ] || [ -z "$remote" ]; then echo "TAG_CHECK_ERROR pin=$pin remote=$remote";
      elif [ "$pin" = "$remote" ]; then echo TAG_UNCHANGED;
      else echo "TAG_REPOINTED pin=$pin remote=$remote"; fi
    expect: '^TAG_UNCHANGED$'
    severity: warn
    task_id: fix-38
    runbook: wiki/docs/runbooks/reading-cwa.md
    enabled: true

  # ── I68 exit signal: alert when upstream ships the CVE fix (>= 4.0.7) — ──
  # that is the moment to migrate OFF the fork back to the trusted upstream.
  # A failure here is good news, not an outage; see the runbook.
  - id: cwa-upstream-cve-catchup
    name: "upstream crocodilestick CWA still stalled pre-CVE-fix (fail = migrate back)"
    host: mini
    cmd: |-
      curl -s -m 20 https://api.github.com/repos/crocodilestick/calibre-web-automated/releases/latest | python3 -c '
      import sys, json
      tag = (json.load(sys.stdin).get("tag_name") or "").lstrip("vV")
      try:
          newer = tuple(int(x) for x in tag.split(".")[:3]) > (4, 0, 6)
      except ValueError:
          print("UPSTREAM_CHECK_ERROR tag=%r" % tag); sys.exit(0)
      print("UPSTREAM_CAUGHT_UP %s - migrate off the fork" % tag if newer else "UPSTREAM_STALLED %s" % tag)'
    expect: '^UPSTREAM_STALLED'
    severity: warn
    task_id: fix-38
    runbook: wiki/docs/runbooks/reading-cwa.md
    enabled: true

  # ── L47 class: split author identities (the thing that fractures Kobo ──
  # author/series views). Anagram-normalization catches both observed shapes:
  # 'Colfer, Eoin' vs 'Eoin Colfer' and 'George R.R. Martin' vs 'George R. R. Martin'.
  - id: cwa-library-author-split
    name: "CWA library has no split author identities (L47 class)"
    host: nas
    cmd: |-
      python3 -c '
      import sqlite3, collections
      db = sqlite3.connect("file:/volume1/books/metadata.db?mode=ro", uri=True)
      norm = collections.defaultdict(list)
      for (n,) in db.execute("select name from authors"):
          norm["".join(sorted(c for c in n.lower() if c.isalnum()))].append(n)
      splits = [" / ".join(v) for v in norm.values() if len(v) > 1]
      print("AUTHOR_SPLITS=" + ("; ".join(splits) if splits else "NONE"))'
    expect: '^AUTHOR_SPLITS=NONE$'
    severity: warn
    task_id: fix-38
    runbook: wiki/docs/runbooks/reading-cwa.md
    enabled: true

  # ── L47 class: duplicate titles under one author (bulk grabs importing the ──
  # same work as two editions, e.g. the 8MB + 739MB Game of Thrones pair).
  - id: cwa-library-dup-titles
    name: "CWA library has no duplicate title per author (L47 class)"
    host: nas
    cmd: |-
      python3 -c '
      import sqlite3, collections, re
      db = sqlite3.connect("file:/volume1/books/metadata.db?mode=ro", uri=True)
      q = "select a.name, b.title from books b join books_authors_link l on l.book=b.id join authors a on a.id=l.author"
      norm = collections.defaultdict(list)
      for author, title in db.execute(q):
          key = (author, re.sub(r"[^a-z0-9]", "", title.lower().split(":")[0]))
          norm[key].append(title)
      dups = ["%s: %s" % (a, " / ".join(t)) for (a, _), t in norm.items() if len(t) > 1]
      print("DUP_TITLES=" + ("; ".join(dups) if dups else "NONE"))'
    expect: '^DUP_TITLES=NONE$'
    severity: warn
    task_id: fix-38
    runbook: wiki/docs/runbooks/reading-cwa.md
    enabled: true

  # ────────────────────────────────────────────────────────────────────────
  # fix-46 (books-stack scan B1/B2/B3, 2026-07-20): the French/wrong-edition
  # class. rreading-glasses serves foreign editions as canonical records AND
  # stamps them language=eng, so Readarr's allowedLanguages filter can never
  # catch them — the only reliable detectors are title patterns (library) and
  # release-name markers (grab history). Guards now in place: release profile
  # id=1 (grab-time blocklist, regex terms verified enforced 2026-07-20) and
  # libreseerr anyEditionOk=False (edition pinning).

  # ── B1 regression: no foreign-language book records in the Readarr library ──
  # Probes the consumer end: the record list auto-search acts on. Title-pattern
  # match because rreading-glasses language metadata is untrustworthy (the
  # French Kushiel editions carried language=eng).
  - id: readarr-foreign-records
    name: "Readarr library has no foreign-language book records (fix-46 B1)"
    host: mini
    cmd: |-
      python3 -c '
      import json, os, re, urllib.request
      req = urllib.request.Request("http://192.168.10.4:8787/api/v1/book", headers={"X-Api-Key": os.environ["READARR_API_KEY"]})
      books = json.load(urllib.request.urlopen(req, timeout=30))
      pat = re.compile("^(L[\\x27\\u2019]|La |Le |Les |El |Los )|\\bTome ?\\d|, T\\d\\b|Urzeala|Fest\\u00edn", re.I)
      bad = ["%s:%s" % (b["id"], b["title"]) for b in books if pat.search(b["title"])]
      print("FOREIGN_RECORDS=" + ("; ".join(bad) if bad else "NONE"))'
    expect: '^FOREIGN_RECORDS=NONE$'
    severity: warn
    task_id: fix-46
    runbook: wiki/docs/runbooks/books-language.md
    enabled: true

  # ── B2 class, consumer end: no foreign-marker GRABS since the guard landed ──
  # Catches any foreign release that slips past by any path (new indexer, new
  # record shape, profile deleted) at the moment it is actually grabbed.
  # Cutoff 2026-07-20 = guard deploy date; the 2026-06-28 foreign grabs before
  # it are the incident this closes, not a live failure.
  - id: readarr-foreign-grab-history
    name: "no foreign-language grabs in Readarr history since fix-46 guard (B2 class)"
    host: mini
    cmd: |-
      python3 -c '
      import json, os, re, urllib.request
      url = "http://192.168.10.4:8787/api/v1/history?pageSize=200&sortKey=date&sortDirection=descending"
      req = urllib.request.Request(url, headers={"X-Api-Key": os.environ["READARR_API_KEY"]})
      recs = json.load(urllib.request.urlopen(req, timeout=30)).get("records", [])
      pat = re.compile("\\[(FRE|FRA|SPA|ESP|ROM|GER|ITA|POR)\\]|FRENCH|SPANISH|VOSTFR|\\bVF\\b|\\bTome ?\\d", re.I)
      bad = sorted({r.get("sourceTitle") or "" for r in recs if r.get("eventType") == "grabbed" and (r.get("date") or "") >= "2026-07-20" and pat.search(r.get("sourceTitle") or "")})
      print("FOREIGN_GRABS=" + ("; ".join(bad) if bad else "NONE"))'
    expect: '^FOREIGN_GRABS=NONE$'
    severity: warn
    task_id: fix-46
    runbook: wiki/docs/runbooks/books-language.md
    enabled: true

  # ── B2/B3 guard presence: blocklist profile enabled + edition pinning live ──
  # The grab-time release profile and the libreseerr anyEditionOk=False patch
  # are the two guards; alert if either is deleted, disabled, or drifts.
  - id: books-language-guard
    name: "Readarr language blocklist + libreseerr edition pinning still in place (fix-46 B2/B3)"
    host: mini
    cmd: |-
      rp=$(curl -sm 20 -H "X-Api-Key: $READARR_API_KEY" http://192.168.10.4:8787/api/v1/releaseprofile | python3 -c '
      import json, sys
      ps = json.load(sys.stdin)
      ok = any(p.get("enabled") and any("french" in t.lower() for t in p.get("ignored") or []) for p in ps)
      print("RP_OK" if ok else "RP_MISSING")');
      pin=$(grep -c '"anyEditionOk": False' /opt/stacks/libreseerr/readarr.py 2>/dev/null);
      if [ "$rp" = RP_OK ] && [ "$pin" = 1 ]; then echo LANG_GUARD_OK;
      else echo "LANG_GUARD_BAD rp=$rp pin=$pin"; fi
    expect: '^LANG_GUARD_OK$'
    severity: warn
    task_id: fix-46
    runbook: wiki/docs/runbooks/books-language.md
    enabled: true

  # ────────────────────────────────────────────────────────────────────────
  # fix-47 (books-stack scan B4-B7, 2026-07-20): import completion + file↔
  # record correctness. The 07-18 pack import cross-wired English epubs into
  # wrong/French records and silently lost 2 books (Readarr said "has file",
  # Calibre never got them); 6 titles died at the 80% match threshold with no
  # alert; PDF was imported over EPUB. Readarr renames files to the record
  # title, so post-import filename checks can't see cross-wiring — the only
  # honest consumer probe is Readarr-claims vs Calibre-has.

  # ── B4 regression + lost-book class: every Readarr book with a file must
  # exist in the Calibre library (the pipeline promise Readarr→CWA→Kobo).
  # Catches cross-wired imports (record "has file" but real title missing
  # downstream) AND Connect-script drops (the 07-13 apostrophe class).
  - id: books-pipeline-lost-imports
    name: "every Readarr book with a file is present in Calibre (fix-47 B4)"
    host: mini
    cmd: |-
      python3 -c '
      import json, os, re, subprocess, urllib.request
      def norm(s): return re.sub(r"[^a-z0-9]", "", s.lower())
      req = urllib.request.Request("http://192.168.10.4:8787/api/v1/book", headers={"X-Api-Key": os.environ["READARR_API_KEY"]})
      books = json.load(urllib.request.urlopen(req, timeout=30))
      with_files = {b["title"]: norm(b["title"]) for b in books if (b.get("statistics") or {}).get("bookFileCount", 0) > 0}
      out = subprocess.run(["ssh", "nas", "sqlite3 \x27file:/volume1/books/metadata.db?mode=ro\x27 \x27select title from books;\x27"], capture_output=True, text=True, timeout=60)
      cal = [norm(t) for t in out.stdout.splitlines() if t.strip()]
      lost = [t for t, n in with_files.items() if not any(n in c or c in n for c in cal)]
      print("LOST_BOOKS=" + ("; ".join(sorted(lost)) if lost else "NONE"))'
    expect: '^LOST_BOOKS=NONE$'
    severity: warn
    task_id: fix-47
    runbook: wiki/docs/runbooks/books-imports.md
    enabled: true

  # ── B6 class: grab→import dead-ends must page, not rot silently. A book
  # whose import went incomplete in the last 48h and that still has no file
  # and is not in the queue is a wasted grab needing operator action.
  # (Custom-script Connect handlers cannot hook OnImportFailure — Readarr
  # supportsOnImportFailure=false — so this check IS the alert path.)
  - id: readarr-import-deadends
    name: "no silent Readarr import dead-ends in the last 48h (fix-47 B6)"
    host: mini
    cmd: |-
      python3 -c '
      import datetime, json, os, urllib.request
      def get(path):
          req = urllib.request.Request("http://192.168.10.4:8787/api/v1/" + path, headers={"X-Api-Key": os.environ["READARR_API_KEY"]})
          return json.load(urllib.request.urlopen(req, timeout=30))
      cutoff = (datetime.datetime.utcnow() - datetime.timedelta(hours=48)).strftime("%Y-%m-%dT%H:%M:%SZ")
      recs = get("history?pageSize=200&sortKey=date&sortDirection=descending").get("records", [])
      incomplete = {r["bookId"]: r.get("sourceTitle") or "?" for r in recs if r.get("eventType") == "bookImportIncomplete" and (r.get("date") or "") >= cutoff}
      dead = []
      if incomplete:
          queue_ids = {i.get("bookId") for i in (get("queue?pageSize=100").get("records") or [])}
          for bid, src in incomplete.items():
              b = get("book/%d" % bid)
              if (b.get("statistics") or {}).get("bookFileCount", 0) == 0 and bid not in queue_ids:
                  dead.append("%s (book %d)" % (src[:60], bid))
      print("IMPORT_DEADENDS=" + ("; ".join(sorted(dead)) if dead else "NONE"))'
    expect: '^IMPORT_DEADENDS=NONE$'
    severity: warn
    task_id: fix-47
    runbook: wiki/docs/runbooks/books-imports.md
    enabled: true

  # ── B7 guard: EPUB-first format policy stays wired — profile "EPUB
  # Preferred" (upgrade to EPUB cutoff, PDF disallowed) exists and every
  # non-audiobook author is on it. Alert on profile drift or new authors
  # landing on a PDF-tolerant profile.
  - id: books-format-guard
    name: "EPUB-Preferred profile intact + all ebook authors on it (fix-47 B7)"
    host: mini
    cmd: |-
      python3 -c '
      import json, os, urllib.request
      def get(path):
          req = urllib.request.Request("http://192.168.10.4:8787/api/v1/" + path, headers={"X-Api-Key": os.environ["READARR_API_KEY"]})
          return json.load(urllib.request.urlopen(req, timeout=30))
      bad = []
      profs = {p["id"]: p for p in get("qualityprofile")}
      ep = next((p for p in profs.values() if p["name"] == "EPUB Preferred"), None)
      if not ep:
          bad.append("EPUB-Preferred profile missing")
      else:
          if not ep.get("upgradeAllowed"): bad.append("upgradeAllowed off")
          if ep.get("cutoff") != 3: bad.append("cutoff not EPUB")
          for it in ep["items"]:
              q = it.get("quality") or {}
              if q.get("id") == 1 and it.get("allowed"): bad.append("PDF allowed")
              if q.get("id") == 3 and not it.get("allowed"): bad.append("EPUB not allowed")
      spoken = {p["id"] for p in profs.values() if p["name"] == "Spoken"}
      for a in get("author"):
          if a["qualityProfileId"] in spoken: continue
          if not ep or a["qualityProfileId"] != ep["id"]:
              bad.append("author %s on profile %d" % (a["authorName"], a["qualityProfileId"]))
      print("FORMAT_GUARD=" + ("; ".join(bad) if bad else "OK"))'
    expect: '^FORMAT_GUARD=OK$'
    severity: warn
    task_id: fix-47
    runbook: wiki/docs/runbooks/books-imports.md
    enabled: true

  # ── L47 regression: every book renders a cover (has_cover=0 was Hunter's Run) ──
  - id: cwa-library-covers
    name: "every CWA library book has a cover (L47)"
    host: nas
    cmd: >-
      sqlite3 "file:/volume1/books/metadata.db?mode=ro"
      "select 'nocover='||count(*) from books where has_cover=0;"
    expect: '^nocover=0$'
    severity: warn
    task_id: fix-38
    runbook: wiki/docs/runbooks/reading-cwa.md
    enabled: true

  # ────────────────────────────────────────────────────────────────────────
  # fix-48 (books-stack scan B8-B12, 2026-07-20): libreseerr request-path
  # robustness. The 07-18 burst errored 13 of 18 requests: OL work-ids POSTed
  # as foreignBookId (guaranteed Readarr 400/500), hard-coded 15s lookup
  # timeouts stored silently, no reconciler path for monitored-no-file-not-
  # queued (Rotten Romans stuck 6 days), combining-diacritic author names
  # never matching, and a one-shot model with no retry and no operator
  # surfacing. Fixed: library-first adoption, PermanentRequestError instead
  # of OL fallback, READARR_TIMEOUT=60 + gunicorn --timeout 300, tokenized
  # unicode name matching, reconciler retry (5x) + re-search (4x/6h) with
  # ntfy on every terminal failure (topic: books).

  # ── B10/B12 regression, consumer end: the request board a user sees. A
  # non-terminal request with no activity for 48h means the reconciler
  # dead-ended again (search/retry loops either progress a request or
  # terminal-error it within ~24h by design).
  - id: libreseerr-request-stuck
    name: "libreseerr: no non-terminal request without activity >48h (fix-48 B10/B12)"
    host: mini
    cmd: |-
      python3 -c '
      import json, datetime
      reqs = json.load(open("/opt/stacks/libreseerr/data/requests.json"))
      now = datetime.datetime.utcnow()
      act = lambda r: datetime.datetime.fromisoformat(r.get("last_search_at") or r.get("created_at"))
      stuck = ["%s(%s %.0fh)" % (r.get("title"), r.get("status"), (now - act(r)).total_seconds() / 3600) for r in reqs if r.get("status") in ("pending", "processing", "retrying", "downloading") and (now - act(r)).total_seconds() > 48 * 3600]
      print("STUCK_REQUESTS=" + ("; ".join(stuck) if stuck else "NONE"))'
    expect: '^STUCK_REQUESTS=NONE$'
    severity: warn
    task_id: fix-48
    runbook: wiki/docs/runbooks/books-requests.md
    enabled: true

  # ── B8/B9/B11 class + guard presence: no resurfaced failure signature in
  # recent terminal errors (an OL-id 400, a 15s read timeout, or an author-
  # match failure means the local patch was reverted — e.g. by an image bump,
  # which the compose file warns re-derives app.py/readarr.py), and the four
  # guards must be physically present: patched app.py + readarr.py, gunicorn
  # --timeout (workers died at the 30s default once READARR_TIMEOUT=60), and
  # the ntfy token (silent failures were the root enabler of this cluster).
  - id: libreseerr-request-path-guards
    name: "libreseerr: no resurfaced failure classes, request-path guards in place (fix-48 B8/B9/B11)"
    host: mini
    cmd: |-
      sig=$(python3 -c '
      import json, re
      reqs = json.load(open("/opt/stacks/libreseerr/data/requests.json"))
      pat = re.compile("read timeout=15|A book with this ID was not found|AddSkyhookData|Could not find author")
      bad = [str(r.get("title")) for r in reqs if r.get("status") == "error" and (r.get("created_at") or "") >= "2026-07-21" and pat.search(str(r.get("error")))]
      print(";".join(bad) if bad else "NONE")');
      guard=OK;
      grep -q "PermanentRequestError" /opt/stacks/libreseerr/app.py || guard=NO_PATCH_APP;
      grep -q "adopt_library_book" /opt/stacks/libreseerr/readarr.py || guard=NO_PATCH_READARR;
      docker inspect libreseerr --format '{{json .Config.Cmd}}' | grep -q -- --timeout || guard=NO_GUNICORN_TIMEOUT;
      [ -n "$(docker exec libreseerr printenv NTFY_TOKEN 2>/dev/null)" ] || guard=NO_NTFY_TOKEN;
      if [ "$sig" = NONE ] && [ "$guard" = OK ]; then echo REQUEST_PATH_OK;
      else echo "REQUEST_PATH_BAD sig=$sig guard=$guard"; fi
    expect: '^REQUEST_PATH_OK$'
    severity: warn
    task_id: fix-48
    runbook: wiki/docs/runbooks/books-requests.md
    enabled: true
