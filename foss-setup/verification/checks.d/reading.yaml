  # ── C2-class canary: tracker-searchable canonical metadata. The goodreads
  # era failed this exact lookup (the real Austen novel ABSENT from the
  # result set entirely — fanfic/omnibus/junk instead, C1 evidence). The
  # plan doc said "top 3", but Bookshelf lookup ORDERING is nondeterministic
  # (measured 2026-07-20: canonical rank 1/7/4 across three back-to-back
  # identical calls on a stable 14-result set) and the real consumer
  # (libreseerr) re-ranks candidates through its own title+author gates, so
  # the order-independent, consumer-faithful assertion is PRESENCE of the
  # canonical Austen work in the result set. P&P is permanently warm in the
  # rg-hc cache (library-bound record), so this is served from postgres and
  # does not spend Hardcover quota; degraded/empty lookups during a rare
  # cold-cache refresh herd fail this loudly — that state also degrades real
  # requests, so loud is correct.
  - id: metadata-search-canary
    name: "Bookshelf lookup: canonical Pride & Prejudice present + rank (C2 canary)"
    host: mini
    cmd: |-
      python3 -c '
      import json, os, re, urllib.parse, urllib.request
      norm = lambda s: re.sub(r"[^a-z0-9]", "", (s or "").lower().replace("&", " and "))
      url = "http://192.168.10.4:8790/api/v1/book/lookup?term=" + urllib.parse.quote("Pride and Prejudice Jane Austen")
      req = urllib.request.Request(url, headers={"X-Api-Key": os.environ["BOOKSHELF_API_KEY"]})
      results = json.load(urllib.request.urlopen(req, timeout=45))
      rank = next((i for i, r in enumerate(results) if norm(r.get("title")) == "prideandprejudice" and "austen" in norm(r.get("authorTitle") or str(r.get("author", {}).get("authorName", "")))), None)
      if rank is None:
          print("CANARY_MISS results=%d: %s" % (len(results), " | ".join((r.get("title") or "?")[:30] for r in results[:5])))
      else:
          print("CANARY_OK rank=%d results=%d" % (rank, len(results)))'
    expect: '^CANARY_OK '
    severity: warn
    task_id: bmig-06
    runbook: wiki/docs/runbooks/books-metadata.md
    enabled: true

  # Shelfmark (2026-07-21): the new book search→download→ingest frontend. Probes the
  # consumer end — up AND the seedbox rclone mount is still `rshared` (a NAS reboot
  # resets it to `private`, silently breaking the MAM→Deluge→ingest copy). Fix:
  #   sudo mount --make-rshared /volume1/mounts/seedbox-files && docker restart shelfmark
  - id: shelfmark-mam-path-ready
    name: "Shelfmark up + seedbox mount rshared (MAM→CWA-ingest path intact)"
