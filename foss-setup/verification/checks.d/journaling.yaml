# Journaling stack (journal-01) — Memos + n8n + faster-whisper on the mini, with
# inference on the rig (llama-swap). Most of these are scaffold/readiness probes that
# hit each service's real app surface (not a bare `docker inspect running`). The deep
# "one #journal memo -> exactly one reflection comment, no re-trigger" end-to-end check
# is `journaling-loop-e2e` (journal-06's closeout, at the bottom). All run from mini;
# the coach-model probe confirms the exact inference dependency the analyze workflow calls.
checks:
  - id: journaling-memos-ready
    tier: fast
    name: "memos journal front-end is ready on :5230"
    host: mini
    cmd: curl -s -m 8 http://localhost:5230/healthz
    expect: 'Service ready'
    severity: crit
    task_id: journal-01
    runbook: wiki/docs/services/journaling.md
    enabled: true

  - id: journaling-n8n-app
    tier: fast
    name: "n8n serves its app API on :5678 (/rest/settings 200)"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://localhost:5678/rest/settings
    expect: '^200$'
    severity: crit
    task_id: journal-01
    runbook: wiki/docs/services/journaling.md
    enabled: true

  - id: journaling-whisper-ready
    tier: fast
    name: "faster-whisper (speaches) answers /health on :8010"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://localhost:8010/health
    expect: '^200$'
    severity: warn
    task_id: journal-01
    runbook: wiki/docs/services/journaling.md
    enabled: true

  # Consumer-dependency probe: the journal-analyze workflow POSTs to rig llama-swap
  # with model=dolphin-venice-24b. If the rig is down or that model is unregistered,
  # reflections silently stop even though all three mini containers stay green.
  - id: journaling-coach-model-reachable
    tier: fast
    name: "rig llama-swap :9292 is reachable and registers dolphin-venice-24b"
    host: mini
    cmd: curl -s -m 10 http://192.168.10.12:9292/v1/models
    expect: 'dolphin-venice-24b'
    severity: warn
    task_id: journal-01
    runbook: wiki/docs/services/journaling.md
    enabled: true

  # journal-02 wiring invariant: memos must still hold the memo.created webhook
  # pointing at the n8n container URL. If it's deleted or repointed, every entry
  # stops being analyzed even though all containers stay green. Auth via the
  # PAT in /etc/verification/env (vault journaling.memos.api_token). Producer-side
  # probe; the deep "memo -> exactly one comment" end-to-end is journal-06.
  - id: journaling-memos-webhook-wired
    tier: fast
    name: "memos holds the memo.created webhook -> http://n8n:5678/webhook/journal"
    host: mini
    cmd: curl -s -m 8 -H "Authorization:Bearer $MEMOS_API_TOKEN" http://localhost:5230/api/v1/users/btabaska/webhooks | python3 -c 'import sys,json;w=json.load(sys.stdin).get("webhooks",[]);print("WEBHOOK_OK" if any(x.get("url")=="http://n8n:5678/webhook/journal" for x in w) else "WEBHOOK_MISSING "+json.dumps(w)[:160])'
    expect: '^WEBHOOK_OK'
    severity: warn
    task_id: journal-02
    runbook: wiki/docs/services/journaling.md
    enabled: true

  # journal-03 consumer-wiring invariant: the n8n journal-analyze workflow must be
  # ACTIVE with its POST webhook registered, or memos fires into a void and no entry
  # is ever reflected on — while all three containers stay green. n8n's webhook router
  # returns the "...not registered for GET requests" message ONLY when a POST webhook
  # owns /webhook/journal (armed); a deactivated/unpublished workflow instead yields a
  # generic "Cannot GET"/unknown-webhook reply. This directly catches the silent
  # non-registration failure mode (stale webhook_entity row, lost published version).
  - id: journaling-analyze-armed
    tier: fast
    name: "n8n journal-analyze webhook is armed (POST /webhook/journal registered)"
    host: mini
    cmd: curl -s -m 8 http://localhost:5678/webhook/journal
    expect: 'not registered for GET requests'
    severity: crit
    task_id: journal-03
    runbook: wiki/docs/services/journaling.md
    enabled: true

  # journal-04 consumer probe: the optional server-side dictation branch POSTs a
  # memo's audio attachment to faster-whisper /v1/audio/transcriptions and merges the
  # transcript into the LLM input BEFORE analysis. `journaling-whisper-ready` only
  # proves /health (the container is up); this proves the endpoint actually
  # TRANSCRIBES with the cached model — the real runtime dependency of the audio
  # branch. If the whisper-cache volume is wiped or the model evicted, /health stays
  # green but a real transcription 500s/stalls and voice entries silently lose their
  # transcript. Real CPU inference (~15 s), so tier: daily (the 07:15 full sweep), not
  # the 10-min fast tier. Uses a bundled 1 s probe WAV on the runner (source of truth
  # foss-setup/verification/assets/whisper-probe.wav, deployed to /opt/verification/assets/).
  - id: journaling-whisper-transcribes
    tier: daily
    name: "faster-whisper transcribes a probe clip (model loaded, not just /health)"
    host: mini
    cmd: curl -s -m 90 -X POST http://localhost:8010/v1/audio/transcriptions -F file=@/opt/verification/assets/whisper-probe.wav -F model=Systran/faster-whisper-small -F response_format=json | python3 -c 'import sys,json;t=json.load(sys.stdin).get("text","").strip();print("WHISPER_TRANSCRIBES_OK" if t else "WHISPER_EMPTY")'
    expect: '^WHISPER_TRANSCRIBES_OK$'
    severity: warn
    task_id: journal-04
    runbook: wiki/docs/services/journaling.md
    enabled: true

  # journal-05 drift guard: the "Save to Journal" Action function + "Journaling Coach"
  # model preset live ONLY in the rig Open WebUI database (no compose file owns them),
  # so an OWUI redeploy/volume-wipe silently erases the save button + coach persona while
  # every container stays green. These probe the rig OWUI admin API from the mini
  # (OWUI_URL/OWUI_API_KEY already in the runner env) to confirm the DB-only artifacts are
  # still installed & active. warn, not crit: the core memos->n8n->reflection pipeline still
  # works for hand-tagged #journal entries; only the OWUI coaching front-end degrades.
  - id: journaling-owui-save-fn-installed
    tier: fast
    name: "rig Open WebUI holds the Save-to-Journal action (installed + active)"
    host: mini
    cmd: curl -s -m 8 -H "Authorization:Bearer $OWUI_API_KEY" "$OWUI_URL/api/v1/functions/id/save_to_journal" | python3 -c 'import sys,json;f=json.load(sys.stdin);print("OWUI_SAVE_FN_OK" if (f.get("is_active") and f.get("type")=="action") else "OWUI_SAVE_FN_DRIFT "+json.dumps({"active":f.get("is_active"),"type":f.get("type")}))'
    expect: '^OWUI_SAVE_FN_OK$'
    severity: warn
    task_id: journal-05
    runbook: wiki/docs/services/journaling.md
    enabled: true

  - id: journaling-owui-coach-preset
    tier: fast
    name: "rig Open WebUI holds the Journaling Coach preset (base dolphin-venice, active)"
    host: mini
    cmd: curl -s -m 8 -H "Authorization:Bearer $OWUI_API_KEY" "$OWUI_URL/api/v1/models/model?id=journaling-coach" | python3 -c 'import sys,json;m=json.load(sys.stdin);print("OWUI_COACH_PRESET_OK" if (m.get("base_model_id")=="dolphin-venice" and m.get("is_active")) else "OWUI_COACH_PRESET_DRIFT "+json.dumps({"base":m.get("base_model_id"),"active":m.get("is_active")}))'
    expect: '^OWUI_COACH_PRESET_OK$'
    severity: warn
    task_id: journal-05
    runbook: wiki/docs/services/journaling.md
    enabled: true

  # journal-06 CONSUMER-END closeout — the deep end-to-end proof. It POSTs a marked
  # #journal test memo and asserts the journal-analyze loop writes back EXACTLY ONE
  # reflection comment, then deletes the probe. This is the only check that proves the
  # whole pipeline actually WORKS (Memos webhook -> n8n Guard -> rig coach LLM -> comment
  # write-back) AND that the loop guard holds (writing that comment fires two more webhook
  # events, neither of which may add a second comment) — not just that containers are up
  # (mandate 1). The reflection is best-effort: the ~24 GB-tier coach shares the rig's single
  # 3090 Ti with Immich ML and OOMs ("exited prematurely") when the card is tight
  # (rig-gpu-vram-contention; docs/journaling-stack-plan.md risk 2). So the helper FIRST
  # checks the coach can load and SKIPs — posting nothing — if it can't; that's an expected,
  # separately-monitored condition (journaling-coach-model-reachable), NOT a loop failure. A
  # real FAIL (E2E_NO_COMMENT / E2E_LOOP_MULTICOMMENT / E2E_ERROR) means the coach WAS loadable
  # but the loop produced 0 or >1 reflections — the webhook/workflow/guard is broken. warn +
  # daily (07:15 sweep only): it posts a memo and drives the LLM, too heavy for the 10-min fast
  # tier, and best-effort means it must never page on GPU contention. Helper (bin-refs guarded):
  # /opt/verification/bin/journaling-e2e.py — reads the Memos PAT from /etc/verification/env and
  # the live coach model/endpoint from the stack .env, self-cleans the probe memo in a finally.
  - id: journaling-loop-e2e
    tier: daily
    name: "journal loop end-to-end: one #journal memo -> exactly one reflection comment"
    host: mini
    cmd: python3 /opt/verification/bin/journaling-e2e.py
    expect: '^E2E_(OK|SKIP_COACH_UNAVAILABLE)$'
    severity: warn
    task_id: journal-06
    runbook: wiki/docs/services/journaling.md
    enabled: true
    timeout: 300
