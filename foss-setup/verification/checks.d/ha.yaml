# Home Assistant (HA Green, 192.168.10.50, Trusted VLAN). Added 2026-07-08 (Run 5 start).
# ha-api-auth/ha-hue-lights need HA_TOKEN in /etc/verification/env (long-lived token,
# vault: hosts.ha.api_token — value lives only on mini + vault, never in this repo).
checks:
  - id: ha-http
    name: "Home Assistant UI answers on :8123"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://192.168.10.50:8123/
    expect: '^200$'
    severity: crit
    task_id: ha-01
    runbook: wiki/runbooks/docker.md
    enabled: true

  - id: ha-api-auth
    name: "HA REST API authenticates (long-lived token valid)"
    host: mini
    cmd: >-
      curl -s -m 8 -H "Authorization: Bearer $HA_TOKEN"
      http://192.168.10.50:8123/api/config | grep -c '"version"'
    expect: '^1$'
    severity: warn
    task_id: ha-32
    runbook: wiki/runbooks/docker.md
    enabled: true

  - id: ha-hue-lights
    name: "Hue integration healthy (>=50 light entities registered)"
    host: mini
    cmd: >-
      curl -s -m 8 -H "Authorization: Bearer $HA_TOKEN"
      http://192.168.10.50:8123/api/states | grep -o '"entity_id":"light\.' | wc -l | tr -d ' '
    expect: '^([5-9][0-9]|[1-9][0-9]{2,})$'
    severity: warn
    task_id: ha-05
    runbook: wiki/runbooks/docker.md
    enabled: true
