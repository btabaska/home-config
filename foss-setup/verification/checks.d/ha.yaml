# Home Assistant (HA Green, 192.168.10.50, Trusted VLAN). Added 2026-07-08 (Run 5 start).
# ha-api-auth/ha-hue-lights need HA_TOKEN in /etc/verification/env (long-lived token,
# vault: hosts.ha.api_token — value lives only on mini + vault, never in this repo).
checks:
  - id: ha-http
    tier: fast
    name: "Home Assistant UI answers on :8123"
    host: mini
    cmd: curl -s -o /dev/null -m 8 -w '%{http_code}' http://192.168.10.50:8123/
    expect: '^200$'
    severity: crit
    task_id: ha-01
    runbook: wiki/runbooks/docker.md
    enabled: true

  # PROXY E2E (added 2026-07-18, fix-32). ha-http above probes HA DIRECT on
  # :8123 — which stayed green for the 11 days ha.tabaska.us served every user
  # "400: Bad Request" (H9/H19/H21/M10: HA had no http.use_x_forwarded_for /
  # trusted_proxies, so it rejected caddy's proxied requests). This is the
  # consumer path: TLS through caddy on the mini, expecting the real frontend
  # HTML. Fails if the HA-side http: block is lost (restore/factory reset), the
  # caddy vhost/cert dies, or HA regresses proxy handling. warn not crit:
  # direct :8123 still works when only the proxy path is down (ha-http crits
  # on a full outage).
  - id: ha-proxy-e2e
    tier: fast
    name: "ha.tabaska.us serves the HA frontend THROUGH caddy (proxy accepted, not 400)"
    host: mini
    cmd: >-
      curl -sk -m 10 --resolve ha.tabaska.us:443:127.0.0.1 https://ha.tabaska.us/
      | grep -o "<title>Home Assistant</title>" || echo HA_PROXY_BROKEN
    expect: '^<title>Home Assistant</title>$'
    severity: warn
    task_id: fix-32
    runbook: wiki/docs/runbooks/reverse-proxy.md
    enabled: true

  - id: ha-api-auth
    name: "HA REST API authenticates (long-lived token valid)"
    host: mini
    cmd: >-
      curl -s -m 8 -H "Authorization: Bearer $HA_TOKEN"
      http://192.168.10.50:8123/api/config | grep -c '"version"'
    expect: '^1$'
    severity: warn
    task_id: ha-32
    runbook: wiki/runbooks/docker.md
    enabled: true

  - id: ha-hue-lights
    name: "Hue integration healthy (>=50 light entities registered)"
    host: mini
    cmd: >-
      curl -s -m 8 -H "Authorization: Bearer $HA_TOKEN"
      http://192.168.10.50:8123/api/states | grep -o '"entity_id":"light\.' | wc -l | tr -d ' '
    expect: '^([5-9][0-9]|[1-9][0-9]{2,})$'
    severity: warn
    task_id: ha-05
    runbook: wiki/runbooks/docker.md
    enabled: true

  # observability hardening (2026-07-14): ha-hue-lights only counts REGISTERED
  # light.* entities (>=50), so a whole room going 'unavailable' still passes.
  # This availability sibling fails when more than 12 lights are unavailable/
  # unknown (baseline ~8, so 12 is headroom that still catches a room going dark).
  # fix-36 (2026-07-19, M40): the ~8-light baseline is ACCEPTED household usage —
  # those bulbs are cut at wall switches (the Hue bridge itself reports zigbee
  # 'connectivity_issue' for exactly those devices, and the set churns as
  # switches get used). Do NOT tighten below 12; the dead-bulb case (dark for
  # weeks) is caught by ha-availability-drift below. Runbook: ha-health.md.
  - id: ha-lights-available
    name: "HA lights available (not a whole room dark; >12 unavailable = alert)"
    host: mini
    cmd: >-
      curl -s -m 12 -H "Authorization: Bearer $HA_TOKEN"
      http://192.168.10.50:8123/api/states
      | python3 -c "import sys,json; d=json.load(sys.stdin);
      n=sum(1 for e in d if e['entity_id'].startswith('light.') and e['state'] in ('unavailable','unknown'));
      print('lights_avail=ok' if n<=12 else 'lights_avail=DARK:%d'%n)"
    expect: '^lights_avail=ok$'
    severity: warn
    task_id: ha-05
    runbook: wiki/runbooks/docker.md
    enabled: true

  # UPDATE STALENESS (added 2026-07-19, fix-36/M9). The audit found Core one
  # monthly release behind and HAOS TWO major versions behind (16.3 vs 18.1) —
  # update entities were 'on' for weeks and nobody was told (the class: pending
  # updates surface in a UI nobody watches). This fires when any update.*
  # entity has been pending for >=21 days (last_changed age; conservative —
  # a core restart resets the clock, so it never false-positives after a
  # fresh update round). Green means "nothing has sat pending for 3 weeks."
  - id: ha-updates-pending
    name: "HA updates not left pending >=21 days (core/OS/add-ons)"
    host: mini
    cmd: >-
      curl -s -m 12 -H "Authorization: Bearer $HA_TOKEN"
      http://192.168.10.50:8123/api/states
      | python3 -c "import sys,json,datetime; d=json.load(sys.stdin);
      now=datetime.datetime.now(datetime.timezone.utc);
      old=[e['entity_id'] for e in d if e['entity_id'].startswith('update.') and e['state']=='on'
      and (now-datetime.datetime.fromisoformat(e['last_changed'])).days>=21];
      print('updates=ok' if not old else 'updates=STALE:'+','.join(old))"
    expect: '^updates=ok$'
    severity: warn
    task_id: fix-36
    runbook: wiki/docs/runbooks/ha-health.md
    enabled: true

  # AVAILABILITY DRIFT (added 2026-07-19, fix-36/M11+M40+M42 class check). The
  # audit's 'unavailable' clusters (11 iPhone companion sensors dead since
  # 07-07, 8 wall-switched Hue lights) sat for weeks because nothing looked at
  # entity availability beyond lights. Accepted baseline: light.* unavailable
  # (wall switches, counted by ha-lights-available) and up to 11
  # sensor.btiphone_* (phone-side fix deferred by user 2026-07-18). This fires
  # on (a) ANY other entity going 'unavailable' (an integration silently
  # dying), (b) the btiphone cluster GROWING past 11, or (c) a light staying
  # dark >=30 days (dead bulb, not a wall switch — clock resets on HA restart
  # so it under-fires, never cries wolf).
  - id: ha-availability-drift
    name: "HA entity availability matches accepted baseline (no silent integration death)"
    host: mini
    cmd: >-
      curl -s -m 12 -H "Authorization: Bearer $HA_TOKEN"
      http://192.168.10.50:8123/api/states
      | python3 -c "import sys,json,datetime; d=json.load(sys.stdin);
      now=datetime.datetime.now(datetime.timezone.utc);
      unav=[e for e in d if e['state']=='unavailable'];
      bt=[e for e in unav if e['entity_id'].startswith('sensor.btiphone_')];
      lights=[e for e in unav if e['entity_id'].startswith('light.')];
      other=[e['entity_id'] for e in unav if not e['entity_id'].startswith(('sensor.btiphone_','light.'))];
      dark=[e['entity_id'] for e in lights if (now-datetime.datetime.fromisoformat(e['last_changed'])).days>=30];
      msg=([('DRIFT:'+','.join(other))] if other else [])+([('BTIPHONE:%d'%len(bt))] if len(bt)>11 else [])+([('DARK30:'+','.join(dark))] if dark else []);
      print('avail=ok' if not msg else 'avail='+';'.join(msg))"
    expect: '^avail=ok$'
    severity: warn
    task_id: fix-36
    runbook: wiki/docs/runbooks/ha-health.md
    enabled: true

  # IPHONE PRESENCE E2E (added 2026-07-19, fix-36/M11+M42 regression). With the
  # 11 telemetry sensors accepted-dead (user will re-enable in the app per the
  # runbook), presence is the part of mobile_app we still RELY on:
  # device_tracker.brandon_iphone must report a real zone and battery_level a
  # number. Fires if the whole integration dies — the failure mode that would
  # actually matter and that the accepted-baseline check above deliberately
  # ignores.
  - id: ha-iphone-presence
    name: "iPhone companion presence pipeline alive (tracker + battery report real values)"
    host: mini
    cmd: >-
      curl -s -m 12 -H "Authorization: Bearer $HA_TOKEN"
      http://192.168.10.50:8123/api/states
      | python3 -c "import sys,json; d={e['entity_id']:e['state'] for e in json.load(sys.stdin)};
      dt=d.get('device_tracker.brandon_iphone','missing'); bl=d.get('sensor.btiphone_battery_level','missing');
      ok=dt not in ('missing','unavailable','unknown') and bl.replace('.','',1).isdigit();
      print('presence=ok' if ok else 'presence=DEAD:dt=%s,batt=%s'%(dt,bl))"
    expect: '^presence=ok$'
    severity: warn
    task_id: fix-36
    runbook: wiki/docs/runbooks/ha-health.md
    enabled: true

  # BACKUP DEAD-MAN (added 2026-07-13, #11). HAOS ran with backups ONLY on the
  # local eMMC agent — a dead eMMC lost every automation. Fixed: a dedicated
  # least-priv Synology SMB user (ha-backup) + a Supervisor CIFS mount
  # "nas_backups" -> //192.168.10.4/backups (agent hassio.nas_backups), daily
  # 04:45 automatic ENCRYPTED backups to BOTH agents, retention 3. This check is
  # the dead-man: the newest HA backup .tar in the OFF-eMMC NAS location must be
  # < 48h old. It proves freshness AND off-eMMC presence in one probe (an
  # encrypted archive on disk = the outcome, not liveness). Fails loudly if the
  # NAS is unreachable (empty -> STALE), never a vacuous pass. crit: no fresh
  # off-eMMC backup = one eMMC failure from total loss. Restore/runbook: the
  # encryption key is vault hosts.ha.backup_password (also Proton Pass) — a backup
  # without its key is not a backup.
  - id: ha-backup-offsite-fresh
    name: "HA has an off-eMMC (NAS) backup < 48h old (dead-man)"
    host: mini
    cmd: >-
      c=$(printf '%s\n' "$NAS_SUDO_PASSWORD"
      | ssh -o BatchMode=yes -o ConnectTimeout=10 nas
      "sudo -S -p '' bash -c 'find /volume1/backups -maxdepth 1 -name \"*.tar\" -mmin -2880 2>/dev/null | wc -l'"
      2>/dev/null); c=$(echo "$c" | tr -d ' ');
      [ "${c:-0}" -ge 1 ] && echo backup=fresh || echo backup=STALE
    expect: '^backup=fresh$'
    severity: crit
    task_id: ha-11
    runbook: wiki/runbooks/backup-restore.md
    enabled: true

  # ASSIST LLM ENDPOINT (added 2026-07-13, #12). HA Assist had NO LLM
  # conversation agent — the "point Assist at mini:4000 (LiteLLM)" plan was never
  # deployed and mini:4000 never existed (a phantom; LiteLLM/Ollama are rig-only,
  # see memory ai-stack-topology). Fixed: added HA's native `ollama` integration
  # -> the rig's Ollama at http://192.168.10.12:11434 with a conversation agent
  # `conversation.rig_ollama_assist` (model llama3.2:3b); a live
  # /api/conversation/process call returns a real completion. This check guards
  # the seam that broke — the LLM backend HA Assist points at must be REAL and
  # reachable and still serve the configured model (catches a phantom/dead
  # endpoint or a pulled model). Lightweight (Ollama /api/tags, no generation) so
  # it never spurious-pages on cold-model latency. warn: the AI-stack SPOF (rig
  # down) is an accepted condition, not a data-loss crit.
  - id: ha-assist-rig-llm-reachable
    name: "HA Assist LLM backend (rig Ollama) reachable + serves the configured model"
    host: mini
    cmd: >-
      curl -sm 15 http://192.168.10.12:11434/api/tags
      | python3 -c "import sys,json;
      d=json.load(sys.stdin);
      ms=[m.get('name') for m in d.get('models',[])];
      print('assist_llm=ok' if 'llama3.2:3b' in ms else 'assist_llm=MISSING')"
      2>/dev/null || echo assist_llm=UNREACHABLE
    expect: '^assist_llm=ok$'
    severity: warn
    task_id: ha-12
    runbook: wiki/runbooks/docker.md
    enabled: true
