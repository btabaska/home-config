    name: "caddy reverse proxy container running"
    host: mini
    cmd: docker inspect -f '{{.State.Status}}' caddy
    expect: '^running$'
    severity: crit
    task_id: docker-02
    runbook: wiki/runbooks/docker.md
    enabled: true

