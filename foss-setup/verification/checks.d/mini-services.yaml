  # vaultwarden publishes no host port (edge-network only), so probe the
  # Caddy vhost with --resolve; -k tolerated; certs are real Lets Encrypt as of 2026-07-08 (DNS-01).
  - id: mini-vaultwarden
    name: "vaultwarden web vault answers at https://vault.tabaska.us"
    host: mini
    cmd: curl -sk -o /dev/null -m 8 -w '%{http_code}' --resolve vault.tabaska.us:443:127.0.0.1 https://vault.tabaska.us/
    expect: '^200$'
    severity: crit
    task_id: docker-14
    runbook: wiki/runbooks/docker.md
    enabled: true

  # RomM FUNCTIONAL probe (added 2026-07-14, research.md §3 hygiene). Container
  # presence was already in coverage/mini.containers, but nothing confirmed RomM
  # actually SERVES — the app can be Up while its DB handshake / library scan is
  # dead. The heartbeat endpoint returns SYSTEM.VERSION only when app+DB are
  # healthy, so this proves function, not just liveness. Image pinned to 4.9.2
  # (was :latest) so a surprise 5.0-beta pull can't silently change the API.
  - id: romm-serving
    name: "RomM answers its heartbeat with a version (functional, not just container-up)"
    host: mini
    cmd: >-
      curl -sf --max-time 10 http://localhost:8998/api/heartbeat 2>/dev/null
      | python3 -c "import sys,json; d=json.load(sys.stdin); s=d.get('SYSTEM') or {}; v=s.get('VERSION') or ''; print('romm=ok:'+v if v else 'romm=BAD')" 2>/dev/null
      || echo romm=BAD
    expect: '^romm=ok:'
    severity: warn
    task_id: retro-02
    runbook: wiki/runbooks/docker.md
    enabled: true
