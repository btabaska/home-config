# Backup freshness checks.
checks:
  # Guards reopened task nas-08. FAILS today (last dump 2026-07-02) — correct and desired
  # until the immich dump cron on the NAS is fixed.
  - id: backup-immich-dump-fresh
    name: "immich DB dump on NAS newer than 26h"
    host: nas
    cmd: find /volume1/docker/immich/backups -name '*.sql.gz' -mmin -1560 | grep .
    expect: '\.sql\.gz'
    severity: crit
    task_id: nas-08
    runbook: wiki/runbooks/backups.md
    enabled: true

  # restic → B2 offsite (nas-04/05). The env file is root 0600 and the runner is
  # btabaska, so the check goes through /usr/local/bin/restic-latest-age — a
  # root-owned wrapper permitted by /etc/sudoers.d/verification-restic
  # (NOPASSWD, exact zero-argument command). Prints FRESH/STALE age_hours=N.
  - id: restic-snapshot-fresh-mini
    name: "restic B2 snapshot for mini newer than 26h"
    host: mini
    cmd: sudo -n /usr/local/bin/restic-latest-age
    expect: '^FRESH'
    severity: crit
    task_id: nas-04
    runbook: wiki/runbooks/backups.md
    enabled: true

  # Same wrapper+sudoers deployed on the rig. The rig runs 24/7 now (decision
  # 2026-07-08), so this runs daily like the mini check. NOTE: host: rig means
  # this additionally requires mini→rig SSH access (previously blocked by
  # tailnet ACL; being verified live by the orchestrator).
  - id: restic-snapshot-fresh-rig
    name: "restic B2 snapshot for rig newer than 26h"
    host: rig
    cmd: sudo -n /usr/local/bin/restic-latest-age
    expect: '^FRESH'
    severity: warn
    task_id: nas-05
    runbook: wiki/runbooks/backups.md
    enabled: true

  - id: backup-immich-dump-nonempty
    name: "newest immich DB dump is >1MB (not a truncated/empty dump)"
    host: nas
    cmd: find /volume1/docker/immich/backups -name '*.sql.gz' -size +1M | grep .
    expect: '\.sql\.gz'
    severity: warn
    task_id: nas-08
    runbook: wiki/runbooks/backups.md
    enabled: true

  # nas-02: NAS Tier-1 Hyper Backup → Backblaze B2. Verified live 2026-07-13:
  # task "S3 Backup enc" (repo_3) targets s3.us-east-005.backblazeb2.com bucket
  # "bucket-hyper-backup" / TabaskaNAS_2.hbk, covering /backups /docker /docs
  # /homes /photo (so Immich app data + its DB dumps under /docker, Synology
  # Photos under /photo, docs, homes, and the HA off-eMMC backups under /backups
  # are all included). Both TLS-in-transit (trans_encrypt=true) AND client-side
  # DATA-AT-REST encryption ON (enable_data_encrypt=true; re-created 2026-07-13,
  # key in vault hosts.nas.hyperbackup_password + Bitwarden). The old unencrypted
  # "S3 Backup 1" / TabaskaNAS_1.hbk is being retired now that this completed.
  # NB the check globs ClientCache_cloud_image_aws_s3.* so it tracks whichever
  # task's cache is freshest — task-agnostic across re-creations.
  #
  # Success signal: last_version_inodedb in the client image cache is rewritten
  # only when a backup version COMPLETES, so its mtime = last successful run
  # (a failed run leaves the previous good version's mtime, which is what a
  # dead-man wants). It is world-readable under a 0777 dir, so the btabaska ssh
  # user (no sudo) can stat it — same non-sudo pattern as the immich checks.
  # Window 50h (3000m): the DSM Hyper Backup schedule cadence is kept in-package
  # and isn't exposed on the CLI; last observed success 2026-07-12 19:28. Tighten
  # to ~30h once the schedule is confirmed daily in the DSM UI. Negative-tested
  # 2026-07-13 (fresh->ok; -mmin -1 and a bogus path both ->BAD).
  - id: nas-hyperbackup-b2-fresh
    name: "NAS Tier-1 Hyper Backup -> B2 succeeded within 50h"
    host: nas
    cmd: >-
      find /volume1/@img_bkp_cache/ClientCache_cloud_image_aws_s3.*/last_version_inodedb -mmin -3000 2>/dev/null | grep -q . && echo tok=ok || echo tok=BAD
    expect: '^tok=ok$'
    severity: crit
    task_id: nas-02
    runbook: wiki/runbooks/backups.md
    enabled: true

  # fix-22 (H20): the ransomware-immutability guarantee, probed at the CONSUMER
  # end — not "is the config set" but "can the key in the vault actually delete
  # a backup". b2-bucket-guard.py asserts governance/30d default retention,
  # per-file retention on the newest packs, that the ops key is read-only, and
  # then ATTEMPTS a real b2_delete_file_version expecting HTTP 401. Runs on the
  # mini (daily untiered sweep) with B2_OPS_KEY_ID/B2_OPS_KEY from
  # /etc/verification/env — the scoped key created when the master key was
  # retired from the vault (2026-07-17).
  - id: b2-restic-immutable
    name: "bucket-restic is actually immutable (retention + live delete refused 401)"
    host: mini
    cmd: python3 /opt/verification/bin/b2-bucket-guard.py --immutable
    expect: '^IMMUTABLE'
    severity: crit
    task_id: fix-22
    runbook: wiki/runbooks/backup-restore.md
    enabled: true

  # fix-22 class check (L58/M37): cloud-surface coverage manifest. Every bucket
  # in the B2 account must match the EXPECTED policy dict in b2-bucket-guard.py
  # — an unknown bucket (the bucket-rustic typo class) or drifted lock/lifecycle
  # fails. bucket-hyper-backup is asserted in its DOCUMENTED accepted state
  # (no lock — retention would break HB Smart Recycle rotation).
  - id: b2-bucket-policy
    name: "B2 account bucket set + lock/lifecycle policy match the manifest"
    host: mini
    cmd: python3 /opt/verification/bin/b2-bucket-guard.py --policy
    expect: '^POLICY-OK'
    severity: warn
    task_id: fix-22
    runbook: wiki/runbooks/backup-restore.md
    enabled: true

  # fix-22 class check (L57): junk/test snapshots with synthetic hostnames fall
  # into their own `restic forget` group and are retained FOREVER (the ao-verify
  # leftovers). Root wrapper (same sudoers pattern as restic-latest-age) lists
  # snapshots live (~2-5s, nightly-warmed cache) and fails on any snapshot whose
  # hostname isn't a real fleet host or whose tags look like test junk.
  - id: restic-snapshot-hygiene-mini
    name: "mini restic repo: no synthetic-host/test junk snapshots"
    host: mini
    cmd: sudo -n /usr/local/bin/restic-snapshot-hygiene
    expect: '^HYGIENE-OK'
    severity: warn
    task_id: fix-22
    runbook: wiki/runbooks/backup-restore.md
    enabled: true

  - id: restic-snapshot-hygiene-rig
    name: "rig restic repo: no synthetic-host/test junk snapshots"
    host: rig
    cmd: sudo -n /usr/local/bin/restic-snapshot-hygiene
    expect: '^HYGIENE-OK'
    severity: warn
    task_id: fix-22
    runbook: wiki/runbooks/backup-restore.md
    enabled: true

  # ---- fix-42 (M52): the ansible backup role is the deployer of record ---------
  # Regression checks: every non-secret file roles/backup owns must be
  # BYTE-IDENTICAL to its source in the host's nightly ansible-pull checkout,
  # the timer enabled, and restic >= the pinned version. This probes the M52
  # failure shape at the consumer end: a role that silently no-ops (the
  # never-seeded SOPS gate) leaves a REBUILT host without these files — the
  # fix-20 rig rebuild lost ntfy-notify@ + the healthchecks drop-in exactly
  # this way and restic-backup-rig sat "down" unnoticed — and any hand-edit
  # that bypasses the repo shows up as drift within one pull cycle.
  # (/etc/restic/env and excludes.txt are root-only: the env is secret by
  # design; excludes converge nightly via ansible-pull and freshness is
  # asserted by restic-snapshot-fresh-*. The sudoers file is 0440 root but
  # proven live by every `sudo -n` wrapper check above.)
  - id: restic-role-matches-source-mini
    name: "mini restic deployment byte-matches roles/backup source (no drift, no no-op)"
    host: mini
    cmd: >-
      S=$HOME/.ansible-pull/foss-setup/scripts/backup; T=OK;
      cmp -s "$S/restic-backup.sh" /opt/scripts/restic-backup.sh || T=DRIFT-restic-backup.sh;
      cmp -s "$S/ntfy-notify.sh" /opt/scripts/ntfy-notify.sh || T=DRIFT-ntfy-notify.sh;
      cmp -s "$S/pre-backup-db-dumps.sh" /opt/scripts/pre-backup-db-dumps.sh || T=DRIFT-pre-backup;
      cmp -s "$S/restic-backup.service" /etc/systemd/system/restic-backup.service || T=DRIFT-service;
      cmp -s "$S/restic-backup.timer" /etc/systemd/system/restic-backup.timer || T=DRIFT-timer;
      cmp -s "$S/ntfy-notify@.service" /etc/systemd/system/ntfy-notify@.service || T=DRIFT-ntfy-unit;
      cmp -s "$S/restic-backup-healthchecks.conf" /etc/systemd/system/restic-backup.service.d/healthchecks.conf || T=DRIFT-dropin;
      cmp -s "$S/restic-latest-age.sh" /usr/local/bin/restic-latest-age || T=DRIFT-latest-age;
      cmp -s "$S/restic-snapshot-hygiene.sh" /usr/local/bin/restic-snapshot-hygiene || T=DRIFT-hygiene;
      systemctl is-enabled --quiet restic-backup.timer || T=TIMER-DISABLED;
      ! dpkg -s restic >/dev/null 2>&1 || T=APT-RESTIC-PRESENT;
      v=$(restic version 2>/dev/null | awk '{print $2}');
      [ "$(printf '0.19.1\n%s\n' "$v" | sort -V | head -1)" = "0.19.1" ] || T=RESTIC-OLD-$v;
      echo "RESTIC-ROLE-$T"
    expect: '^RESTIC-ROLE-OK$'
    severity: warn
    task_id: fix-42
    runbook: wiki/runbooks/backup-restore.md
    enabled: true

  - id: restic-role-matches-source-rig
    name: "rig restic deployment byte-matches roles/backup source (no drift, no no-op)"
    host: rig
    cmd: >-
      S=$HOME/.ansible-pull/foss-setup/scripts/backup; T=OK;
      cmp -s "$S/restic-backup.sh" /opt/scripts/restic-backup.sh || T=DRIFT-restic-backup.sh;
      cmp -s "$S/ntfy-notify.sh" /opt/scripts/ntfy-notify.sh || T=DRIFT-ntfy-notify.sh;
      cmp -s "$S/restic-backup.service" /etc/systemd/system/restic-backup.service || T=DRIFT-service;
      cmp -s "$S/restic-backup.timer" /etc/systemd/system/restic-backup.timer || T=DRIFT-timer;
      cmp -s "$S/ntfy-notify@.service" /etc/systemd/system/ntfy-notify@.service || T=DRIFT-ntfy-unit;
      cmp -s "$S/restic-backup-healthchecks.conf" /etc/systemd/system/restic-backup.service.d/healthchecks.conf || T=DRIFT-dropin;
      cmp -s "$S/restic-latest-age.sh" /usr/local/bin/restic-latest-age || T=DRIFT-latest-age;
      cmp -s "$S/restic-snapshot-hygiene.sh" /usr/local/bin/restic-snapshot-hygiene || T=DRIFT-hygiene;
      systemctl is-enabled --quiet restic-backup.timer || T=TIMER-DISABLED;
      v=$(restic version 2>/dev/null | awk '{print $2}');
      [ "$(printf '0.19.1\n%s\n' "$v" | sort -V | head -1)" = "0.19.1" ] || T=RESTIC-OLD-$v;
      echo "RESTIC-ROLE-$T"
    expect: '^RESTIC-ROLE-OK$'
    severity: warn
    task_id: fix-42
    runbook: wiki/runbooks/backup-restore.md
    enabled: true

  # fix-42 class check: whole-site convergence is REAL, not vacuous — a --check
  # run of the exact playbook ansible-pull applies nightly must report zero
  # pending changes and zero failures. Catches every sibling of the M52 class
  # (any role whose live state drifts from its ansible source, or whose gate
  # silently skips what a rebuild would need), not just backup. Mini-only: the
  # runner user has passwordless sudo here; the rig's convergence signal is
  # ansible-pull-ok-rig below + restic-role-matches-source-rig above.
  # `timeout:` is the per-check override added to checks_runner.py for this.
  - id: ansible-site-converged-mini
    name: "site.yml --check on mini: changed=0 failed=0 (live == ansible source)"
    host: mini
    timeout: 300
    cmd: >-
      cd $HOME/.ansible-pull/foss-setup/configs/ansible &&
      ansible-playbook -i inventory.ini --connection local --limit macmini --check site.yml 2>&1
      | grep -E '^macmini' | tail -1
    expect: 'changed=0\s+unreachable=0\s+failed=0'
    severity: warn
    task_id: fix-42
    runbook: wiki/runbooks/backup-restore.md
    enabled: true

  # fix-42: the rig's nightly ansible-pull is the mechanism that keeps its DR
  # state converged (mini already has sys-ansible-pull) — if it breaks, drift
  # accumulates silently until the next rebuild hurts.
  - id: ansible-pull-ok-rig
    name: "ansible-pull last run on rig succeeded (DR convergence loop alive)"
    host: rig
    cmd: systemctl show ansible-pull.service -p ExecMainStatus
    expect: '^ExecMainStatus=0$'
    severity: crit
    task_id: fix-42
    runbook: wiki/runbooks/backup-restore.md
    enabled: true
