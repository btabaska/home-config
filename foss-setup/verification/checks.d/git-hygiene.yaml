# Git hygiene on mini: config-managed dirs must be committed.
# btabaska has passwordless sudo on mini; sudo is needed to stat root-owned volume dirs.
checks:
  - id: git-stacks-clean
    name: "/opt/stacks working tree is clean"
    host: mini
    cmd: sudo git -C /opt/stacks status --porcelain | wc -l
    expect: '^0$'
    severity: warn
    task_id: docker-12
    runbook: wiki/docs/runbooks/git-hygiene.md
    enabled: true

  - id: git-foss-setup-clean
    name: "/opt/foss-setup working tree is clean"
    host: mini
    cmd: sudo git -C /opt/foss-setup status --porcelain | wc -l
    expect: '^0$'
    severity: warn
    task_id: glue-08
    runbook: wiki/docs/runbooks/git-hygiene.md
    enabled: true

  # `etckeeper unclean` exits 0 when /etc is DIRTY, 1 when clean — so we expect exit 1.
  - id: git-etckeeper-clean
    name: "/etc committed in etckeeper (no uncommitted drift)"
    host: mini
    cmd: sudo etckeeper unclean
    expect_exit: 1
    severity: warn
    task_id: glue-01
    runbook: wiki/docs/runbooks/git-hygiene.md
    enabled: true

  # wiki-05 "same-commit rule": any change to a source that feeds a generated wiki
  # page (tasks/progress JSON, checks.d/*.yaml, the docker-stack service catalog +
  # enrichment, or a script) must regenerate that page IN THE SAME COMMIT. This
  # proves it against the CURRENT forgejo HEAD: a cache clone (forgejo is on this
  # host, so fetch is local + fast) is fast-forwarded to HEAD, then
  # wiki-drift-check.sh checks HEAD out into a throwaway worktree, re-runs every
  # page generator, and diffs. exit 1 (=> check fail) means a source changed but its
  # generated page did not. Heavier than a probe (clone/regenerate) — daily sweep.
  - id: wiki-drift
    name: "wiki generated pages in sync with sources (same-commit rule)"
    host: mini
    cmd: >-
      D=/var/lib/verification/wiki-drift-repo;
      { git -C "$D" rev-parse --git-dir >/dev/null 2>&1 || { rm -rf "$D"; git clone -q forgejo:home/homelab "$D"; }; } &&
      git -C "$D" fetch -q origin main &&
      git -C "$D" reset --hard -q FETCH_HEAD &&
      git -C "$D" worktree prune 2>/dev/null &&
      bash "$D/foss-setup/scripts/wiki/wiki-drift-check.sh"
    expect_exit: 0
    severity: warn
    task_id: wiki-05
    runbook: wiki/docs/runbooks/git-hygiene.md
    enabled: true

  # fix-41 (classes M48/M51): every live mini stack with a top-level compose must
  # have a byte-identical mirror at configs/docker-stack/stacks/<name>/ keeping
  # the SAME filename, and every live .env key must appear in the repo
  # .env.example (one-way: live-only keys are what a rebuild silently drops —
  # this is how caddy ACME_EMAIL, musicseerr LIDARR_API_KEY, navidrome
  # ND_BACKUP_*, ntfy NTFY_UPSTREAM_BASE_URL went missing, and how the forgejo
  # mirror hid unfound in configs/git/ for weeks). Judged against a fetched
  # origin/main clone (shared cache dir with wiki-drift; the runner is
  # sequential and both reset --hard to FETCH_HEAD first). Clone/fetch runs
  # unprivileged (root has no forgejo ssh alias); the script runs under sudo to
  # read every stack's .env.
  - id: stack-mirror-drift
    name: "every live mini stack byte-mirrored in repo (+ .env keys in example)"
    host: mini
    cmd: >-
      D=/var/lib/verification/wiki-drift-repo;
      { git -C "$D" rev-parse --git-dir >/dev/null 2>&1 || { rm -rf "$D"; git clone -q forgejo:home/homelab "$D"; }; } &&
      git -C "$D" fetch -q origin main &&
      git -C "$D" reset --hard -q FETCH_HEAD &&
      sudo bash "$D/foss-setup/scripts/verification/stack-mirror-check.sh" mirrors
    expect: STACK-MIRRORS-OK
    severity: warn
    task_id: fix-41
    runbook: wiki/docs/runbooks/git-hygiene.md
    enabled: true

  # fix-41 (class M49): hosts/macmini/compose-images.txt must contain exactly the
  # image NAMES present in live top-level compose files — no phantoms from
  # recursive-grep sweep-ins (.bak copies, recyclarr's embedded trash-guides
  # clone, the built wiki site) and nothing live left unlisted. Names, not pins:
  # weekly-snapshot pin lag is expected; a name mismatch is pollution or a
  # missed add/retire (100%-coverage tripwire).
  - id: manifest-image-purity
    name: "compose-images.txt image names == live top-level compose image names"
    host: mini
    cmd: >-
      D=/var/lib/verification/wiki-drift-repo;
      { git -C "$D" rev-parse --git-dir >/dev/null 2>&1 || { rm -rf "$D"; git clone -q forgejo:home/homelab "$D"; }; } &&
      git -C "$D" fetch -q origin main &&
      git -C "$D" reset --hard -q FETCH_HEAD &&
      sudo bash "$D/foss-setup/scripts/verification/stack-mirror-check.sh" manifest
    expect: MANIFEST-PURITY-OK
    severity: warn
    task_id: fix-41
    runbook: wiki/docs/runbooks/git-hygiene.md
    enabled: true

  # fix-43 (class of L68): tracked-but-ignored files hide from `git status` yet
  # ship in every clone — 4 compiled __pycache__ .pyc files sat in the index for
  # weeks because they were committed before the ignore rule landed. Property of
  # index + .gitignore, so the fetched cache clone is authoritative.
  - id: repo-tracked-ignored
    name: "no tracked-but-ignored files in the homelab repo (L68 class)"
    host: mini
    cmd: >-
      D=/var/lib/verification/wiki-drift-repo;
      { git -C "$D" rev-parse --git-dir >/dev/null 2>&1 || { rm -rf "$D"; git clone -q forgejo:home/homelab "$D"; }; } &&
      git -C "$D" fetch -q origin main &&
      git -C "$D" reset --hard -q FETCH_HEAD &&
      git -C "$D" ls-files -i -c --exclude-standard | wc -l
    expect: '^0$'
    severity: warn
    task_id: fix-43
    runbook: wiki/docs/runbooks/git-hygiene.md
    enabled: true

  # fix-43 (regression for L77/L78): the generated tracker views must stay
  # arithmetically consistent with tasks.json + progress.json — dual-status
  # tasks (done AND retired, e.g. sbom-01/04) count exactly once (retired wins),
  # todo.md's summary line adds up and matches a fresh recount, and the wiki
  # roadmap index has no negative Open cell (the exact L77 symptom).
  - id: tracker-count-sanity
    name: "tracker views arithmetically consistent with tasks/progress JSONs"
    host: mini
    cmd: >-
      D=/var/lib/verification/wiki-drift-repo;
      { git -C "$D" rev-parse --git-dir >/dev/null 2>&1 || { rm -rf "$D"; git clone -q forgejo:home/homelab "$D"; }; } &&
      git -C "$D" fetch -q origin main &&
      git -C "$D" reset --hard -q FETCH_HEAD &&
      python3 "$D/foss-setup/scripts/verification/tracker-count-check.py" "$D"
    expect: TRACKER-COUNTS-OK
    severity: warn
    task_id: fix-43
    runbook: wiki/docs/runbooks/git-hygiene.md
    enabled: true

  # fix-44 (M46 class): tracker-count-sanity proves the generated VIEWS match
  # the JSONs; this proves the JSON SOURCES themselves are coherent — every
  # done/retired/deferred/reopened id resolves to a task definition (the
  # nas-00e orphan-id regression), no duplicate task ids, no contradictory
  # status combos, and the vestigial _meta task_count/completed_count fields
  # (removed by fix-44: no code consumer, they only drifted) stay dead.
  - id: tracker-integrity
    name: "tracker JSON sources coherent (ids resolve, no dup/contradiction, _meta counts dead)"
    host: mini
    cmd: >-
      D=/var/lib/verification/wiki-drift-repo;
      { git -C "$D" rev-parse --git-dir >/dev/null 2>&1 || { rm -rf "$D"; git clone -q forgejo:home/homelab "$D"; }; } &&
      git -C "$D" fetch -q origin main &&
      git -C "$D" reset --hard -q FETCH_HEAD &&
      python3 "$D/foss-setup/scripts/verification/tracker-integrity.py"
    expect: 'tracker coherent'
    severity: warn
    task_id: fix-44
    runbook: wiki/docs/runbooks/git-hygiene.md
    enabled: true

  # fix-43 (class of L86): hand-copied systemd unit files (ansible-pull
  # service+timer on mini AND rig) must stay byte-identical to the repo copy —
  # nothing in site.yml converges them, so drift is silent until a run misses
  # (the 2026-07-15 stale-playbook-path failure, L6). Unreachable rig = fail.
  - id: unit-file-drift
    name: "deployed ansible-pull units byte-match the repo on mini + rig (L86 class)"
    host: mini
    cmd: >-
      D=/var/lib/verification/wiki-drift-repo;
      { git -C "$D" rev-parse --git-dir >/dev/null 2>&1 || { rm -rf "$D"; git clone -q forgejo:home/homelab "$D"; }; } &&
      git -C "$D" fetch -q origin main &&
      git -C "$D" reset --hard -q FETCH_HEAD &&
      bash "$D/foss-setup/scripts/verification/unit-drift-check.sh" "$D"
    expect: UNIT-DRIFT-OK
    severity: warn
    task_id: fix-43
    runbook: wiki/docs/runbooks/git-hygiene.md
    enabled: true
