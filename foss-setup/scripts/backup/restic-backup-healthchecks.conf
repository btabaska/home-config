# Dead-man ping to self-hosted Healthchecks — success-only: ExecStartPost runs
# only after ExecStart (incl. the final `restic check`) exited 0, so a failed
# or missed night never pings and the check pages after its grace window.
#
# The per-host ping URL is a SECRET and lives as RESTIC_HC_URL in
# /etc/restic/env (root 0600; vault healthchecks.restic_{mini,rig}_ping_url) —
# NOT in this file, which roles/backup installs VERBATIM on every host.
# fix-42/M52: the old mini drop-in hardcoded the URL as an unmirrored hand-edit
# (fix-30's placeholder-URL lesson), and the rig lost its copy entirely in the
# fix-20 rebuild — restic-backup-rig sat "down" with nobody pinging it.
#
# The shell sources the env ITSELF — deliberately NO EnvironmentFile= here:
# systemd's EnvironmentFile parser logs every line it rejects (e.g. the rig
# env's `export KEY=` style) VERBATIM to the journal, which leaked the restic
# password + B2 keys on 2026-07-19. sh handles either style silently, and the
# secrets stay inside this one process. No RESTIC_HC_URL in the env → no-op
# (a host without a minted check must not fail its backups over a missing URL).
[Service]
ExecStartPost=/bin/sh -c '[ -r /etc/restic/env ] && . /etc/restic/env; [ -z "$${RESTIC_HC_URL}" ] || curl -fsS -m 10 --retry 3 -o /dev/null "$${RESTIC_HC_URL}"'
