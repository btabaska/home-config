site_name: Going Analogue — Homelab Manual
site_description: >-
  Operations manual for the tabaska.us homelab — for the human operator and
  for AI agents. Source of truth for how to run, check, fix, and rebuild
  everything.
site_url: https://wiki.tabaska.us/
repo_url: https://github.com/btabaska/home-config
repo_name: btabaska/home-config
edit_uri: ""

theme:
  name: material
  palette:
    # Dark by default (matches the rollout tracker), light available.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true

