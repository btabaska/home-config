# RomM — self-hosted ROM manager + web library (retro-02 / game-14)
# Docs: https://docs.romm.app  ·  Image: rommapp/romm
#
# Metadata comes from IGDB (Twitch app creds in the vault: igdb.client_id /
# igdb.client_secret). Redis is bundled inside the romm image (romm_redis_data),
# so only a MariaDB sidecar is needed.
#
# ROM library lives on the NAS `games` share, mounted rw on the mini at
# /mnt/share/Games (CIFS, uid=1000). RomM reads /romm/library, which must
# contain a `roms/<platform>/` tree — see README + the NAS layout under
# /mnt/share/Games/romm/. Saves/states/config stay on local disk.
#
# Fronted by Caddy at romm.tabaska.us (edge network, real cert via DNS-01).

networks:
  edge:
    external: true
  romm-internal:
    # Pin an explicit subnet: the default 172.x pools are exhausted on the mini,
    # so docker otherwise auto-allocates into 192.168.x and squats the LAN/IoT
    # VLAN (192.168.16.0/20 overlaps IoT 192.168.20.x). Sits in a free slice of
    # 172.19 alongside paperless (.10) and kometa (.20). Until fix-19
    # (default-address-pools) lands, new stacks with private nets must pin one.
    ipam:
      config:
        - subnet: 172.19.30.0/24

volumes:
  romm_resources:
  romm_redis_data:
  romm_db_data:

services:
  romm:
    image: rommapp/romm:4.9.2   # pinned 2026-07-14 (was :latest) — avoid a jump onto the 5.0 redesign/beta (sync API changed); Diun watches for updates
    container_name: romm
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
      - DB_HOST=romm-db
      - DB_NAME=romm
      - DB_USER=romm-user
      - DB_PASSWD=${ROMM_DB_PASSWD}
      - ROMM_AUTH_SECRET_KEY=${ROMM_AUTH_SECRET_KEY}
      - IGDB_CLIENT_ID=${IGDB_CLIENT_ID}
      - IGDB_CLIENT_SECRET=${IGDB_CLIENT_SECRET}
      - HASHEOUS_API_ENABLED=true
    volumes:
      - romm_resources:/romm/resources        # IGDB covers/screenshots
      - romm_redis_data:/redis-data            # bundled redis cache
      - /mnt/share/Games/romm:/romm/library    # ROMs (NAS games share)
      - ./assets:/romm/assets                  # uploaded saves/states
      - ./config:/romm/config                  # optional config.yml
    ports:
      - "8998:8080"                            # direct LAN; Caddy fronts romm.<domain>
    networks:
      - edge
      - romm-internal
    depends_on:
      romm-db:
        condition: service_healthy

  romm-db:
    image: mariadb:11
    container_name: romm-db
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${ROMM_DB_ROOT_PASSWD}
      - MARIADB_DATABASE=romm
      - MARIADB_USER=romm-user
      - MARIADB_PASSWORD=${ROMM_DB_PASSWD}
    volumes:
      - romm_db_data:/var/lib/mysql
    networks:
      - romm-internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 5
