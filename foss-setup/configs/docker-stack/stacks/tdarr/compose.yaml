# Tdarr — distributed audio/video transcoding automation (server + local node)
# Phase 4. Docs: https://docs.tdarr.io/
#
# This deploys the Tdarr SERVER + WebUI on the NAS (light; next to the media library).
#   - 8265: Web UI (browse here)
#   - 8266: server <-> node communication
# Set MEDIA_FOLDER to the library Tdarr watches (vol2/vol3 paths on the NAS).
# TRANSCODE_CACHE should be fast local scratch on the node doing the work.
#
# ── NVENC NODE (CachyOS rig) ────────────────────────────────────────────────
# Heavy/bulk transcodes offload to the CachyOS gaming rig using NVENC. Only run
# when the rig is awake — start manually / on Wake-on-LAN, not restart: unless-stopped.
#
#   services:
#     tdarr-node-nvenc:
#       image: ghcr.io/haveagitgat/tdarr_node:2.78.01   # keep in lockstep with the server tag
#       container_name: tdarr-node-nvenc
#       restart: "no"            # only up while the rig is awake
#       network_mode: host
#       environment:
#         - TZ=America/New_York
#         - PUID=1000
#         - PGID=1000
#         - nodeName=cachyos-nvenc
#         - serverIP=<mac-mini-tailscale-ip>   # reach the server over Tailscale
#         - serverPort=8266
#         - inContainer=true
#         - ffmpegVersion=7
#         - nodeType=mapped
#         - NVIDIA_DRIVER_CAPABILITIES=all
#         - NVIDIA_VISIBLE_DEVICES=all
#       deploy:
#         resources:
#           reservations:
#             devices:
#               - capabilities: [gpu]
#       volumes:
#         - ./configs:/app/configs
#         - ./logs:/app/logs
#         - <same media path>:/media
#         - <fast local scratch>:/temp
# ────────────────────────────────────────────────────────────────────────────

services:
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:2.78.01
    container_name: tdarr
    restart: unless-stopped
    ports:
      - "8265:8265" # Web UI; also fronted by Caddy at tdarr.<domain>
      - "8266:8266" # server <-> node communication
    environment:
      - TZ=${TZ:-America/New_York}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UMASK_SET=002
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true # run a built-in CPU node alongside the server
      - inContainer=true
      - ffmpegVersion=7
      - nodeName=macmini-internal
    volumes:
      - ./server:/app/server
      - ./configs:/app/configs
      - ./logs:/app/logs
      - ${MEDIA_FOLDER:?set MEDIA_FOLDER to your media library path}:/media
      - ${TRANSCODE_CACHE:-./transcode_cache}:/temp # fast LOCAL scratch
    networks:
      - edge

networks:
  edge:
    external: true
