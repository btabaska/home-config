# AdGuard Home — SECONDARY network DNS (NAS)
#
# Purpose: DHCP DNS #2 — survives Mac mini reboots. Must NOT depend on mini Unbound.
# Upstream: Quad9 DoH (https://dns10.quad9.net/dns-query). Mirror *.tabaska.us
# rewrites from mini AdGuard (dns-02 / dns-03).
#
# Deploy on Synology from /volume1/docker/adguard-nas/
#   sudo /usr/local/bin/docker-compose -f /volume1/docker/adguard-nas/compose.yaml up -d
# LAN IP: 192.168.10.4 (NAS eth1 on Trusted VLAN)
#
# network_mode: host (fix-40 / M28, 2026-07-19): real client IPs reach AdGuard so
# per-client stats, client rules and querylog forensics work. The previous bridge
# publish collapsed every client to the docker gateway 172.23.0.1.
# Binds on the host: 53/tcp+udp (DNS), 3000/tcp (admin UI) — AdGuardHome.yaml
# binds 0.0.0.0 for both; verified free of DSM conflicts before the switch.
#
# First run: complete setup wizard at http://192.168.10.4:3000

services:
  adguardhome:
    image: adguard/adguardhome:v0.107.77
    container_name: adguardhome-nas
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./work:/opt/adguardhome/work
      - ./conf:/opt/adguardhome/conf
