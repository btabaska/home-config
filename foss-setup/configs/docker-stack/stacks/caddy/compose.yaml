# Caddy — reverse proxy with automatic HTTPS
# Phase 4. Docs: https://hub.docker.com/_/caddy  https://caddyserver.com/docs/
#
# Caddy and every web service share the external `edge` network, so Caddy can
# reach each container by name (e.g. seerr:5055). Create it once on the host:
#   docker network create edge
#
# TLS strategy (pick one in Caddyfile):
#  - Wildcard certs via DNS-01 (recommended for internal-only services that
#    aren't reachable for HTTP-01). This needs the Cloudflare DNS module, which
#    is NOT in the stock image. The shipped Caddyfile uses `import cloudflare_tls`
#    → `dns cloudflare`, so we build a custom image with that module by default
#    (see ./Dockerfile). The stock image would fail to parse the Caddyfile and the
#    whole reverse proxy would never start.
#  - `tls internal` (Caddy's own CA) for purely-local access — no public DNS needed,
#    but clients must trust Caddy's root CA. If you switch the Caddyfile to that and
#    drop the cloudflare directives, you can use the stock image instead (below).

services:
  caddy:
    # Custom build with the Cloudflare DNS module (required by the shipped Caddyfile).
    build: .
    # image: caddy:2.11.4-alpine   # <- stock image alternative: only works if the
                                    #    Caddyfile drops the cloudflare_tls/dns cloudflare directives
    container_name: caddy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN # lets HTTP/3 (QUIC) raise UDP buffer sizes
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      - DOMAIN=${DOMAIN:-example.com}
      - ACME_EMAIL=${ACME_EMAIL}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - NAS_IP=${NAS_IP:-} # optional: only for upstreams you offload to the NAS
      - RIG_IP=${RIG_IP:-}
      - HA_IP=${HA_IP:-} # Home Assistant host (ha.<domain>)
      - SEEDBOX_IP=${SEEDBOX_IP:-} # Betty Tailscale IP (Deluge + slskd)
      - HOST_IP=${HOST_IP:-} # Mac mini LAN IP for host-network stacks (e.g. MeTube)
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/stacks/wiki/site:/srv/wiki:ro # static wiki (built by the wiki stack; 404 until populated)
      - caddy_data:/data # certs & keys — treat as non-ephemeral (avoids LE rate limits)
      - caddy_config:/config
    networks:
      - edge

networks:
  edge:
    external: true

volumes:
  caddy_data:
  caddy_config:
