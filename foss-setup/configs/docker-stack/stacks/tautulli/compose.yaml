# Tautulli — Plex monitoring, history & analytics
# Phase 4. Docs: https://github.com/Tautulli/Tautulli/wiki
#
# Runs on this always-on Mac mini and watches the Plex Media Server (which may
# live on another host/LAN IP). Point Tautulli at Plex from its first-run wizard;
# it stores watch history, stats and notification rules under ./config.

services:
  tautulli:
    image: ghcr.io/tautulli/tautulli:v2.17.2
    container_name: tautulli
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    ports:
      - "8181:8181" # direct LAN access; also fronted by Caddy at tautulli.<domain>
    volumes:
      - ./config:/config
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8181/status || exit 1"]
      start_period: 30s
      timeout: 5s
      interval: 30s
      retries: 3

networks:
  edge:
    external: true
