# Navidrome — self-hosted music streaming (Subsonic/OpenSubsonic API)
# Phase 3. Docs: https://www.navidrome.org/docs/installation/docker/
#
# Point ND_MUSIC_FOLDER at your music library (e.g. an NFS/SMB mount from the NAS),
# mounted read-only. Set `user` to the UID:GID that owns ./data.

services:
  navidrome:
    image: deluan/navidrome:0.62.0  # includes security fixes (auth/IDOR); bump deliberately
    container_name: navidrome
    user: "${PUID:-1000}:${PGID:-1000}" # must own ./data
    restart: unless-stopped
    ports:
      - "4533:4533" # direct LAN access for Symfonium/Amperfy; also fronted by Caddy
    environment:
      ND_BACKUP_SCHEDULE: "${ND_BACKUP_SCHEDULE:-}"
      ND_BACKUP_COUNT: "${ND_BACKUP_COUNT:-0}"
      # fix-37 (M15): schedule+count alone silently no-op — Navidrome logs
      # "Periodic backup is DISABLED" unless a backup path is ALSO set. Fixed to
      # the ./backup mount below; the navidrome-backup-fresh check probes the
      # consumer end (a recent backup file actually on disk).
      ND_BACKUP_PATH: /backup
      ND_ENABLEINSIGHTSCOLLECTOR: "${ND_ENABLEINSIGHTSCOLLECTOR:-true}"
      ND_SCANNER_SCHEDULE: "@every 1h"   # 0.62 new-scanner key; ND_SCANSCHEDULE was ignored -> periodic scan disabled
      ND_SCANNER_WATCHERWAIT: "0"           # fs watcher unreliable/EBADF over CIFS; rely on periodic full scan
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ${ND_BASEURL:-}
      ND_MUSICFOLDER: /music
      # fix-28 (M-hygiene): the NAS music mount exposes Synology's #recycle bin;
      # Navidrome had indexed 2 user-deleted tracks from #recycle as live library rows.
      # NOTE: the 0.62 "new scanner" does NOT honor ND_IGNOREDPATTERNS (same story as
      # ND_SCANSCHEDULE above). The working guard is an empty `.ndignore` marker at the
      # folder root on the NAS -> /volume1/music/#recycle/.ndignore (skips the whole
      # folder). This env is kept as a documented legacy-scanner fallback; the
      # navidrome-recycle-rows verification check enforces 0 rows under #recycle.
      ND_IGNOREDPATTERNS: "#recycle/**"
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./data:/data
      - ./backup:/backup   # fix-37 (M15): nightly sqlite backups land here (restic picks up /opt/stacks)
      - ${MUSIC_FOLDER:?set MUSIC_FOLDER to your music library path}:/music:ro
    # fix-28 follow-through: image shipped no HEALTHCHECK, so Docker only knew
    # "running" not "healthy". /ping is Navidrome's readiness endpoint (200 ".").
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4533/ping"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - edge

networks:
  edge:
    external: true
