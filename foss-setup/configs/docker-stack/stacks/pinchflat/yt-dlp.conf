# Global yt-dlp config baked into the pinchflat image. Alternate player clients
# sidestep YouTube's JS-challenge 403; nightly yt-dlp (see Dockerfile) solves the
# n-signature. The bgutil plugin (see Dockerfile) fetches PO tokens from the
# bgutil-pot container for "Sign in to confirm you're not a bot" checks —
# fix-37 (M14): this line was missing and bot-checked videos stranded forever.
--extractor-args "youtube:player_client=default,tv,web_safari"
--extractor-args "youtubepot-bgutilhttp:base_url=http://bgutil-pot:4416"
