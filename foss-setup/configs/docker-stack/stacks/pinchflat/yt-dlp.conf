# Global yt-dlp config baked into the pinchflat image. Alternate player clients
# sidestep YouTube's JS-challenge 403; nightly yt-dlp (see Dockerfile) solves the
# n-signature. If a specific video still fails, the bgutil PO-token provider
# container (bgutil-pot:4416) is available — add the plugin + base_url arg then.
--extractor-args "youtube:player_client=default,tv,web_safari"
