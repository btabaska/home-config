# Unbound recursive resolver config for the homelab.
# Docs: https://docs.pi-hole.net/guides/dns/unbound/
#       https://unbound.docs.nlnetlabs.nl/en/latest/manpages/unbound.conf.html
#
# Listens on 5335 so AdGuard/Pi-hole forward here (127.0.0.1#5335) for recursive,
# DNSSEC-validated lookups. Tuned for a small home network.

server:
    # Run inside the container; listen on all interfaces on the alt DNS port.
    interface: 0.0.0.0
    port: 5335
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Trust queries only from localhost + RFC1918 LAN ranges; refuse the internet.
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: 0.0.0.0/0 refuse

    # --- DNSSEC ----------------------------------------------------------------
    # Auto-maintained root trust anchor (RFC 5011). Path is writable by Unbound.
    auto-trust-anchor-file: "/opt/unbound/etc/unbound/root.key"

    # --- Privacy / hardening ---------------------------------------------------
    qname-minimisation: yes        # send minimal query names to upstream authorities
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-referral-path: yes
    use-caps-for-id: no            # 0x20 randomisation; off to avoid broken auths
    hide-identity: yes
    hide-version: yes

    # --- Performance / caching -------------------------------------------------
    prefetch: yes                  # refresh popular records before they expire
    prefetch-key: yes
    cache-min-ttl: 300
    cache-max-ttl: 86400
    num-threads: 2
    msg-cache-size: 64m
    rrset-cache-size: 128m
    so-rcvbuf: 4m

    # Don't answer for private ranges that leaked upstream (rebind protection).
    # AdGuard/Pi-hole handle local names; keep these unblocked if you serve them.
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10

    # EDNS buffer sized to avoid fragmentation on most paths.
    edns-buffer-size: 1232

    # Logging: quiet by default. Bump verbosity for debugging only.
    verbosity: 0
    logfile: ""

    # Optional: serve stale answers briefly if upstream is unreachable.
    serve-expired: yes
    serve-expired-ttl: 3600

# No forward-zone block on purpose: this resolver is fully RECURSIVE (it talks to
# the root + authoritative servers directly). Adding a forward-zone would defeat
# the point. The built-in root hints shipped with Unbound are used automatically.
