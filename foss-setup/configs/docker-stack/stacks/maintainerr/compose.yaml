# Maintainerr — rule-based Plex library pruning ("Seerr in reverse")
# Phase 4. Docs: https://docs.maintainerr.info/
#
# Builds smart collections from rules (last-watched, added date, request source,
# etc.) and cleans up media after a grace period. It connects to Plex + Seerr and
# the seedbox *arrs (Sonarr/Radarr) — reach those over Tailscale (*.ts.net).
# Configure all integrations from the web UI after first boot.
#
# NOTE: the image moved to ghcr.io/maintainerr/maintainerr; the jorenn92 repo is
# still synced for now. Bump the tag deliberately after reading release notes.

services:
  maintainerr:
    image: ghcr.io/jorenn92/maintainerr:v3.15.2
    container_name: maintainerr
    user: "${PUID:-1000}:${PGID:-1000}" # must own ./data
    restart: unless-stopped
    ports:
      - "6246:6246" # direct LAN access; also fronted by Caddy at maintainerr.<domain>
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./data:/opt/data
    networks:
      - edge

networks:
  edge:
    external: true
