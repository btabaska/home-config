# NOT DEPLOYED — never ran here; the live LiteLLM is a different deployment on the rig (llm.tabaska.us → rig:4000, local-ai-tooling repo). Decision pending (2026-07-09 audit): deploy this as the resilience fallback described below, or remove the dir.
#
# LiteLLM — OpenAI-compatible AI gateway with automatic fallback
# Phase 2. Docs: https://docs.litellm.ai/docs/proxy/reliability
#
# WHY THIS EXISTS — one stable endpoint, two brains:
#   The CachyOS gaming rig has the big GPU and runs a large Ollama model
#   (e.g. qwen2.5:14b), and it runs 24/7 (decision 2026-07-08). The Mac mini
#   also runs a small Ollama model (llama3.2:3b) 24/7. LiteLLM publishes a
#   SINGLE OpenAI-compatible URL (http://<mac-mini>:4000) that:
#     - routes requests to the rig's big model (the primary), and
#     - FALLS BACK to the Mac mini's small model for RESILIENCE if the rig is
#       ever unreachable (that's an incident now, not expected — the fallback
#       just keeps AI clients degraded-but-working while you fix it).
#   Point all clients (Open WebUI, scripts, IDE) at this one URL. Wake-on-LAN
#   is retained as recovery tooling only.
#
# Config lives in ./config.yaml (mounted read-only) and is passed via --config.

services:
  litellm:
    image: ghcr.io/berriai/litellm:v1.88.2
    container_name: litellm
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000" # direct LAN access; also fronted by Caddy at llm.<domain>
    environment:
      - TZ=${TZ:-America/New_York}
      # Master key clients must send as the OpenAI API key (Bearer). Must start with "sk-".
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    # On native Linux Docker `host.docker.internal` is NOT defined by default, so the
    # Mac-mini host Ollama fallback (api_base: http://host.docker.internal:11434)
    # would never resolve. This maps it to the host gateway so the fallback works.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:4000/health/liveliness || exit 1"]
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  edge:
    external: true
