# LiteLLM proxy config — primary (rig) with fallback (Mac mini).
# Docs: https://docs.litellm.ai/docs/proxy/reliability
#       https://docs.litellm.ai/docs/providers/ollama
#
# Both entries advertise the SAME public model name ("home-llm") so clients ask
# for "home-llm" and the router decides which backend serves it. `order:` makes the
# rig the strictly-preferred deployment (order 1) and the Mac mini a resilience
# fallback (order 2) — without it, simple-shuffle would send ~50% of traffic to
# the small mini model even when the rig is healthy. The rig runs 24/7 now; the
# fallback only carries traffic during an incident (rig down = incident).
#
# Replace RIG_IP with the gaming rig's Tailscale/LAN IP. "localhost" inside this
# container is the container itself, so the Mac-mini host Ollama is reached via
# host.docker.internal — which requires the `extra_hosts: host.docker.internal:
# host-gateway` mapping in compose.yaml on native Linux Docker (not auto-defined
# there). The host Ollama must also LISTEN on all interfaces, not just loopback:
# set OLLAMA_HOST=0.0.0.0 on the Mac mini (and allow port 11434 in its firewall),
# otherwise the gateway-routed request is refused.

model_list:
  # --- PRIMARY: big model on the CachyOS rig's GPU (rig runs 24/7) -------------
  - model_name: home-llm
    litellm_params:
      model: ollama/qwen2.5:14b
      api_base: http://RIG_IP:11434   # <-- set to the rig's Tailscale/LAN IP
      order: 1                        # preferred deployment
    model_info:
      id: rig-qwen14b

  # --- FALLBACK: small model on the Mac mini (resilience if the rig is down) ---
  - model_name: home-llm
    litellm_params:
      model: ollama/llama3.2:1b        # tiny ≤1B model — the 8GB Mac mini cannot hold more (see capacity note)
      api_base: http://host.docker.internal:11434  # Mac mini host Ollama (needs OLLAMA_HOST=0.0.0.0)
      order: 2                        # only used when the rig (order 1) is unreachable (incident)
    model_info:
      id: macmini-llama3b

router_settings:
  # Keep retries low so an unreachable rig fails over fast instead of hanging.
  num_retries: 1
  # Per-request timeout (seconds). Raised from 15 to 40 so a cold 14B model load
  # on the rig isn't mistaken for a failure and prematurely failed over.
  timeout: 40
  # `order:` on each deployment (above) sets strict priority; simple-shuffle only
  # breaks ties among same-order deployments.
  routing_strategy: simple-shuffle
