# LiteLLM proxy config — primary (rig) with fallback (Mac mini).
# Docs: https://docs.litellm.ai/docs/proxy/reliability
#       https://docs.litellm.ai/docs/providers/ollama
#
# Both entries advertise the SAME public model name ("home-llm") so clients ask
# for "home-llm" and the router decides which backend serves it. The big model on
# the rig is preferred; when the rig is asleep its request times out and the
# router fails over to the small always-on model on the Mac mini.
#
# Replace RIG_IP with the gaming rig's Tailscale/LAN IP. "localhost" inside this
# container is the container itself, so the Mac-mini Ollama is reached via
# host.docker.internal (Docker maps it to the host that runs this stack).

model_list:
  # --- PRIMARY: big model on the CachyOS rig's GPU (only awake on demand) ------
  - model_name: home-llm
    litellm_params:
      model: ollama/qwen2.5:14b
      api_base: http://RIG_IP:11434   # <-- set to the rig's Tailscale/LAN IP
    model_info:
      id: rig-qwen14b

  # --- FALLBACK: small model always-on on the Mac mini -------------------------
  - model_name: home-llm
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://host.docker.internal:11434  # Mac mini host Ollama
    model_info:
      id: macmini-llama3b

router_settings:
  # Try the primary deployment first, then this fallback list for "home-llm".
  fallbacks:
    - home-llm: ["home-llm"]
  # Keep retries low so a sleeping rig fails over fast instead of hanging.
  num_retries: 1
  # Per-request timeout (seconds). A sleeping rig won't answer within this, which
  # trips the fallback to the Mac mini's small model.
  timeout: 15
  # Prefer the deployment with capacity/lowest latency among same-named models.
  routing_strategy: simple-shuffle
