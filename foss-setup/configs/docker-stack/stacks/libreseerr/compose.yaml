# Libreseerr — book request portal (Readarr / Bookshelf / LazyLibrarian)
# Phase 2 (ebook-mgmt workstream). Seerr = movies/TV; MusicSeerr = music; Libreseerr = books.
# Docs: https://github.com/zamnzim/Libreseerr
#
# Runs on the Mac mini alongside Seerr + MusicSeerr. Talks to Readarr on the NAS (:8787).

services:
  libreseerr:
    # Upstream publishes no version tags — pinned by digest to the image running
    # on the mini as of 2026-07-09 (was :latest). Bump the digest deliberately.
    # NOTE: the 2026-07-07 pin (sha256:820134e4…) was never deployed to
    # mini:/opt/stacks and the container had moved on to a newer image; re-pinned
    # to the digest actually running (docs-debt audit 2026-07-09).
    image: ghcr.io/zamnzim/libreseerr@sha256:c2dbf74a5ab6b72b4f7083c646ac2fa0d8db5a7291b0fb0e0e9f481bccad179b
    container_name: libreseerr
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY in .env — openssl rand -hex 32}
      - PYTHONUNBUFFERED=1
    ports:
      - "8789:5000" # LAN/Tailscale; front with Caddy on the edge network if desired
    volumes:
      - ./data:/app/data
    networks:
      - edge

networks:
  edge:
    external: true
