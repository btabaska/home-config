# Libreseerr — book request portal (Readarr / Bookshelf / LazyLibrarian)
# Phase 2 (ebook-mgmt workstream). Seerr = movies/TV; MusicSeerr = music; Libreseerr = books.
# Docs: https://github.com/zamnzim/Libreseerr
#
# Runs on the Mac mini alongside Seerr + MusicSeerr. Talks to Readarr on the NAS (:8787).

services:
  libreseerr:
    # Upstream publishes no version tags and garbage-collects old digests, so a
    # stale pin fails `compose pull` with "manifest unknown". Pinned to the
    # image MANIFEST digest (820134e4 == the running image RepoDigest). NB: the
    # 2026-07-09 audit mistakenly pinned the local image *ID* (c2dbf74a) here,
    # which is not pullable; corrected 2026-07-12. Recreate offline after an
    # app.py change:  docker compose up -d --pull never
    image: ghcr.io/zamnzim/libreseerr@sha256:820134e44279c964ddf54090ab45b444a28e7f562256baaadf20fffaf36911f3
    container_name: libreseerr
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY in .env — openssl rand -hex 32}
      - PYTHONUNBUFFERED=1
    ports:
      - "8789:5000" # LAN/Tailscale; front with Caddy on the edge network if desired
    volumes:
      - ./data:/app/data
      # Local patch: rank Readarr lookup candidates + retry-until-accepted
      # (fixes junk-edition 400s / stuck books). Re-derive app.py on image bump.
      - ./app.py:/app/app.py:ro
      - ./readarr.py:/app/readarr.py:ro
    networks:
      - edge

networks:
  edge:
    external: true
