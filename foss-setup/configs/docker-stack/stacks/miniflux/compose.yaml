# Miniflux — minimalist RSS reader (Go binary + PostgreSQL)
# Phase 3. Docs: https://miniflux.app/docs/docker.html
#
# Postgres pinned to 17-alpine: it uses the classic PGDATA path
# (/var/lib/postgresql/data). Postgres 18 changed the data path to
# /var/lib/postgresql — if you ever move to pg18, adjust the volume mount.
# See: https://hub.docker.com/_/postgres

services:
  miniflux:
    image: miniflux/miniflux:2.3.1
    container_name: miniflux
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:8080" # direct LAN access; also fronted by Caddy via the edge network
    environment:
      - DATABASE_URL=postgres://miniflux:${MINIFLUX_DB_PASSWORD}@db/miniflux?sslmode=disable
      - RUN_MIGRATIONS=1
      # Bootstrap CREATE_ADMIN/ADMIN_* removed 2026-07-16 (fix-33): the leftover
      # 'admin' account was deleted; the only user is btabaska (API key in the
      # secrets vault under miniflux.api_key).
      - BASE_URL=${MINIFLUX_BASE_URL:-http://localhost:8082}
      # Never auto-exclude feeds on consecutive fetch errors (default limit of 3
      # froze ALL feeds permanently after a 14h docker-DNS outage, 2026-07-09,
      # quality-gate H7). Dead feeds keep retrying hourly and stay visible in the
      # UI; the miniflux-feeds-fresh verification check alerts on scheduler stalls.
      - POLLING_PARSING_ERROR_LIMIT=0
    networks:
      - edge
      - miniflux
    healthcheck:
      test: ["CMD", "/usr/bin/miniflux", "-healthcheck", "auto"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:17-alpine
    container_name: miniflux_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=miniflux
      - POSTGRES_PASSWORD=${MINIFLUX_DB_PASSWORD}
      - POSTGRES_DB=miniflux
    volumes:
      - ./db:/var/lib/postgresql/data
    networks:
      - miniflux
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniflux"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  edge:
    external: true
  miniflux:
    driver: bridge
