# Global widgets shown above service groups.
# Docs: https://gethomepage.dev/configs/info-widgets/

- resources:
    cpu: true
    memory: true
    cputemp: true
    uptime: true
    units: metric

- search:
    provider: duckduckgo
    target: _blank

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: short
      hourCycle: h23

# Keyless Open-Meteo — no API key/vault secret. Coords from HA (home-05).
- openmeteo:
    label: Weather
    latitude: 43.140097
    longitude: -77.5773271
    timezone: America/New_York
    units: imperial
    cache: 5
