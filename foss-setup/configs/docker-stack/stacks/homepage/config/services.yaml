# Homepage service tiles — restructured 2026-07-21 to a daily-use layout.
# Order here IS the on-screen order (no layout: block in settings.yaml).
# hrefs use https://<name>.tabaska.us; widget/siteMonitor URLs hit upstream directly.
# Widget keys use {{HOMEPAGE_VAR_*}} from .env (see .env.example).
# Docs: https://gethomepage.dev/configs/services/

- Media:
    - Plex:
        icon: plex.png
        href: https://plex.tabaska.us
        description: Movies & TV
        widget:
          type: plex
          url: http://192.168.10.4:32400
          key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"
    - Tautulli:
        icon: tautulli.png
        href: https://tautulli.tabaska.us
        description: Plex activity & stats
        widget:
          type: tautulli
          url: http://tautulli:8181
          key: "{{HOMEPAGE_VAR_TAUTULLI_KEY}}"
    - Navidrome:
        icon: navidrome.png
        href: https://music.tabaska.us
        description: Music
        widget:
          type: navidrome
          url: http://navidrome:4533
          user: "{{HOMEPAGE_VAR_NAVIDROME_USER}}"
          token: "{{HOMEPAGE_VAR_NAVIDROME_TOKEN}}"
          salt: "{{HOMEPAGE_VAR_NAVIDROME_SALT}}"
    - Stash:
        icon: stash.png
        href: https://stash.tabaska.us
        description: Adult
        widget:
          type: stash
          url: http://192.168.10.4:9999
          key: "{{HOMEPAGE_VAR_STASH_KEY}}"

