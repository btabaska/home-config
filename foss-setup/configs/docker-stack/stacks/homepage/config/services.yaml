- Infrastructure:
    # home-08: UniFi Network status from the UDM/Dream Wall gateway (network backbone).
    # The `unifi` widget authenticates with a DEDICATED local read-only Network account
    # (View Only role) — the unifi_protect account 403s on the Network login API, so it
    # cannot be reused. Widget handles the UDM /proxy/network routing + self-signed cert
    # internally; url is the plain gateway https (port 443), site defaults to "default".
    - UniFi Network:
        icon: unifi.png
        href: https://192.168.10.1
        description: Dream Wall · WAN/LAN/WLAN
        widget:
          type: unifi
          url: https://192.168.10.1
          username: "{{HOMEPAGE_VAR_UNIFI_USER}}"
          password: "{{HOMEPAGE_VAR_UNIFI_PASS}}"
          fields: [wan, lan_users, wlan_users, uptime]
    - Beszel:
        icon: beszel.png
        href: https://status.tabaska.us
        description: Host & container monitoring
        siteMonitor: http://beszel:8090
    # glue-10: per-disk SMART health across the fleet. Hub is the omnibus on the NAS;
    # the widget hits it by IP (Homepage reaches NAS directly). passed/failed/unknown.
    - Scrutiny:
        icon: scrutiny.png
        href: https://scrutiny.tabaska.us
        description: Disk SMART health
        widget:
          type: scrutiny
          url: http://192.168.10.4:8080
    - Uptime Kuma:
        icon: uptime-kuma.png
        href: https://uptime.tabaska.us
        description: Uptime checks
        siteMonitor: http://uptime-kuma:3001
    - Healthchecks:
        icon: healthchecks.png
        href: https://health.tabaska.us
        description: Backup & cron dead-man's-switch
        widget:
          type: healthchecks
          url: http://healthchecks:8000
          key: "{{HOMEPAGE_VAR_HEALTHCHECKS_KEY}}"
    - Dockge:
        icon: dockge.png
        href: https://dockge.tabaska.us
        description: Compose stack manager
        siteMonitor: http://dockge:5001
    - Forgejo:
        icon: forgejo.png
        href: https://git.tabaska.us
        description: Git forge
        widget:
          type: gitea
          url: http://forgejo:3000
          key: "{{HOMEPAGE_VAR_FORGEJO_KEY}}"
    - ntfy:
        icon: ntfy.png
        href: https://ntfy.tabaska.us
        description: Notifications
        siteMonitor: http://ntfy:80
    # Syncthing (foss-03): the hub sees the whole mesh, so ONE tile pointed at the
    # always-on NAS hub reflects every device. Widget hits the hub REST API by raw
    # IP (X-API-Key auth); click-through opens the hub GUI at syncthing.tabaska.us,
    # which lists all peers (mini/rig/macbook). needTotalItems 0 == fully in sync.
    - Syncthing:
        icon: syncthing.png
        href: https://syncthing.tabaska.us
        description: No-cloud sync mesh (foss-03)
        widget:
          type: customapi
          url: http://192.168.10.4:8384/rest/db/status?folder=default
          refreshInterval: 10000
          headers:
            X-API-Key: "{{HOMEPAGE_VAR_SYNCTHING_HUB_KEY}}"
          mappings:
            - field: state
              label: Folder
              format: text
            - field: needTotalItems
              label: Pending
              format: number
            - field: globalBytes
              label: Size
              format: bytes

# Fleet — per-HOST vitals (CPU/RAM/disk/network) from the beszel-agent already on
# every box, reusing the beszel hub on the mini (zero new daemons — the 8 GB mini
# demands that). systemId = the exact Beszel UI name (mini/rig/nas). The single
# `disk` field is the host's aggregate; the NAS /volume1,2,3 per-mount split lives
# in the Beszel dashboard (status.tabaska.us) via the agent's /extra-filesystems mounts.
- Fleet:
    - Mini:
        icon: mdi-server
        href: https://status.tabaska.us
        description: Mac mini · Docker host
        widget:
          type: beszel
          url: http://beszel:8090
          username: "{{HOMEPAGE_VAR_BESZEL_USER}}"
          password: "{{HOMEPAGE_VAR_BESZEL_PASS}}"
          version: 2
          systemId: mini
          fields: [cpu, memory, disk, network]
    - Rig:
        icon: mdi-server
        href: https://status.tabaska.us
        description: CachyOS · AI & game servers
        widget:
          type: beszel
          url: http://beszel:8090
          username: "{{HOMEPAGE_VAR_BESZEL_USER}}"
          password: "{{HOMEPAGE_VAR_BESZEL_PASS}}"
          version: 2
          systemId: rig
          fields: [cpu, memory, disk, network]
    - NAS:
        icon: mdi-nas
        href: https://status.tabaska.us
        description: DS920+ · storage & media
        widget:
          type: beszel
          url: http://beszel:8090
          username: "{{HOMEPAGE_VAR_BESZEL_USER}}"
          password: "{{HOMEPAGE_VAR_BESZEL_PASS}}"
          version: 2
          systemId: nas
          fields: [cpu, memory, disk, network]
