# Homepage service tiles — restructured 2026-07-21 to a daily-use layout.
# Order here IS the on-screen order (no layout: block in settings.yaml).
# hrefs use https://<name>.tabaska.us; widget/siteMonitor URLs hit upstream directly.
# Widget keys use {{HOMEPAGE_VAR_*}} from .env (see .env.example).
# Docs: https://gethomepage.dev/configs/services/

- Media:
    - Plex:
        icon: plex.png
        href: https://plex.tabaska.us
        description: Movies & TV
        widget:
          type: plex
          url: http://192.168.10.4:32400
          key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"
    - Navidrome:
        icon: navidrome.png
        href: https://music.tabaska.us
        description: Music
        siteMonitor: http://navidrome:4533
    - Stash:
        icon: stash.png
        href: https://stash.tabaska.us
        description: Adult
        siteMonitor: http://192.168.10.4:9999

