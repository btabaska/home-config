# Homepage service tiles — one entry per live service, grouped by category.
# Source of truth: configs/docker-stack/service-catalog.yaml (home-01).
# hrefs always use the https://<name>.tabaska.us front door; widget/siteMonitor
# URLs hit the upstream directly. Widget keys use {{HOMEPAGE_VAR_*}} from .env
# (see .env.example). Docs: https://gethomepage.dev/configs/services/

- Media:
    - Plex:
        icon: plex.png
        href: https://plex.tabaska.us
        description: Movies & TV
        widget:
          type: plex
          url: http://192.168.10.4:32400
          key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"
    - Pinchflat:
        icon: pinchflat.png
        href: https://pinchflat.tabaska.us
        description: YouTube archiving
        siteMonitor: http://pinchflat:8945
    - MeTube:
        icon: metube.png
        href: https://metube.tabaska.us
        description: One-off YouTube downloads
        siteMonitor: http://192.168.10.2:8081

