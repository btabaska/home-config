# OWASP Dependency-Track — SBOM analysis + vulnerability intelligence platform
# Phase 4. Docs: https://docs.dependencytrack.org/getting-started/deploy-docker/
#
# Start on v5 — NOT v4. The legacy v4 line is EOL Dec 2026, and v5 does NOT
# upgrade in place from v4 (different schema/architecture). Deploy v5 fresh.
#
# Three services:
#   - dtrack-apiserver : the brain (analysis, BOM ingest, API). Memory-hungry.
#   - dtrack-frontend  : static SPA that talks to the apiserver via API_BASE_URL.
#   - postgres         : metadata store (projects, components, vulns, findings).
#
# This is where sbom-nightly.sh PUTs CycloneDX BOMs (POST/PUT /api/v1/bom)
# for the host filesystem and every running container image.

services:
  dtrack-apiserver:
    # v5 GA restarted numbering at 5.0.0; verified current GA tags on the official
    # dependencytrack/* repos (the old 5.6.0 tags only existed in pre-GA hyades repos).
    image: dependencytrack/apiserver:5.0.2
    container_name: dtrack-apiserver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # The analysis engine needs real RAM. Official minimum is 2-4.5GB (recommended
    # 8-16GB); 2g risks OOM, so floor it at 4g.
    mem_limit: 4g
    deploy:
      resources:
        limits:
          memory: 4g
    environment:
      # v5 config — ALPINE_* / alpine.* properties are rejected (see v5.0.0-rc.2 upgrade guide).
      - DT_DATABASE_MODE=external
      - DT_DATASOURCE_URL=jdbc:postgresql://postgres:5432/dtrack
      - DT_DATASOURCE_DRIVER=org.postgresql.Driver
      - DT_DATASOURCE_USERNAME=${DTRACK_DB_USER:-dtrack}
      - DT_DATASOURCE_PASSWORD=${DTRACK_DB_PASSWORD}
      - DT_SYSTEM_REQUIREMENT_CHECK_ENABLED=true
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./apiserver_data:/data
    networks:
      - edge
      - dtrack
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/version || exit 1"]
      start_period: 120s
      interval: 30s
      timeout: 5s
      retries: 5

  dtrack-frontend:
    # Verified current GA tag (frontend never published a 5.6.0).
    image: dependencytrack/frontend:5.0.1
    container_name: dtrack-frontend
    restart: unless-stopped
    depends_on:
      - dtrack-apiserver
    environment:
      # Where the browser-side SPA reaches the apiserver. Set to your Caddy URL.
      - API_BASE_URL=${DTRACK_API_BASE_URL:-http://localhost:9010}
      - TZ=${TZ:-America/New_York}
    ports:
      - "9010:8080" # direct LAN access; also fronted by Caddy at deptrack.<domain>
    networks:
      - edge

  postgres:
    image: postgres:17-alpine
    container_name: dtrack_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DTRACK_DB_USER:-dtrack}
      - POSTGRES_PASSWORD=${DTRACK_DB_PASSWORD}
      - POSTGRES_DB=dtrack
    volumes:
      - ./db:/var/lib/postgresql/data
    networks:
      - dtrack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DTRACK_DB_USER:-dtrack} -d dtrack"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  edge:
    external: true
  dtrack:
    driver: bridge
