  # --- Life ---------------------------------------------------------------------
  - name: mealie
    category: Life
    host: mini
    port: 9000
    url: https://recipes.tabaska.us
    on_demand: false
    notes: Recipes & meal planning. Container health flapping (unhealthy in docker ps) but serving.

  # --- Smart Home -----------------------------------------------------------------
  - name: home-assistant
    category: Smart Home
    host: ha
    port: 8123
    url: https://ha.tabaska.us
    on_demand: false
    notes: Answers 400 via proxy until trusted_proxies configured (run-5); direct :8123 works.

  # --- AI & Gaming (on-demand rig) ---------------------------------------------
  - name: open-webui
    category: AI & Gaming
    host: rig
    port: 3000
    url: https://ai.tabaska.us
    on_demand: true
    notes: Chat UI. Wake rig first; 502 while asleep.
  - name: litellm
    category: AI & Gaming
    host: rig
    port: 4000
    url: https://llm.tabaska.us
    on_demand: true
    notes: OpenAI-compatible gateway (/ui admin). Wake rig first.
  - name: ollama
    category: AI & Gaming
    host: rig
    port: 11434
    url: https://ollama.tabaska.us
    on_demand: true
    notes: Native Ollama API (verified up 2026-07-07 while rig awake).
  - name: mcpo
    category: AI & Gaming
    host: rig
    port: 8000
    url: https://mcpo.tabaska.us
    on_demand: true
    notes: MCP→OpenAPI tool bridge; docs at /docs (root 404s by design).
  - name: sunshine
    category: AI & Gaming
    host: rig
    port: 47990
    url: https://sunshine.tabaska.us
    on_demand: true
    notes: Game-stream host UI, self-signed HTTPS upstream. Did not answer on 2026-07-07 even with rig awake — service may be stopped; vhost added anyway.

  # --- Infrastructure & Ops --------------------------------------------------------
  - name: homepage
    category: Infrastructure & Ops
    host: mini
    port: 3010
    url: https://home.tabaska.us
    on_demand: false
    notes: This dashboard. Container port 3000.
  - name: caddy
    category: Infrastructure & Ops
    host: mini
    port: 443
    url: null
    ui: false
    on_demand: false
    notes: The reverse proxy itself — no UI vhost.
  - name: beszel
    category: Infrastructure & Ops
    host: mini
    port: 8090
    url: https://status.tabaska.us
    on_demand: false
    notes: Host/container metrics hub (beszel-agent on mini feeds it; agent has no UI).
  - name: uptime-kuma
    category: Infrastructure & Ops
    host: mini
    port: 3001
    url: https://uptime.tabaska.us
    on_demand: false
    notes: Uptime checks. No published status page yet, so Homepage uses siteMonitor not the widget.
  - name: healthchecks
    category: Infrastructure & Ops
    host: mini
    port: 8001
    url: https://health.tabaska.us
    on_demand: false
    notes: Cron/backup dead-man's-switch. Container reports unhealthy but web UI serves. Container port 8000.
  - name: dependency-track
    category: Infrastructure & Ops
    host: nas
    port: 9010
    url: https://deptrack.tabaska.us
    on_demand: false
    notes: SBOM/vuln dashboard; API on :9011 (Caddy routes /api/* there).
  - name: adguard-home
    category: Infrastructure & Ops
    host: mini
    port: 53
    url: https://dns.tabaska.us
    on_demand: false
    notes: DNS filtering; admin UI proxied (container :80). Unbound (:5335) is its upstream resolver — no UI.
  - name: unbound
    category: Infrastructure & Ops
    host: mini
    port: 5335
    url: null
    ui: false
    on_demand: false
    notes: Recursive DNS resolver behind AdGuard — no web UI.
  - name: dockge
    category: Infrastructure & Ops
    host: mini
    port: 5001
    url: https://dockge.tabaska.us
    on_demand: false
    notes: Compose stack manager.
  - name: forgejo
    category: Infrastructure & Ops
    host: mini
    port: 3030
    url: https://git.tabaska.us
    on_demand: false
    notes: Git forge / control repo. SSH on host :2222. Container port 3000.
  - name: ntfy
    category: Infrastructure & Ops
    host: mini
    port: 8080
    url: https://ntfy.tabaska.us
    on_demand: false
    notes: Push notifications. Container port 80.
  - name: diun
    category: Infrastructure & Ops
    host: mini
    port: null
    url: null
    ui: false
    on_demand: false
    notes: Image-update notifier → ntfy. No web UI.

  # --- Wiki & Docs -------------------------------------------------------------
  - name: wiki
    category: Wiki & Docs
    host: mini
    port: null
    url: https://wiki.tabaska.us
    on_demand: false
    notes: Static site served by Caddy from /opt/stacks/wiki/site (built by the wiki task; 404 until populated).

  # --- Private -----------------------------------------------------------------
  - name: stash
    category: Private
    host: nas
    port: 9999
    url: https://stash.tabaska.us
    on_demand: false
    notes: Adult media organizer. LAN/Tailscale only. No API key in vault — no widget.

