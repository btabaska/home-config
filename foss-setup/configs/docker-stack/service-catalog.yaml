    port: 9292
    url: https://llamaswap.tabaska.us
    on_demand: false
    notes: llama.cpp model-swapping server (ai-01, 2026-07-15) — the rig's primary local-model backend (swaps GGUF models on demand); LiteLLM routes local traffic here. Rig runs 24/7.
  - name: ollama
