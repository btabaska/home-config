# service-catalog.yaml — source of truth for the home surface (home-01..04).
# Every LIVE service in the homelab: what it is, where it runs, and its public
# https://<name>.tabaska.us front door (Caddy on the mini, 192.168.10.2).
#
# Verified live 2026-07-07 (docker ps on mini + HTTP probes from mini).
# Re-verified + backfilled 2026-07-09 (docs-debt audit): gaming stack (rig),
# romm/bedrock-connect/bgutil-pot (mini), NAS workers, recyclarr cron.
# hosts: mini=192.168.10.2, nas=192.168.10.4, rig=192.168.10.12 (24/7),
#        ha=192.168.10.50, seedbox=100.119.134.94 (Tailscale, "Betty")
#
# ui: false  => backend/agent with no web UI: no Caddy vhost, no Homepage tile.
# on_demand  => legacy field, kept for schema stability; all hosts run 24/7 now
#               (rig sleep retired 2026-07-08 — WoL is recovery tooling only).
#               A 502 through Caddy is an INCIDENT, not expected behavior.

