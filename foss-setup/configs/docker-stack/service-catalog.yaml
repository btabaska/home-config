# service-catalog.yaml — source of truth for the home surface (home-01..04).
# Every LIVE service in the homelab: what it is, where it runs, and its public
# https://<name>.tabaska.us front door (Caddy on the mini, 192.168.10.2).
#
# Verified live 2026-07-07 (docker ps on mini + HTTP probes from mini).
# hosts: mini=192.168.10.2, nas=192.168.10.4, rig=192.168.10.12 (on-demand),
#        ha=192.168.10.50, seedbox=100.119.134.94 (Tailscale, "Betty")
#
# ui: false  => backend/agent with no web UI: no Caddy vhost, no Homepage tile.
# on_demand  => host sleeps when idle; expect 502 through Caddy until woken.

services:
  # --- Media ----------------------------------------------------------------
  - name: plex
    category: Media
    host: nas
    port: 32400
    url: https://plex.tabaska.us
    on_demand: false
    notes: Movies & TV. Widget uses Plex token.
  - name: metube
    category: Media
    host: mini
    port: 8081
    url: https://metube.tabaska.us
    on_demand: false
    notes: One-off YouTube downloads (host-network; proxied via HOST_IP).
  - name: pinchflat
    category: Media
    host: mini
    port: 8945
    url: https://pinchflat.tabaska.us
    on_demand: false
    notes: YouTube channel archiving ("Sonarr for YouTube").
  - name: kometa
    category: Media
    host: mini
    port: null
    url: null
    on_demand: false
    ui: false
    notes: Plex collections/metadata batch job — no web UI, runs on schedule.

  # --- Requests ---------------------------------------------------------------
  - name: seerr
    category: Requests
    host: mini
    port: 5055
    url: https://seerr.tabaska.us
    on_demand: false
    notes: Movie/TV request portal (Jellyseerr/Overseerr-compatible API).
  - name: musicseerr
    category: Requests
    host: mini
    port: 8688
    url: https://musicseerr.tabaska.us
    on_demand: false
    notes: Album request portal (feeds Lidarr).
  - name: libreseerr
    category: Requests
    host: mini
    port: 8789
    url: https://libreseerr.tabaska.us
    on_demand: false
    notes: Book request portal (feeds Readarr). Container port 5000.

  # --- Media Automation -------------------------------------------------------
  - name: sonarr
    category: Media Automation
    host: nas
    port: 8989
    url: https://sonarr.tabaska.us
    on_demand: false
    notes: TV automation.
  - name: radarr
    category: Media Automation
    host: nas
    port: 7878
    url: https://radarr.tabaska.us
    on_demand: false
    notes: Movie automation.
  - name: lidarr
    category: Media Automation
    host: nas
    port: 8686
    url: https://lidarr.tabaska.us
    on_demand: false
    notes: Music automation.
  - name: readarr
    category: Media Automation
    host: nas
    port: 8787
    url: https://readarr.tabaska.us
    on_demand: false
    notes: Book automation.
  - name: prowlarr
    category: Media Automation
    host: nas
    port: 9696
    url: https://prowlarr.tabaska.us
    on_demand: false
    notes: Indexer manager for the *arr stack.
  - name: flaresolverr
    category: Media Automation
    host: nas
    port: 8191
    url: https://flaresolverr.tabaska.us
    on_demand: false
    notes: Cloudflare-challenge solver for Prowlarr. API only — root returns a status JSON.
  - name: tautulli
    category: Media Automation
    host: mini
    port: 8181
    url: https://tautulli.tabaska.us
    on_demand: false
    notes: Plex analytics/history.
  - name: maintainerr
    category: Media Automation
    host: mini
    port: 6246
    url: https://maintainerr.tabaska.us
    on_demand: false
    notes: Rule-based Plex library pruning.
  - name: deluge
    category: Media Automation
    host: seedbox
    port: 8112
    url: https://deluge.tabaska.us
    on_demand: false
    notes: Off-site torrents (Betty seedbox over Tailscale).
  - name: slskd
    category: Media Automation
    host: seedbox
    port: 5030
    url: https://slskd.tabaska.us
    on_demand: false
    notes: Soulseek daemon (Betty seedbox over Tailscale).

  # --- Photos -----------------------------------------------------------------
  - name: immich
    category: Photos
    host: nas
    port: 2283
    url: https://immich.tabaska.us
    on_demand: false
    notes: Photo library + mobile backup. Vhost verified 2026-07-07.

  # --- Music ------------------------------------------------------------------
  - name: navidrome
    category: Music
    host: mini
    port: 4533
    url: https://music.tabaska.us
