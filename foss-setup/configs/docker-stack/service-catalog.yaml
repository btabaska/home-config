    on_demand: false
    notes: Creative/RP chat + game engine (pasta-devs/marinara-engine 1.5.0 image, ALPHA/AGPL). Rides LiteLLM via an in-app connection (same 3-model virtual key). Auth-gated at the mini Caddy (basic_auth, user `marinara`) because its own IP-based auth is void behind docker userland-proxy. Added 2026-07-18. Rig runs 24/7.
  - name: llama-swap
    category: AI & Gaming
