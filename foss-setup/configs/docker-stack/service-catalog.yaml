    notes: Subsonic-compatible music streaming.

  # --- Reading & Docs -----------------------------------------------------------
  - name: calibre-web-automated
    category: Reading & Docs
    host: nas
    port: 8083
    url: https://books.tabaska.us
    on_demand: false
    notes: Ebook library (CWA).
  - name: paperless
    category: Reading & Docs
    host: mini
    port: 8000
    url: https://paperless.tabaska.us
    on_demand: false
    notes: Document archive + OCR (redis/db/gotenberg/tika sidecars, no UI of their own).
  - name: wallabag
    category: Reading & Docs
    host: mini
