# service-enrichment.yaml — wiki prose for the GENERATED service pages (wiki-06, wave 3).
#
# Keyed by STACK name (the dir name gen-wiki-services.py discovers). load_catalog()
# merges this OVER service-catalog.yaml, so only the two wiki-prose fields live here;
# all homepage-surface facts (host / url / notes / category) stay in service-catalog.yaml.
#   about:        prose            -> renders as the page's '## About' section
#   troubleshoot: [{symptom, fix}] -> renders as the page's '## Troubleshooting' section
#
# Built from a live-validated enrichment pass 2026-07-14 (one agent per service, each
# read the compose + validated the container on its host). Edit freely, then rerun
# scripts/docs/gen-wiki-services.py. Do NOT put [markdown](links) in these fields —
# the wiki builds with `mkdocs build --strict` and a broken link fails the build.

services:
- name: adguard
  about: |-
    AdGuard Home is the fleet's PRIMARY network-wide DNS filter/resolver (chosen over Pi-hole for its single-container design, built-in DoT/DoH/DoQ, and per-client rules), running as `adguard/adguardhome:v0.107.77` on `mini` from `foss-setup/configs/docker-stack/stacks/adguard/compose.yaml`. It publishes DNS on host `:53` (tcp+udp) plus DoT on `:853`, while its admin UI (container `:80`) is reached only through Caddy at https://dns.tabaska.us — host `:80`/`:3000` are deliberately NOT bound (`:80` collides with Caddy; `:3000` is break-glass for the first-run wizard). Upstream is the sibling Unbound recursive+DNSSEC resolver over the shared external `edge` network, referenced as `unbound:5335` (NOT `127.0.0.1:5335`, which inside the container is AdGuard's own loopback). Config is not env-driven — everything lives in `./conf/AdGuardHome.yaml`; the only env var is `TZ`. This host is the first entry in the fleet's fail-open DHCP nameserver chain (192.168.10.2 → .4 → .1) so a single resolver being down never takes DNS out for the whole fleet.
  troubleshoot:
  - symptom: |-
      Admin UI unreachable / first-run wizard needed but https://dns.tabaska.us does not respond.
    fix: |-
      The UI is only exposed through Caddy at dns.tabaska.us (adguardhome:80 on the edge network). Do NOT bind host :80 (collides with Caddy). To break-glass into the initial wizard, temporarily publish 3000 in compose.yaml, then move config back behind Caddy afterward.
  - symptom: All resolution fails / upstream errors after pointing AdGuard at 127.0.0.1:5335.
    fix: |-
      Inside the container 127.0.0.1 is AdGuard's own loopback, not the host — Unbound is unreachable. In Settings → DNS → Upstream servers use unbound:5335 (both containers share the external edge network).
  - symptom: |-
      Log spam: 'dnsproxy: reading msg proto=tcp err="reading len: read: connection reset by peer"' (frequently from 192.168.10.186).
    fix: |-
      Benign — a TCP-DNS client (192.168.10.186) is closing idle/aborted connections before AdGuard finishes reading; queries still resolve. No action needed; investigate that client only if it correlates with actual resolution failures via 'ssh mini "cd /opt/stacks/adguard && docker compose logs --tail 100"'.
  - symptom: DNS outage for the fleet if mini/AdGuard is down.
    fix: |-
      By design the DHCP-handed nameserver chain is 192.168.10.2 (mini/AdGuard) → 192.168.10.4 (nas) → 192.168.10.1 (gateway), so clients fail open to the next resolver. If mini is down, filtering is bypassed but resolution continues; restore with 'ssh mini "cd /opt/stacks/adguard && docker compose up -d"'.
- name: adguard-nas
  about: |-
    AdGuard Home running as the **secondary** network DNS resolver on the NAS (`192.168.10.4`, eth1 on the Trusted VLAN), deployed from `foss-setup/configs/docker-stack/stacks/adguard-nas/` as container `adguardhome-nas` (`adguard/adguardhome:v0.107.77`), serving DNS on `:53` with break-glass admin at http://192.168.10.4:3000. Since fix-40 (2026-07-19) it runs with **`network_mode: host`** so real client IPs reach AdGuard — the previous bridge publish NAT'd all ~52k queries/day to the docker gateway `172.23.0.1`, destroying per-client stats, client rules and querylog forensics (quality-gate M28); attribution is now guarded end-to-end by verification check `nas-adguard-client-attribution`. It is DHCP DNS **#2** in the fail-open chain (`192.168.10.2` mini primary → `192.168.10.4` NAS secondary → `192.168.10.1` gateway fallback), so a mini reboot never becomes a house-wide outage. The critical design decision: its upstream is **public Quad9 DoH** (`https://dns10.quad9.net/dns-query`), deliberately **not** mini Unbound, so it keeps resolving when the mini is offline; it mirrors the mini's `*.tabaska.us → 192.168.10.2` rewrites (verified live: returns `192.168.10.2` for `plex.tabaska.us`). Originally task dns-02 (validated 2026-07-14); config state lives in the bind-mounted `./work` and `./conf` dirs under `/volume1/docker/adguard-nas/`.
  troubleshoot:
  - symptom: |-
      Upstream DNS resolution intermittently fails; logs show `dnsproxy: exchange failed upstream=https://dns10.quad9.net:443/dns-query ... err="...unexpected EOF"`.
    fix: |-
      Transient DoH/DoT hiccup against the public upstream — AdGuard retries and other upstreams answer, so it is usually self-healing. Configure multiple upstreams (Settings → DNS → tls://1.1.1.1 AND tls://9.9.9.9) so one flaky provider does not stall lookups. Verify resolution still works: `sudo docker exec adguardhome-nas nslookup google.com 127.0.0.1`. Do NOT switch the upstream to mini Unbound — the secondary must resolve independently when the mini is down.
  - symptom: |-
      Internal `*.tabaska.us` names resolve via the mini but not via the NAS secondary (client on NAS DNS gets wrong/no address for e.g. vault/plex/wiki).
    fix: |-
      The rewrites drifted from the mini. Re-mirror them: on mini AdGuard Settings → DNS rewrites → Export, then import into the NAS instance at http://192.168.10.4:3000 (Settings → DNS rewrites). Confirm with `sudo docker exec adguardhome-nas nslookup plex.tabaska.us 127.0.0.1` — must return `192.168.10.2`.
  - symptom: Container won't (re)start because `:53` (or `:3000`) is already bound on the NAS.
    fix: |-
      The container is `network_mode: host` (fix-40), so AdGuard binds host `:53` and `:3000` directly — any DSM service or stale process holding them blocks startup. Check with `ssh nas` then `sudo netstat -tulnp | grep -E ':53|:3000'`; free the port, then `sudo /usr/local/bin/docker-compose -f /volume1/docker/adguard-nas/compose.yaml up -d`.
  - symptom: |-
      Whole-house DNS outage symptom: WiFi shows connected but some devices have no internet.
    fix: |-
      This is the dns-03 gap — the UniFi fail-open DHCP chain (`192.168.10.2, 192.168.10.4, 192.168.10.1`) is not yet applied to all client VLANs, so a client may sit on a single dead resolver. Immediate fix: UniFi → set affected VLAN DHCP DNS to `192.168.10.1` (gateway), renew leases. Long-term: complete dns-03 so the NAS secondary is actually second in the client chain. Do NOT enable the dns-05 NAT :53 redirect until dns-03 is verified.
- name: amp
  about: |-
    CubeCoders AMP game panel running on the 24/7 `rig` (192.168.10.12) as the ImageGenius container `ghcr.io/imagegenius/amp:latest`, deployed from `foss-setup/configs/gaming/amp/compose.yaml` at `/opt/stacks/amp` and fronted by Caddy at https://amp.tabaska.us. It runs the ADS module (the panel that provisions/monitors game instances) plus a `MinecraftCross01` Java+Bedrock (Geyser) instance, exposing `8080` (web panel), `25565/tcp` (Java), `19132/udp` (Bedrock) and `8000-8010/udp` for provisioned games. Runs as the `abc` user and driven via the `ampinstmgr` CLI; the base Alpine image ships no Java, so `openjdk21-jre-headless` is added via the `linuxserver/mods:universal-package-install` DOCKER_MOD and Minecraft 26.x additionally uses a persisted Temurin musl Java 25 at `/config/java/jdk-25.0.3+9-jre` behind a `java25-paperfix.sh` wrapper. The critical decision: AMP's licence is machine-id-bound, so both `hostname: c5f46f35aee3` AND `mac_address: 5e:c4:36:bf:b4:43` are pinned in compose — and empty-server sleep-mode is disabled because Bedrock clients cannot wake a sleeping server. Backups (fix-34): MinecraftCross01 takes an hourly local zip into `Backups/` with `Limits.MaxBackupCount=24` + `Limits.ReplacePolicy=ReplaceOldest` ("Delete Single Oldest") — a rolling 24 h of restore points (~7 G). The policy must NEVER be `DoNothing`: paired with a count limit it silently refuses every backup once the limit fills (H10 froze backups for 5 days with only a log-line warning). The zips are a local-only convenience tier — restic deliberately excludes `instances/*/Backups` (compressed zips dedup terribly and once bloated B2 by ~12 G) and snapshots the live world dir nightly instead. Guarded by `game-amp-backup-fresh`, `game-amp-backup-policy` and the restic-snapshot-hygiene BLOAT scan.
  troubleshoot:
  - symptom: |-
      After a `compose up` recreate or a Docker daemon restart both instances die with NoMatchingMachineId / exit 32 NO_LICENCE despite Start-on-Boot.
    fix: |-
      AMP's machine fingerprint includes BOTH hostname and MAC; Docker 26+ assigns a random MAC per (re)start. Keep `hostname: c5f46f35aee3` and `mac_address: 5e:c4:36:bf:b4:43` pinned in compose (never change casually). If the licence still breaks, reactivate: `ssh rig 'sudo docker exec -u abc amp ampinstmgr reactivate <Instance> <key>'` (key: vault `cubecoders_amp.license_key`).
  - symptom: Server appears to go to sleep and Bedrock clients cannot reconnect / wake it.
    fix: |-
      AMP's empty-server sleep-mode is a trap for Bedrock — it must stay disabled. The rig is 24/7 so there is no reason to sleep; leave sleep-mode off in the instance settings.
  - symptom: |-
      Minecraft (Paper 26.x) instance fails to launch or logs a bad-flag error about `--log-strip-color`.
    fix: |-
      Paper 26.x removed `--log-strip-color` but AMP's module still passes it. The instance's Java.JavaVersion must point at the wrapper `/config/java/java25-paperfix.sh` (which strips the flag and invokes the persisted Temurin musl Java 25 at `/config/java/jdk-25.0.3+9-jre`), not at a raw jdk binary.
  - symptom: |-
      `ampinstmgr: /usr/lib/libstdc++.so.6: no version information available` spam in the logs.
    fix: |-
      Benign — this is a cosmetic linker warning from the ImageGenius Alpine build and does not affect AMP or the instances (both Main and MinecraftCross01 run normally alongside it). No action needed.
- name: bedrock-connect
  about: |-
    BedrockConnect (Pugmatt project, `strausmann/minecraft-bedrock-connect:latest`, currently v1.68.0) is a UDP `19132` gateway on the mini (`/opt/stacks/bedrock-connect`) that lets Minecraft consoles — which cannot type an arbitrary server IP and can only reach servers via the built-in "featured server" tiles — join Brandon's self-hosted Bedrock worlds. AdGuard on the LAN rewrites the featured-server (Hive/etc.) domains to this container, so when a console opens any featured tile it lands in a server-list UI pre-seeded from `./config/custom_servers.json` with two entries: "MinecraftCross (Home)" → `192.168.10.12:19132` (the rig's Geyser/Paper server) and "MinecraftCross (Remote/playit)" → `bedrock.tabaska.us:1111` (the playit tunnel). It runs `NODB=true` (file-based player storage, no external DB) on the external `edge` docker network, so no console-side settings are needed — the LAN's AdGuard DNS does all the redirection.
  troubleshoot:
  - symptom: |-
      Console opens a featured-server tile but never sees the MinecraftCross list (times out or shows the vendor's real server).
    fix: |-
      This depends entirely on the LAN AdGuard rewrites hijacking the featured-server domains to the mini. Confirm the console is using AdGuard as its DNS resolver, and that the featured-server rewrite rules still exist in AdGuard. Verify the gateway itself is up: ssh mini 'cd /opt/stacks/bedrock-connect && docker compose ps' (should show Up/healthy on 0.0.0.0:19132->19132/udp).
  - symptom: The server list appears but connecting to an entry fails.
    fix: |-
      The two target addresses in ./config/custom_servers.json must be reachable: Home = 192.168.10.12:19132 (rig Geyser must be running) and Remote = bedrock.tabaska.us:1111 (playit tunnel). Bedrock ignores SRV records so the port 1111 is significant. Edit config/custom_servers.json and restart with docker compose up -d if an address/port changed.
- name: beszel
  about: |-
    Beszel is an ultra-lightweight server monitoring hub + agent stack running on `mini` from `foss-setup/configs/docker-stack/stacks/beszel/compose.yaml`. The `henrygd/beszel:0.18.7` hub serves the dashboard/REST API on `8090:8090` (fronted by Caddy at https://status.tabaska.us via the external `edge` network), while the `henrygd/beszel-agent:0.18.7` container runs `network_mode: host` and reports this box's CPU/memory/disk/network plus per-container stats (it mounts `/var/run/docker.sock:ro`). The hub and local agent communicate over a shared unix socket (`./beszel_socket/beszel.sock`, `LISTEN`/`HUB_URL`) rather than an exposed port; additional hosts are onboarded by deploying just the agent elsewhere with the per-system `TOKEN`/`KEY` the hub emits from its "Add System" UI (values kept in `.env` from the vault as `BESZEL_AGENT_TOKEN`/`BESZEL_AGENT_KEY`, never committed). Data persists in `./beszel_data` (PocketBase-backed). Since **home-07 (2026-07-22)** the **NAS** agent (`/volume1/docker/beszel-agent/compose.yaml`, mirrored at `foss-setup/configs/nas/beszel/`) bind-mounts each Synology volume's marker dir at `/extra-filesystems/volumeN:ro` so `/volume1,2,3` break out per-mount in the dashboard — the Docker agent auto-detects anything under `/extra-filesystems` (the `EXTRA_FILESYSTEMS` env var is the systemd/binary form using device names and does NOT apply to the container). volume1 IS the agent's root disk (shown as the main disk gauge); volume2 and volume3 appear as extra filesystems labelled by their `cachedev` device name (`dm-7` and `dm-6` respectively), a Synology device-mapper quirk. The split is guarded by the `nas-beszel-volume-split` check.
  troubleshoot:
  - symptom: |-
      NAS dashboard shows extra filesystems named `dm-6`/`dm-7` instead of `volume2`/`volume3`.
    fix: |-
      Expected. beszel labels an extra filesystem by the block device it resolves for I/O stats; Synology volumes are device-mapper `cachedev` devices, so `/extra-filesystems/volume3` -> `dm-6` and `/extra-filesystems/volume2` -> `dm-7`. volume1 is deduplicated into the agent's root disk (same filesystem) and shows as the main disk gauge. No action needed — usage/percentages are correct; only the label differs.
  - symptom: |-
      Agent logs show `WebSocket connection failed err="...connection reset by peer"` on startup, then no data appears for the local host.
    fix: |-
      This is a benign race: the agent boots before the hub's socket/WS listener is ready and retries — it reconnects seconds later (look for the following `INFO WebSocket connected host=127.0.0.1:8090`). No action needed unless the connected line never appears; then `ssh mini 'cd /opt/stacks/beszel && docker compose restart beszel-agent'`.
  - symptom: |-
      A remote host (nas/rig) shows offline in the hub, or a newly added system never connects.
    fix: |-
      Each system needs its own `TOKEN`/`KEY` pair generated by the hub's Add System dialog — reusing mini's values fails. On the remote host deploy only the agent with `HUB_URL` pointing at the hub and the fresh `KEY`, then confirm the agent log shows `WebSocket connected`.
  - symptom: |-
      Dashboard unreachable at https://status.tabaska.us even though the container is Up.
    fix: |-
      The hub only binds `8090` locally; public access is via Caddy on the `edge` network. Verify the container: `ssh mini 'cd /opt/stacks/beszel && docker compose ps'`, then check Caddy is routing status.tabaska.us to `beszel:8090`. `BESZEL_APP_URL` must be set to the public https URL so links/notifications resolve correctly.
- name: bgutil-pot
  about: |-
    `bgutil-pot` is a headless PO-token (proof-of-origin) provider sidecar running the `brainicism/bgutil-ytdlp-pot-provider:latest` image (currently server v1.3.1) on `mini`, defined by `foss-setup/configs/docker-stack/stacks/bgutil-pot/compose.yaml`. It joins the external `edge` Docker network and listens on port `4416` with no published host port and no web UI; the yt-dlp bgutil plugin inside the MeTube and Pinchflat containers reaches it at `http://bgutil-pot:4416` to fetch YouTube PO tokens. It was added 2026-07-08 to stop yt-dlp getting HTTP 403 on YouTube's JS/GVS bot challenge, and runs with `init: true` and `restart: unless-stopped`. There are no env vars or `.env`; the compose is a single minimal service block.
  troubleshoot:
  - symptom: |-
      Server is healthy (/ping OK, weeks of uptime) but the log shows zero 'Generating POT' lines — no client is actually using it.
    fix: |-
      The M14 trap (quality-gate 2026-07-16): the provider ran green for 6 days generating nothing because Pinchflat's image never installed the bgutil plugin — a sidecar with no wired consumer is dead weight that LOOKS fine. Verify each consumer end-to-end from inside its own container: `docker exec <consumer> yt-dlp -v --simulate <any-url>` must list `bgutil:http-<ver> (external)` without ', unavailable'. The pinchflat-pot-provider check does this daily for pinchflat.
  - symptom: |-
      MeTube/Pinchflat downloads start returning HTTP 403 on YouTube's JS/GVS challenge again
    fix: |-
      Confirm the provider is up and reachable on the edge network: `ssh mini 'cd /opt/stacks/bgutil-pot && docker compose ps'` (expect Up, port 4416/tcp) and `docker compose logs --tail 50` (expect 'Started POT server' and 'Generating POT'/'poToken' lines). Then verify the consuming container is on the same `edge` network and its yt-dlp bgutil plugin points at `http://bgutil-pot:4416`.
  - symptom: Consumers cannot resolve the bgutil-pot hostname / connection refused
    fix: |-
      The service has no published host port and relies on Docker DNS over the external `edge` network. Ensure MeTube/Pinchflat are attached to the same `edge` network; if the network was recreated, `docker compose up -d` this stack so it re-registers, and restart the consumer containers.
  - symptom: Image is pinned to :latest, so a pull can regress token minting
    fix: |-
      Update via `ssh mini 'cd /opt/stacks/bgutil-pot && docker compose pull && docker compose up -d'`; if a new tag breaks POT generation, roll back by pinning the previous digest in compose.yaml. Also keep the yt-dlp bgutil plugin version in the consumer containers in sync with this provider version.
- name: caddy
  about: |-
    Caddy is the single reverse proxy for the whole homelab, running on the Mac mini (`/opt/stacks/caddy`) and terminating TLS for every `https://*.tabaska.us` vhost defined in `caddy/Caddyfile`. It is a custom `xcaddy` build (`./Dockerfile`, `caddy:2.11.4` + `github.com/caddy-dns/cloudflare`) because the shipped Caddyfile's `local_tls` snippet uses `dns cloudflare` for DNS-01 wildcard certs — the stock image would fail to parse it and the proxy would never start. As of 2026-07-08 `local_tls` issues real, publicly-trusted Let's Encrypt certs via Cloudflare DNS-01 (NS delegated to Cloudflare, `CLOUDFLARE_API_TOKEN` in `.env`), so LAN-only services get valid certs without any inbound port; it also sets HSTS and access logging. Routing is mixed: mini-local services are reached by container name over the shared external `edge` Docker network, while NAS/rig/seedbox/HA/host-network services are proxied by IP via `{$NAS_IP}`/`{$RIG_IP}`/`{$SEEDBOX_IP}`/`{$HA_IP}`/`{$HOST_IP}`. It also serves the static wiki from `/opt/stacks/wiki/site` mounted read-only at `/srv/wiki`, and hardens Vaultwarden by 403-ing `/admin` from non-private/tailnet IPs.
  troubleshoot:
  - symptom: |-
      Caddy container will not start / Caddyfile fails to parse ("unrecognized directive: dns").
    fix: |-
      The stock `caddy` image lacks the Cloudflare DNS module the `local_tls` snippet needs. Use the custom build: `compose.yaml` must keep `build: .` (not the stock `image:` line). Rebuild with `ssh mini 'cd /opt/stacks/caddy && docker compose up -d --build'`.
  - symptom: A specific vhost returns 502 Bad Gateway.
    fix: |-
      This is an INCIDENT, not expected. It means the upstream is down or unreachable, not Caddy. Check `ssh mini 'cd /opt/stacks/caddy && docker compose logs --tail 50'` for `dial tcp`/`no such host`. For container-name upstreams (mini-local) confirm the target shares the `edge` network (`docker network inspect edge`); for IP upstreams confirm the right `{$NAS_IP}`/`{$RIG_IP}`/`{$SEEDBOX_IP}`/`{$HOST_IP}` in `.env` and that the remote service/host is up (rig AI + game stacks are on-demand; seedbox is over Tailscale).
  - symptom: TLS certs fail to issue/renew or Caddy falls back to untrusted internal CA.
    fix: |-
      DNS-01 depends on a valid `CLOUDFLARE_API_TOKEN` (Zone:DNS:Edit) in `.env`. If the token is missing/expired, ACME fails. The `caddy_data` volume holds certs & keys — never wipe it (Let's Encrypt rate limits). Verify with `ssh mini 'cd /opt/stacks/caddy && docker compose logs | grep -i acme'`.
  - symptom: ha.tabaska.us returns 400 Bad Request.
    fix: |-
      Home Assistant rejects the proxied request until its `http.use_x_forwarded_for` + `trusted_proxies` include the mini's Docker network ranges (configured in run-5 on the HA host at 192.168.10.50).
  - symptom: wiki.tabaska.us returns 404.
    fix: |-
      Expected until the wiki build populates `/opt/stacks/wiki/site` (mounted read-only at `/srv/wiki`). Rebuild the wiki stack to populate the static site; no Caddy change needed.
- name: calibre-web-automated
  about: |-
    Calibre-Web-Automated (CWA) is the ebook library and reading server running as the `calibre-web-automated` container on the Synology NAS (`192.168.10.4`), pinned to the community fork `ghcr.io/new-usemame/calibre-web-nextgen:v4.0.7` (the fork carries the CVE-2026-7713 Kobo auth-token IDOR fix that never shipped to the upstream `crocodilestick/calibre-web-automated` Docker Hub image, which stops at v4.0.6). Supply-chain posture (fix-38/I68, assessed 2026-07-18): the fork account is young and pseudonymous (created 2025-12, name reads like 'new-username' with an rn→m swap), so the image is pinned by sha256 DIGEST in the compose file — the tag alone is mutable and must never be trusted; the `cwa-image-digest-pinned` + `cwa-ghcr-tag-digest-drift` checks alert if the pin is dropped or the remote tag is re-pointed, and `cwa-upstream-cve-catchup` alerts when upstream ships a ≥4.0.7 release (the signal to migrate back off the fork). It auto-ingests ebooks dropped into `/volume1/docker/calibre-web-automated/ingest` (mounted `/cwa-book-ingest`, where Bookshelf's Connect script deposits imports) into the Calibre library at `/volume1/books` (mounted `/calibre-library`, holding `metadata.db`), and serves the web UI, OPDS, Kobo sync, and KOSync on `:8083`. Kobo store passthrough (`config_kobo_proxy` in `app.db`) is intentionally ENABLED — it carries the Kobo OAuth flow; a 2026-07-09 disable (after a kobo2 sync stall) was silently reverted by the same-day redeploy, the stall never recurred, and the ENABLED state was accepted as intent on 2026-07-18 (fix-38/M35, guarded by `cwa-kobo-proxy-intent`). It runs `PUID=1026`/`PGID=100` to match the DSM `btabaska:users` owner of the volumes, and is kept LAN/Tailscale-only (never a raw public `:8083`); the public `https://books.tabaska.us` name is fronted via the reverse-proxy/Tailscale path. The live container and the compose file both run `NETWORK_SHARE_MODE=false` (reconciled fix-38): the CIFS/SMB inotify watcher is unreliable, so ingest is instead driven by a scheduled/manual Library Refresh. Ingest dedupe (media-08, 2026-07-20): `auto_ingest_automerge` in `cwa.db` is set to `overwrite`, so a Bookshelf re-import/upgrade of a book CWA already holds merges into the existing record (same book id, file replaced) instead of minting a duplicate entry — the Connect script itself cannot dedupe because the arr container can't see the CWA library; the setting lives in a runtime DB no compose file owns and is guarded against drift by `cwa-ingest-automerge-guard`.
  troubleshoot:
  - symptom: |-
      After a redeploy, the flaky CIFS inotify watcher is unexpectedly active (NETWORK_SHARE_MODE came up true).
    fix: |-
      The compose file (live and repo mirror) declares the live-correct NETWORK_SHARE_MODE=false since fix-38; if the watcher is active, someone edited it back. Verify with: ssh nas then `sudo /usr/local/bin/docker inspect calibre-web-automated --format '{{range .Config.Env}}{{println .}}{{end}}' | grep NETWORK_SHARE_MODE`, and restore `false` in /volume1/docker/calibre-web-automated/docker-compose.yml + the repo mirror.
  - symptom: An ebook sits in the ingest folder and is never imported into the library.
    fix: |-
      Because the inotify watcher is off (NETWORK_SHARE_MODE=false), ingest relies on Library Refresh. Click Library Refresh in the CWA navbar (or wait for the scheduled refresh). Confirm the file landed in `/volume1/docker/calibre-web-automated/ingest` (owner btabaska:users) and is a completed file, not a partial download.
  - symptom: Kobo sync fails to authenticate or drops on a large library.
    fix: |-
      Kobo uses per-device CWA users and the store-passthrough must stay ON (it carries the OAuth flow) — do not disable it. For big libraries, use SYNC_ITEM_LIMIT to batch. Kobo sync is only safe on v4.0.7+ (CVE-2026-7713 fixed); if ever falling back to crocodilestick/...:v4.0.6, disable Kobo sync.
  - symptom: Never accidentally publish CWA on a raw public :8083.
    fix: |-
      Keep :8083 LAN/Tailscale-only. Access is via LAN http://192.168.10.4:8083 or Tailscale; the public https://books.tabaska.us is proxied, not a direct port exposure.
  - symptom: |-
      Author/series views split on the Kobo (same author listed twice), duplicate titles, or unwanted foreign-language editions appear after bulk grabs.
    fix: |-
      Bulk grabs import whatever author-string and edition the source carried ('Colfer, Eoin' vs 'Eoin Colfer', 'George R.R. Martin' vs 'George R. R. Martin', FR/RO/ES editions). Clean up with calibredb inside the container (run as abc so file ownership stays 1026:100): `sudo /usr/local/bin/docker exec -u abc calibre-web-automated calibredb set_metadata --with-library /calibre-library --field authors:"Canonical Name" <id>` merges an identity (calibre moves the dirs itself); export-then-remove unwanted editions with `calibredb export` + `calibredb remove --permanent`. ALWAYS `cp /volume1/books/metadata.db` somewhere first. The daily `cwa-library-author-split` / `cwa-library-covers` checks catch the class recurring; root-cause prevention for foreign editions is Readarr edition pinning (anyEditionOk=false), and for straight re-import duplicates it is `auto_ingest_automerge=overwrite` (media-08) — note automerge matches title+author EXACTLY, so punctuation variants (curly vs straight apostrophe) still slip through to the detection checks.
- name: diun
  about: |-
    Diun (Docker Image Update Notifier, `crazymax/diun:4.33.0`) runs on mini from `foss-setup/configs/docker-stack/stacks/diun/compose.yaml` (deployed at `/opt/stacks/diun`). It mounts the Docker socket read-only and, with `DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT=true`, watches every running container's pinned tag/digest, running a cron scan daily at 06:00 (`DIUN_WATCH_SCHEDULE=0 6 * * *`) — currently analyzing 35 images. It is strictly NOTIFY-ONLY: it never pulls or restarts anything, so it complements (does not replace) the deliberate manual update procedure in the Update-images runbook. Notifications go to the self-hosted ntfy (`DIUN_NOTIF_NTFY_*`), and it deliberately joins the `edge` network to reach ntfy over plain http (`http://ntfy:80`) because ntfy's https vhost serves an internal-CA cert that Diun's Go client rejects.
  troubleshoot:
  - symptom: |-
      Diun sends no notifications / ntfy delivery silently fails with a TLS/x509 certificate error
    fix: |-
      Diun must reach ntfy over plain http, not https — the internal-CA cert on the https vhost is rejected by Diun's Go client. Keep `DIUN_NTFY_ENDPOINT` pointed at `http://ntfy:80` (via the shared `edge` external network) rather than the https URL.
  - symptom: 'diun stack won''t start: network edge declared as external is not found'
    fix: |-
      The `edge` network is `external: true` and owned by another stack. Ensure the stack that creates `edge` is up first, or create it manually: `ssh mini 'docker network create edge'` before `docker compose up -d`.
- name: dockge
  about: |-
    Dockge (`louislam/dockge:1.5.0`) is a lightweight self-hosted web UI for managing Docker Compose stacks, running on the `mini` (192.168.10.2) from `foss-setup/configs/docker-stack/stacks/dockge/compose.yaml` and fronted by Caddy at https://dockge.tabaska.us (direct port `5001:5001`). It mounts `/var/run/docker.sock` for Docker control and bind-mounts `/opt/stacks:/opt/stacks` — the same absolute path on both sides of the mount, matching `DOCKGE_STACKS_DIR=/opt/stacks`, which is the load-bearing convention: every compose stack on the mini lives under `/opt/stacks/<name>/` so Dockge can discover, edit, and (re)deploy them. It is the chosen SIMPLE DEFAULT compose manager for the fleet; Dockhand is documented as the "power option" (logs/metrics history, vuln scanning, safe pulls + rollback, Apprise) but is not deployed. State is a SQLite DB under the local `./data/` volume.
  troubleshoot:
  - symptom: Dockge writes stack files to the wrong location or cannot see existing stacks
    fix: |-
      The `/opt/stacks` bind-mount must use the SAME absolute path on host and container (`/opt/stacks:/opt/stacks`) and match `DOCKGE_STACKS_DIR=/opt/stacks`. Do not change either side independently; Dockge stores compose files at the container path but Docker executes them at the host path.
  - symptom: New stack files created by Dockge are owned by the wrong user
    fix: |-
      Set `PUID`/`PGID` in `.env` on the mini to the owning user (run `id`); defaults are 1000:1000 via `.env.example`.
- name: forgejo
  about: |-
    Forgejo is a self-hosted Git forge running on the always-on Mac mini (`192.168.10.2`) at https://git.tabaska.us, fronted by Caddy on the shared external `edge` docker network. Its compose is mirrored at `foss-setup/configs/docker-stack/stacks/forgejo/docker-compose.yml` (deployed to `/opt/stacks/forgejo` on the host; until fix-41 2026-07-19 the mirror hid at `configs/git/` — a path nothing else used, so the 2026-07-16 drift audit reported the deploy control plane as having NO repo mirror (M48) when it was actually byte-identical) and pairs `codeberg.org/forgejo/forgejo:15.0.1` (pinned to the 15.0 LTS, supported until 2027-07-15) with a `postgres:17-alpine` backend; the web UI is published on host `:3030` (avoiding AdGuard's `:3000`) and git-over-SSH on host `:2222` (host `:22` is the box's own sshd). Beyond being a code host it is the deploy control plane: `publish-deploy.sh` pushes `main` to GitHub and to the `forgejo:home/homelab` repo, which every host then `ansible-pull`s against. Since 2026-07-14 `home/homelab` holds the FULL planning repo (root = `Home/`, the pre-2026-07-14 `git subtree split` flow is retired), so hosts consume `foss-setup/`-prefixed paths (`foss-setup/configs/`, `foss-setup/scripts/`, ...). Critical app.ini settings (DB, domain, SSH port, LFS, `DISABLE_REGISTRATION=true`, `REQUIRE_SIGNIN_VIEW=true`) are injected via `FORGEJO__*` env vars from `.env` rather than a tracked app.ini. Rebuild story since fix-41: the full live `.env` (including `FORGEJO_DB_PASSWORD`) is captured in the gitignored vault at `forgejo.env` and the web admin credential (`btabaska`) at `forgejo.admin_user`/`admin_password`, so a dead mini rebuilds from GitHub mirror + vault with no archaeology; the `stack-mirror-drift` verification check alerts if this (or any) live mini stack ever diverges from its repo mirror again.
  troubleshoot:
  - symptom: |-
      After a force-push that replaces the home/homelab lineage (e.g. the 2026-07-14 subtree->full-repo topology switch), host ansible-pull clones diverge and stop fast-forwarding.
    fix: |-
      Refresh the stale clone so it re-clones on the next timer fire: rm -rf ~/.ansible-pull on mini AND rig. Normal publishes are plain fast-forward pushes and need no cleanup.
  - symptom: Bind-mounted ./data/forgejo ends up root-owned or Forgejo can't write to /data.
    fix: |-
      The container chowns /data to USER_UID/USER_GID on start; set FORGEJO_UID / FORGEJO_GID in /opt/stacks/forgejo/.env to the host user's real id -u / id -g (1000/1000) so the bind mount is owned correctly, then docker compose up -d.
  - symptom: Major-version bump (e.g. 15.x -> 16.x) risks breaking the instance.
    fix: |-
      Only patch bumps within 15.0.x are safe/auto (Diun notifies). A major requires a manual, human-verified upgrade: read the Forgejo release notes first, back up ./data/db and ./data/forgejo, then pull. See https://forgejo.org/docs/latest/admin/release-schedule/.
  - symptom: Admin password unknown / vault entry missing or stale.
    fix: |-
      Re-mint it in the container and re-vault — the CLI refuses to run as root, so exec as the app UID: ssh mini 'docker exec -u 1000 forgejo forgejo admin user change-password -u btabaska -p NEWPW --must-change-password=false', then verify consumer-end with basic-auth against https://git.tabaska.us/api/v1/user (expect is_admin true) and store user+password in the vault under forgejo. This is the fix-23/fix-41 procedure; git pushes are unaffected (ssh-key auth).
  - symptom: git push to forgejo from the mini fails with permission/auth errors when run as root.
    fix: |-
      Root on the mini has no `forgejo` ssh alias — push as btabaska (this bites scripts run under sudo; drop privileges for the push step). The same rule is why the stack-mirror-drift check does its clone/fetch unprivileged and only runs the comparison under sudo.
- name: frigate
  about: |-
    Frigate is a local, real-time object-detection NVR for IP cameras, staged (not deployed) as a Docker Compose stack on `mini` at `/opt/stacks/frigate` from source `foss-setup/configs/docker-stack/stacks/frigate/compose.yaml`, image `ghcr.io/blakeblackshear/frigate:0.17.1` (0.17.2 not yet published upstream). It is the ha-15 camera-detection piece: the intended design ingests UniFi Protect RTSP(S) substreams — a low-res substream for continuous detect plus the full-res stream for recording — and runs AI detection entirely locally with no cloud. The blocking decision is the detector hardware, which has not been chosen: the compose `devices:` list is an empty `[]` with commented options for a Google Coral USB/M.2 TPU (the recommended path) or an Intel Quick Sync iGPU via OpenVINO — notably the 2014 Mac mini's HD 5000 iGPU is called out as NOT a practical OpenVINO detector, so a Coral is required on that host. Config/recordings are bind-mounted (`./config`, `${FRIGATE_MEDIA:-./media}`) with a 1 GB tmpfs RAM cache, it runs `privileged` on the external `edge` network, and the authenticated UI on `8971` is intentionally not proxied yet (the caddy frigate vhost is commented out).
- name: healthchecks
  about: |-
    Self-hosted Healthchecks (`healthchecks/healthchecks:v3.10` + `postgres:17-alpine`) providing dead-man's-switch monitoring for scheduled jobs across the fleet — restic/borgmatic backups, seedbox-sync, sbom-nightly, and cron tasks each ping a unique check URL on success, and if a ping doesn't arrive on schedule an alert fires. It runs on `mini` in `/opt/stacks/healthchecks`, published on host port `8001` (mapped to container `8000`, offset from the default to avoid clashing with Paperless) and fronted by Caddy at https://health.tabaska.us. The critical config decision is `INTEGRATIONS_ALLOW_PRIVATE_IPS=True`: alert targets (the ntfy container at `192.168.10.x`) are on the LAN, and without this every notification silently fails with "Connections to private IP addresses are not allowed" — a defect discovered 2026-07-09 where the dead-man alerts had never actually fired. Public ping URLs are built from `SITE_ROOT`/`HC_SITE_ROOT`, and the first superuser is bootstrapped on boot via `HC_SUPERUSER_EMAIL`/`HC_SUPERUSER_PASSWORD`.
  troubleshoot:
  - symptom: |-
      Dead-man alerts never fire even though checks go red — notifications to the ntfy container silently fail with "Connections to private IP addresses are not allowed".
    fix: |-
      Ensure `INTEGRATIONS_ALLOW_PRIVATE_IPS=True` is set in the healthchecks compose environment (it is, as of 2026-07-09). ntfy/webhook integration targets live on the LAN (`192.168.10.x`), so this flag is mandatory; restart with `ssh mini 'cd /opt/stacks/healthchecks && docker compose up -d'` after changing it.
  - symptom: |-
      A LAN job (cron/restic/borgmatic agent) pings but the check stays down / the ping doesn't register.
    fix: |-
      In-LAN agents must ping the PRIVATE-IP ping URL (e.g. http://192.168.10.2:8001/ping/<uuid>), not the public https://health.tabaska.us one; the public HTTPS path can fail to register from inside the network. Live logs confirm working LAN pings hit the `/ping/<uuid>` endpoint from `172.25.0.x` and return 200.
  - symptom: Container reports unhealthy / flapping.
    fix: |-
      Healthcheck queries `http://localhost:8000/api/v3/status/` (a DB test query returning 200). A transient unhealthy flap was seen 2026-07-07 and resolved (healthy since 2026-07-09); if it recurs, check the `db` (postgres:17-alpine) container is healthy via `ssh mini 'cd /opt/stacks/healthchecks && docker compose ps'` since healthchecks depends on `service_healthy` for db.
- name: homepage
  about: |-
    Homepage (gethomepage.dev) is the household's single pane of glass — the "front door" at https://home.tabaska.us that gives the family friendly app tiles (Plex, Immich, Calibre-Web, Seerr) and the operator a live observability view (Beszel, Uptime Kuma, plus the *arr stack). It runs as one container `ghcr.io/gethomepage/homepage:v1.13.2` on `mini` from `foss-setup/configs/docker-stack/stacks/homepage/compose.yaml`, listening on 3000 in-container and published as host port `3010` (deliberately not 3000/3001 to avoid clashing with Forgejo and Uptime-Kuma on the same box), also fronted by Caddy at `home.tabaska.us`. Live service widgets are lit up by `HOMEPAGE_VAR_*` secrets sourced from the vault into `.env` and referenced as `{{HOMEPAGE_VAR_*}}` in `config/services.yaml`; the container uses `dns: 192.168.10.4` (the **NAS** AdGuard — the mini's own AdGuard at .2 times out from inside containers, net-16) so `*.tabaska.us` rewrites resolve for ping/widgets. As of **home-06 (2026-07-22)** the key-needing tiles for already-running services are live-data widgets rather than plain ping tiles: Healthchecks, Paperless-ngx, Mealie (`version: 2`), Miniflux, Calibre-Web, Stash, Deluge, slskd, Forgejo (via the `gitea` widget) and Navidrome. Five creds came straight from the vault (`healthchecks.api_key`, `miniflux.api_key`, `deluge.password`, `soulseek.slskd_api_key`, `calibre-web.*`); four tokens were minted (Paperless `/api/token/`, Mealie `/api/users/api-tokens`, Forgejo `generate-access-token` scoped `read:notification,read:repository,read:issue`, Stash GraphQL `generateAPIKey`) and Navidrome's Subsonic `salt`+`token` (md5(password+salt)) derived — all stashed under vault `homepage_widgets.*`. As of **home-07 (2026-07-22)** a **Fleet** group adds per-HOST vitals — three `beszel` widget tiles (mini / rig / nas, `version: 2`, `systemId` = the exact Beszel UI name) that read live CPU/RAM/disk/network from the existing beszel hub at `http://beszel:8090` using the hub superuser (`HOMEPAGE_VAR_BESZEL_USER`/`HOMEPAGE_VAR_BESZEL_PASS` map to vault `beszel.admin_user`/`beszel.admin_password`) — reusing the beszel-agent already on every box, so zero new daemons on the 8 GB mini. The single `disk` field is each host's aggregate; the NAS `/volume1,2,3` per-mount split lives in the Beszel dashboard via the agent's `/extra-filesystems` mounts. As of **home-08 (2026-07-22)** a **Calendar** group sits first as the household's daily-use anchor: one `calendar` widget in `view: agenda` that merges upcoming Sonarr/Radarr/Lidarr releases (each an `integrations:` entry referencing the existing *arr service widget by `service_group: Media Automation` + `service_name` — it reuses that widget's url/key, so **no new *arr secret**) with personal events from a published **Proton Calendar** `.ics` feed (`type: ical`, `url: {{HOMEPAGE_VAR_PROTON_CAL_ICS}}` from vault `homepage_widgets.proton_calendar_ics_url`). Because that share link is an external dependency that can silently blank the personal half, the `homepage-calendar-ics-fetch` check has the homepage container itself `wget` the `.ics` (URL read from its own env, so no secret in the check) and assert a `BEGIN:VCALENDAR` body. The paired UniFi tile from the original home-08 was deferred — it needs a dedicated LOCAL read-only Network account (the `unifi_protect` account 403s on the Network login API). Docker socket auto-discovery is intentionally DISABLED (home-03, 2026-07-07) — every tile is defined manually in `config/services.yaml` because the entrypoint drops to `PUID:PGID` and sheds groups, so the socket mount only produced repeating EACCES errors; the `/var/run/docker.sock:ro` mount remains but `config/docker.yaml` has no `local:` block.
  troubleshoot:
  - symptom: |-
      Page won't load with "Host validation failed" after adding a new hostname or port.
    fix: |-
      Since v1.0 `HOMEPAGE_ALLOWED_HOSTS` is a required exact-match allowlist. Add the verbatim `host:port` (and the Caddy subdomain) you type in the browser to `HOMEPAGE_ALLOWED_HOSTS` in `.env` on mini, e.g. `home.tabaska.us,192.168.10.2:3010,localhost:3010`, then `ssh mini 'cd /opt/stacks/homepage && docker compose up -d'`.
  - symptom: |-
      Logs spam `<httpProxy> Error calling http://maintainerr:6246/ ... getaddrinfo EAI_AGAIN maintainerr` (500).
    fix: |-
      A `services.yaml` widget points at the bare container name `maintainerr`, but that container isn't on the `edge` network so Docker/AdGuard DNS can't resolve it. Either put maintainerr on the `edge` network, use its LAN IP/Caddy hostname in the widget href+url, or remove the widget block. Non-fatal — only that one tile's live status is broken.
  - symptom: Widget shows a plain link tile instead of live stats, or shows an auth error.
    fix: |-
      The matching `HOMEPAGE_VAR_*_KEY`/`_TOKEN` in `.env` is blank or stale. Fill it from the vault and `docker compose up -d`. Blank values intentionally degrade to a plain link tile rather than erroring.
  - symptom: |-
      Backend logs show `<validateWidgetData> Invalid data for widget '<stash|calibreweb|paperlessngx>' endpoint 'undefined'` or `<credentialedProxyHandler> HTTP Error 404 calling http://<miniflux|mealie|healthchecks|slskd>/<base>/` right after a page load.
    fix: |-
      Benign — do NOT chase it. Those widget types make one initial call to the API's *base* path (endpoint resolves to `undefined`), which 404s or returns the service's HTML login page, then fetch the real field endpoints successfully; the tile still renders live data (verified in-browser home-06 2026-07-22). The `homepage-widget-errors` check deliberately only alerts on `EAI_AGAIN`/`getaddrinfo` (a genuinely unresolvable dead tile), so this 404 noise never pages.
  - symptom: Wanting Docker container auto-discovery back.
    fix: |-
      It is disabled by design — the app runs as PUID:PGID and can't read the socket even with group_add, producing EACCES spam. To re-enable, front the socket with docker-socket-proxy and point `config/docker.yaml` at a `tcp://` endpoint instead of the raw `/var/run/docker.sock`.
- name: immich
  about: |-
    Immich is a self-hosted photo/video library and mobile-backup app running on the NAS (Synology DS920+, `192.168.10.4`) via DSM Container Manager / Docker Compose, project `immich`, reachable at https://immich.tabaska.us (LAN `http://192.168.10.4:2283`). The stack is four containers — `immich_server` (`2283:2283`), `immich_machine_learning` (OpenVINO variant for face/CLIP inference), a Valkey `redis`, and a VectorChord `postgres` database — pinned to Immich `v3.0.3` via `IMMICH_VERSION` in `.env` (compose uses `${IMMICH_VERSION:?...}` with no floating `release` fallback, so it refuses to start unpinned), with the Valkey and Postgres images digest-pinned to match that exact release (upgraded v2.7.5 → v3.0.3 on 2026-07-18 while the library was still empty, fix-35). Originals live at `UPLOAD_LOCATION=/volume1/photo` (Tier-1 irreplaceable data, backed up via Hyper Backup) and the DB at `DB_DATA_LOCATION=/volume1/docker/immich/postgres` (with `DB_STORAGE_TYPE=HDD` since it sits on spinning Btrfs disks); `/dev/dri` is passed into both the server and ML containers to use the J4125's Intel Quick Sync iGPU for transcoding (and as the ML *fallback*). **Machine-learning inference — CLIP smart search, `buffalo_l` faces, and PP-OCRv5 OCR — is offloaded to the rig's RTX 3090 Ti** (nas-32, 2026-07-22): a second `immich-machine-learning:v3.0.3-cuda` container at `/opt/stacks/immich-ml` on the rig (GPU via CDI, published to `192.168.10.12:3003`), with the server's `machineLearning.urls` listing the rig **first** and the NAS's local OpenVINO container as automatic fallback (Immich `availabilityChecks`, 30 s interval). The offload itself kept the same models (no re-index); having the GPU then justified upgrading the **smart-search CLIP model** `ViT-B-32__openai` (512-dim, ~70% recall — the low-quality legacy default) → **`ViT-B-16-SigLIP2__webli`** (768-dim, ~85% recall, natively multilingual) on 2026-07-22. Changing the model changes the embedding dimension, so Immich dropped and rebuilt the `smart_search` `vector(768)` table and a one-time forced `smartSearch` job (`{command:start,force:true}`) re-encoded the whole ~5.6k-asset library on the rig GPU (a DB pg_dump was taken first — dimension-change bugs have wedged Immich servers); duplicate detection shares these embeddings, so its `maxDistance` may need re-tuning. NOTE this is *not* an LLM hookup — Immich's AI is CLIP/InsightFace ONNX vision models, so it cannot use the rig's Ollama/LiteLLM stack. The rig `-cuda` image tag MUST track `IMMICH_VERSION` (a mismatch breaks the ML API; drift-guarded by `rig-immich-ml-version-match`), and because the ML endpoint is unauthenticated and receives plaintext previews it is LAN-scoped (published to the rig LAN IP + `ufw allow from 192.168.10.4 to any port 3003`). Mirrorless-camera SD cards are ingested from a workstation with `immich-go` rather than the mobile app. Content (not liveness) is watched by two verification checks — `nas-immich-backup-freshness` and `nas-immich-mobile-paired` — using a `verification-monitor` API key scoped to `server.statistics` only (vault `immich.verify_api_key`); both alert until a phone is actually paired and uploading (see the [photos runbook](../runbooks/photos.md)). Both accounts (brandon, kaelyn92) are full admins by explicit decision 2026-07-18 (quality-gate M58, accepted).
  troubleshoot:
  - symptom: |-
      immich-server or immich-machine-learning fails to start after a reboot or DSM update, complaining about /dev/dri
    fix: |-
      Confirm the iGPU device still exists on the host: ssh nas then `ls -l /dev/dri` (expect card0 + renderD128). If /dev/dri is missing, remove the `devices: [/dev/dri:/dev/dri]` blocks from docker-compose.yml (both server and ML services) and redeploy; hardware transcoding/OpenVINO will fall back to software.
  - symptom: Compose refuses to start with an error about IMMICH_VERSION being unset
    fix: |-
      This is intentional (`${IMMICH_VERSION:?set IMMICH_VERSION in .env}` — no floating fallback). Ensure `.env` next to docker-compose.yml at /volume1/docker/immich sets `IMMICH_VERSION=v3.0.3` (or the intended release).
  - symptom: |-
      Version bump breaks the DB or the pinned Valkey/Postgres digests no longer match the release
    fix: |-
      When bumping IMMICH_VERSION, re-read the release notes and re-verify the redis (valkey) and database (VectorChord postgres) image digests against that release's official docker-compose.yml (https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml) — Postgres major upgrades are NOT automatic. Then `cd /volume1/docker/immich && sudo docker compose pull && sudo docker compose up -d`.
  - symptom: Hardware transcoding not actually being used after deploy
    fix: |-
      The Quick Sync device is passed in but must also be enabled in-app: Admin > Settings > Video Transcoding > Hardware Acceleration = Quick Sync (OpenVINO ML acceleration works automatically via the `-openvino` image).
  - symptom: |-
      Text/keyword smart search is slow or 500s while `/ping` and image indexing look fine (rig ML text-encode broken)
    fix: |-
      Symptom of the rig `-cuda` container losing its UTF-8 locale: Python's `open()` reads the SigLIP2 tokenizer config as ASCII and the TEXTUAL model dies with `UnicodeDecodeError` on every text query, which then silently falls back to the NAS CPU (so `/ping` and visual indexing stay green — a green-but-broken trap). The fix is baked into `/opt/stacks/immich-ml/compose.yaml`: the ML service sets `PYTHONUTF8=1` + `LC_ALL=C.UTF-8` + `LANG=C.UTF-8`. Confirm with `ssh rig 'docker exec immich_machine_learning printenv | grep -E "PYTHONUTF8|LC_ALL"'` and `ssh rig 'docker logs --since 5m immich_machine_learning | grep -c UnicodeDecodeError'` (want 0). The `rig-immich-ml-text-encode` check probes this directly (a real text encode, not `/ping`).
  - symptom: |-
      Smart search / face detection is suddenly slow, or ML is failing (nas-32 remote-ML on the rig)
    fix: |-
      Immich routes ML to the rig GPU first (`http://192.168.10.12:3003`) with the NAS OpenVINO container as fallback. Check the crit `rig-immich-ml-reachable` check and that the rig container is up: `ssh rig 'docker ps | grep immich_machine_learning'` (stack at `/opt/stacks/immich-ml`). If the rig is down, ML silently falls back to the slower NAS iGPU — search/faces still work, just slower. If `rig-immich-ml-version-match` warns, the rig `-cuda` image tag drifted from the NAS `immich-server` version: set the same `IMMICH_VERSION` in `/opt/stacks/immich-ml/.env` on the rig and `cd /opt/stacks/immich-ml && docker compose pull && docker compose up -d`. The ML URL list lives in Admin > Settings > Machine Learning (`rig-immich-ml-configured` warns if the rig URL is ever removed). First request after a fresh rig container re-downloads the models into the `model-cache` volume (~1-3 GB).
  - symptom: |-
      ntfy `verification` alerts `backup=STALE` (nas-immich-backup-freshness) or `paired=NO` (nas-immich-mobile-paired)
    fix: |-
      These probe CONTENT, not liveness — the 2026-07-16 audit found every liveness probe green around a zero-asset library because no phone was ever paired (findings H17/H28). `paired=NO` means no iOS/Android session exists: install the Immich mobile app, point it at https://immich.tabaska.us, log in, and enable background backup (steps in the photos runbook). `backup=STALE` with a paired device means uploads stopped flowing — check the app's backup screen for stalled uploads, then the server job queue at Admin > Jobs.
- name: kometa
  about: |-
    Kometa (formerly Plex-Meta-Manager) is a scheduled batch job that builds collections, overlays, and playlists across the Plex libraries, pinned at `kometateam/kometa:v2.3.1` and running on `mini` from `foss-setup/configs/docker-stack/stacks/kometa/compose.yaml`. It has no web UI, no port, and joins no shared network — the container stays up (`restart: unless-stopped`) and runs itself daily at `KOMETA_TIME` (05:00), or one-shot via `docker exec -e KOMETA_RUN=True kometa python3 kometa.py` — NOTE the env var is mandatory: Kometa gives environment variables precedence over CLI flags, and the compose env pins `KOMETA_RUN=False`, so the widely-documented `docker compose run --rm kometa --run` silently ignores `--run` and sits waiting for the 05:00 schedule (fix-37 burned 15 minutes on this). All behaviour is driven by `./config/config.yml` (bind-mounted `./config:/config`), which points Plex at the NAS server `http://192.168.10.4:32400` and manages the `Movies` and `TV Shows` libraries plus the MDBList-backed default playlists. fix-37 (M16, 2026-07-18) cut the config to the connections actually in use: plex + tmdb + mdblist (key required — MDBList made keys mandatory and the daily run 401ed for weeks, silently never updating 2 playlists), deleted ~12 empty template integration blocks that each logged a Config Error every run, and dropped the dead `Anime` (no such Plex library) and `Music` (missing Music.yml) library blocks. The `kometa-run-clean` verification check parses the last run's log and fails on ANY buried builder/config error — Kometa exits 0 even when builders inside the run failed, so exit-code monitoring is worthless here. It sits downstream of the *arr/Plex pipeline as pure cosmetic enrichment — it never ingests media, only decorates what Plex already has.
  troubleshoot:
  - symptom: |-
      Daily run finishes but the Error Summary shows "MDBList Error: 401 - Authentication required" and MDBList-backed playlists silently stop updating.
    fix: |-
      MDBList requires an API key for every list fetch. Set mdblist.apikey in /opt/stacks/kometa/config/config.yml (key lives in the secrets vault at mdblist.api_key; free from mdblist.com -> Preferences -> API), then verify with the kometa-run-clean check or a one-shot run: docker exec -e KOMETA_RUN=True kometa python3 kometa.py (the env var is required — see About).
  - symptom: |-
      Error Summary shows "sub-attribute apikey/token is blank" Config Errors for an integration (notifiarr, omdb, tautulli, radarr, sonarr, trakt, mal, gotify, ntfy...).
    fix: |-
      An integration block exists in config.yml without a credential — an empty block is a latent error on every run, not a harmless placeholder. Delete the block entirely (fix-37 removed all of them); re-add it from the upstream template only on the day you actually connect that service, credential included. The kometa-run-clean check pages if any run logs a Config Error again.
  - symptom: |-
      Log error: "Plex Library 'X' not found. Options: [...]" or "File does not exist /config/Music.yml".
    fix: |-
      A libraries: block in config.yml names a Plex library that does not exist, or references a collection file that was never created. Fix the name to a real library (current Plex libraries: Movies, TV Shows, Music, YouTube) or delete the block — fix-37 removed the dead Anime and Music blocks this way.
  - symptom: 'Kometa v2.3.1.4 reports "Newest Version: 2.4.4" — image is behind upstream.'
    fix: |-
      Version is pinned in compose.yaml on purpose. To update, bump image: kometateam/kometa:<tag> in compose.yaml, then ssh mini 'cd /opt/stacks/kometa && docker compose pull && docker compose up -d'; review upstream changelog since overlay/collection schema can shift between minors.
- name: libreseerr
  about: |-
    Libreseerr is the book-request portal in Brandon's *arr media stack — the ebook/audiobook counterpart to Seerr (movies/TV) and MusicSeerr (music) — running as a single `ghcr.io/zamnzim/libreseerr` container on the Mac mini (`/opt/stacks/libreseerr`), exposed on `8789:5000` over the external `edge` (Caddy/Tailscale) network at https://libreseerr.tabaska.us. Since bmig-04 (2026-07-20) it fronts Bookshelf on the NAS (`http://192.168.10.4:8790`, hardcover metadata via rreading-glasses-hc) to turn user book requests into monitored+searched additions, and pulls discovery/browse data from OpenLibrary (with an explicit `fields=` list — OL's default search fields stopped including `isbn`, which would silently disable the ISBN-first lookup). Three files are bind-mounted read-only as a local patch — `./app.py`, `./readarr.py`, and `./bookshelf.py` (a `ReadarrClient` subclass that shadows the image's unpatched Bookshelf client; the fork speaks the same v1 API) — that re-rank lookup candidates (upstream blindly picks `readarr_books[0]`), enforce the bmig-04 author-verification gate (a candidate's OWN author must token-match the requested author or be a bio-cross-referenced pen name like Mira Grant ↔ Seanan McGuire; authorless candidates are never stamped with the requested author), prefer ISBN lookups over term search, and fail loudly to ntfy `books` when no eligible candidate exists instead of adding the next-best wrong book (C1/C4). The same patched app.py also runs a background status reconciler (fix-26) that keeps the request dashboard truthful against the backend instead of only refreshing on UI opens. The image is pinned by MANIFEST digest (`820134e4`), not by local image ID, because upstream publishes no version tags and garbage-collects old digests.
  troubleshoot:
  - symptom: |-
      Book request fails with a 400 or gets "stuck" (never lands in Readarr); Readarr rejects the phantom author with a 404.
    fix: |-
      This is the junk-edition bug: upstream picks readarr_books[0] which can be a garbage rreading-glasses/Goodreads user edition. It is fixed by the bind-mounted ./app.py + ./readarr.py patch (candidate re-ranking + retry-until-accepted). Confirm both files are still mounted read-only in compose.yaml and present in the container; the ranking logic lives around app.py line ~1017.
  - symptom: After an image bump, book requests regress to 400s / junk editions again.
    fix: |-
      The patch lives ONLY in the bind-mounted app.py/readarr.py, not in the upstream image. Every image bump can ship a new app.py signature — re-derive (re-apply) the local patch against the new upstream app.py before recreating. Marker comments in the code: "local patch (libreseerr-diagnosis 2026-07-12); re-derive on image bump" and "local patch (fix-25)" (the `_ensure_author_monitored` author-monitoring fix in readarr.py — without it requested books vanish from wanted/missing and are never re-searched).
  - symptom: |-
      A request sits 'processing 0%' forever with zero Readarr history — the first search found nothing and nothing ever retries it.
    fix: |-
      Quality-gate H6/H16 (fix-25, 2026-07-17): upstream added authors with addOptions.monitor="none", which also sets author.monitored=False, and Readarr's wanted/missing EXCLUDES books whose author is unmonitored — so a no-result first search was permanent. The bind-mounted readarr.py now forces author.monitored=True on every add/match path (books stay selectively monitored; monitorNewItems stays "none"). The `arr-orphan-monitor-flags` verification check fires if the flag combination ever reappears; the request itself completes as soon as an indexer has the book.
  - symptom: |-
      `docker compose pull` fails with "manifest unknown", or `up -d` won't start after an app.py edit.
    fix: |-
      Do NOT pin the local image ID (the 2026-07-09 audit mistakenly pinned ID c2dbf74a, which is not pullable — corrected 2026-07-12 to manifest digest 820134e4). Keep the sha256 MANIFEST digest in compose.yaml. To recreate offline after an app.py change without pulling: `ssh mini 'cd /opt/stacks/libreseerr && docker compose up -d --pull never'`.
  - symptom: Container won't start, complaining SECRET_KEY is unset.
    fix: |-
      `SECRET_KEY` is required (compose uses `${SECRET_KEY:?...}`). It must exist in /opt/stacks/libreseerr/.env on the mini (sourced from the vault). Generate once with `openssl rand -hex 32` — a stable value keeps sessions from invalidating on restart.
  - symptom: Requests are accepted in Libreseerr but nothing downloads.
    fix: |-
      Libreseerr only hands off to Bookshelf on the NAS (http://192.168.10.4:8790 since bmig-04). Check Bookshelf itself — confirm the book is monitored and searched, and that the indexer/download-client chain is healthy. Verify connectivity from the mini container: logs should show `GET /api/v1/book HTTP/1.1 200`.
  - symptom: |-
      A request errors "No eligible metadata candidate … refusing to add a different book (author gate)" (ntfy push), but the book looks legitimate.
    fix: |-
      The bmig-04 author gate refused every lookup candidate: none had an author token-matching the requested author (pen names pass only when the two hardcover author bios name each other in BOTH directions — the Mira Grant ↔ Seanan McGuire shape). This is the designed correct-or-loud behavior replacing the C1/C4 silent wrong-book adds ('Pride, Prejudice, and Peril' bound to a Jane Austen request). Check the rejected-candidates list in the error: if the author spelling differs between OpenLibrary and hardcover, re-request under the name hardcover uses; if hardcover genuinely lacks the work, it cannot be added automatically — grab it manually via Bookshelf interactive search.
  - symptom: |-
      Dashboard shows a request 'processing 0%' days after the book was imported, or 'completed 100%' for a book that is not actually in the library.
    fix: |-
      Quality-gate H15/M36 (fix-26, 2026-07-17). Upstream only reconciled statuses when the UI POSTed /api/requests/refresh, and swallowed every exception — so the dashboard rotted whenever nobody had the page open. The bind-mounted app.py now runs a background reconciler (marker: "Background request reconciler (M36)"): one gunicorn worker (fcntl-lock winner on data/.reconciler.lock) re-checks every non-terminal request against Readarr every RECONCILE_INTERVAL seconds (default 900) and logs failures instead of swallowing them. It also detects two rot states and marks the request 'error' with an explanation: the Readarr book was deleted after the request (dangling), or the book is unmonitored with no file (nothing will ever search for it). The false-'completed' shape came from a junk-edition mis-import: Readarr matched a "Naamah's Curse" grab to a misspelled duplicate Goodreads edition record — if a book keeps reverting to a junk edition on author refresh, pin the correct edition in Readarr by monitoring it and setting the book's anyEditionOk=false (API: PUT /api/v1/book/{id} with editions[] + "anyEditionOk": false); refresh then keeps the choice. Hourly tripwires: `libreseerr-request-rot` and `seerr-request-rot` in verification/checks.d/media.yaml compare stored request statuses against live backend truth and alert to ntfy if the dashboards lie again.
  - symptom: |-
      A request errors immediately (400 "A book with this ID was not found" / timeout / "Could not find author"), sits in 'retrying', or you received a "Book request failed" ntfy push.
    fix: |-
      Books-stack scan B8–B12 (fix-48, 2026-07-20) — see the [request-path runbook](../runbooks/books-requests.md). The bind-mounted app.py/readarr.py now: adopt an existing library record before any lookup (canonical work often already present while the lookup returns only junk editions); never POST an Open Library id as foreignBookId (permanent error + ntfy instead); run Readarr lookups with READARR_TIMEOUT=60s under gunicorn --timeout 300 (the 15s hard-code + 30s worker default caused the 07-18 burst failures); match author names unicode/HTML-entity/date-insensitively (Emily Brontë); auto-retry transient failures 5x via the reconciler and re-trigger BookSearch every ≥6h up to 4x for monitored-no-file books before failing loudly. Every terminal failure pushes to ntfy topic `books` (token: vault ntfy.libreseerr_token, NTFY_TOKEN in .env). Tripwires: `libreseerr-request-stuck` and `libreseerr-request-path-guards` in verification/checks.d/reading.yaml.
- name: mealie
  about: |-
    Mealie is a self-hosted recipe manager, meal planner, and shopping-list app running as a single container (`ghcr.io/mealie-recipes/mealie:v3.4.0`) on `mini`, defined at `foss-setup/configs/docker-stack/stacks/mealie/compose.yaml`. It listens on `9000:9000` for direct LAN access and is also fronted by Caddy at https://recipes.tabaska.us (that public URL is passed into the container via `BASE_URL=${MEALIE_BASE_URL:-...}` — the host-side var is `MEALIE_BASE_URL`, remapped to Mealie's own `BASE_URL` env). It uses the default embedded SQLite store persisted to the `./data` bind mount (i.e. `/opt/stacks/mealie/data` on the host), which must be included in the Tier-1 backup set since there is no external database; PostgreSQL is available upstream only if it ever needs to scale out. `ALLOW_SIGNUP=false` is hardcoded in the compose so accounts are admin-created only, and `MEALIE_SECRET` (a long random token signing sessions/tokens) is sourced from the vault-backed `.env`. It joins the shared external `edge` Docker network so Caddy can reach it.
  troubleshoot:
  - symptom: Healthcheck flapping / container shown unhealthy (seen 2026-07-07).
    fix: |-
      Resolved and stable since 2026-07-09 — the healthcheck curls `http://localhost:9000/api/app/about` every 30s (start_period 30s). Confirm with `ssh mini 'cd /opt/stacks/mealie && docker compose ps'` (expect Up ... healthy) and check for repeated 200 OK on `/api/app/about` in `docker compose logs`.
  - symptom: |-
      Share links / OAuth-style API URLs point at localhost instead of the public domain.
    fix: |-
      Set `MEALIE_BASE_URL` in `/opt/stacks/mealie/.env` to `https://recipes.tabaska.us` (it feeds the container's `BASE_URL`), then `docker compose up -d` to recreate. Do not confuse the host var name (`MEALIE_BASE_URL`) with the in-container var (`BASE_URL`).
  - symptom: '`./data` owned by root or Mealie cannot write its SQLite DB.'
    fix: |-
      Container runs with `PUID=1000`/`PGID=1000`; ensure `/opt/stacks/mealie/data` is owned by that host user (`chown -R 1000:1000`) so ownership stays sane across restarts.
- name: media-automation
  about: |-
    The full home `*arr` acquisition stack, running as the `media-automation` Compose project on the NAS (DS920+, Container Manager) and defined in `foss-setup/configs/nas/media-automation/docker-compose.yml`. It bundles `prowlarr` (indexer manager, with `flaresolverr` for Cloudflare) feeding `sonarr` (TV→`/volume3` `/tv`), `radarr` (movies→`/volume2` `/movies`), `lidarr` (music→`/volume1` `/music`), and `bookshelf` (books→`/readarr-library` — the maintained Readarr fork, :8790, `ghcr.io/pennydreadful/bookshelf` hardcover variant, digest-pinned, API key at vault `arr_api_keys.bookshelf`); `unpackerr` extracts archives (its books slot speaks the readarr protocol via `UN_READARR_0_*` env pointed at bookshelf), `soularr` bridges Lidarr's wants to slskd on the seedbox, and `beets` is an on-demand tag-only layer. Books metadata comes from the self-hosted `rreading-glasses-hc` (:8789, Hardcover mode, database `rreading_glasses_hc` in the shared `rreading-glasses-db` postgres:17.6 — superuser role `rreading-glasses`, NOT `postgres`; token at vault `books.hardcover_api_token`, **expires every Jan 1**, guarded by the `hardcover-token-valid` check). The goodreads-era pair (EOL readarr :8787 + goodreads-mode rreading-glasses :8788) was decommissioned in the books cutover (`docs/books-metadata-cutover-2026-07-20.md`, bmig-01…06, completed 2026-07-20): containers removed in bmig-05, the 14GB goodreads database dropped in bmig-06 (pgdump archived at `/volume1/archive/books-cutover-bmig05/`). Bookshelf mirrors the readarr-era policy: EPUB-Preferred quality profile (the stock PDF-tolerant `eBook` profile is deleted — bmig-06 — and libreseerr's patched client orders EPUB Preferred first so it stays the request default), foreign-language + companion/coloring-book release blocklist, Deluge client with its OWN `bookshelf`/`bookshelf-imported` categories, remote path mapping, and the CWA-ingest Connect script (note: Bookshelf ManualImport DOES fire Connect, unlike readarr). Beware: POSTing a root folder triggers an immediate disk scan that auto-adopts matched files — under Hardcover quota pressure (~60 req/min account-wide) this mints junk/duplicate records; searches also degrade while author refreshes storm. The two halves connect off-site: home apps drive the seedbox "Betty" Deluge over its API via the tailnet (`100.119.134.94:5945` — since fix-21 Deluge binds loopback on Betty and the public IP exposes nothing; the NAS Tailscale package must stay in TUN mode) and READ completed downloads through an rclone SFTP mount (`seedbox:/home/hd34/btabaska/files` → `/volume1/mounts/seedbox-files`), which every download-touching container binds at the identical path `/seedbox`; each `*arr` needs a Remote Path Mapping (`/home/hd34/btabaska/files/` → `/seedbox/`) so Deluge-reported paths resolve inside the container. The critical DSM constraint is that `fuse.rclone` cannot satisfy `:rslave` propagation, so the seedbox is a plain bind and download-touching containers must be restarted after any watchdog remount; imports feed downstream to Plex, the CWA book pipeline, and the iPod/Rhythmbox music sync.
  troubleshoot:
  - symptom: |-
      Radarr shows a movie as imported (hasFile=True) but the file is only ~6-24 MB and Plex shows nothing — a release's junk `sample.*` was imported as the feature.
    fix: |-
      Delete the sample-sized file, blocklist/re-grab the release, and confirm Radarr's Minimum size / sample-rejection quality rules are set so tiny files are filtered. The `arr-plex-journey.py` #6 check (tmdb/tvdb external-id coverage) is what surfaces this 'green but not watchable' gap.
  - symptom: |-
      Sonarr search UI freezes / interactive search returns ~0 grabs; app becomes unresponsive.
    fix: |-
      SQLite-lock search-freeze class — restart sonarr (`sudo docker restart sonarr` on the NAS) to clear the wedged DB lock. Note IPT-only indexers legitimately return near-zero grabs; verify Prowlarr has additional capable indexers + the FlareSolverr proxy (`http://flaresolverr:8191`) attached before assuming a freeze.
  - symptom: |-
      Downloads sit in *arr queues forever waiting on extraction, but the unpackerr container still reports 'Up'.
    fix: |-
      unpackerr can silently wedge its poller while the process stays up. The compose already adds a healthcheck probing `http://localhost:5656/metrics` so a fully-wedged process flips the container to 'unhealthy' (paged via containers-health-nas); if wedged, `sudo docker restart unpackerr`. Confirm the `[webserver]` block stays enabled in `./unpackerr/unpackerr.conf` or the healthcheck can't fire.
  - symptom: |-
      After a seedbox rclone remount, *arr imports fail with I/O / EBADF errors even though `/seedbox` looks mounted.
    fix: |-
      The fuse.rclone bind cannot use rslave propagation, so containers hold a stale mount after a watchdog remount. Restart every download-touching container (`sudo docker restart sonarr radarr lidarr readarr unpackerr`) — the remount watchdog normally does this automatically.
  - symptom: |-
      Readarr book searches 400 / metadata lookups fail, or the rreading-glasses container errors on credential generation.
    fix: |-
      rreading-glasses ships only rolling tags and is pinned by digest; Goodreads auth changes can break credential generation. Refresh the digest deliberately: `docker buildx imagetools inspect blampe/rreading-glasses:latest`, update the `@sha256:` pin in the compose, then `docker compose up -d rreading-glasses`. Ensure Readarr's Metadata Provider Source (Settings > Development, hidden page) points at `http://rreading-glasses:8788`.
  - symptom: |-
      rreading-glasses-hc (:8789) searches return empty `[]` while the container is Up, with `403 top_level_limit_exceeded` or `429` batched-query errors in its logs.
    fix: |-
      Two distinct causes. 403 top_level_limit_exceeded = the Hardcover API caps GraphQL requests at 5 top-level queries (since 2026-07-18); the published `:hardcover` image batches 25 and is broken — the NAS runs a temporary local build `local/rreading-glasses:hardcover-batch5-a2939b6` (upstream main a2939b6 + a one-line batch-size patch, built on the mini; see the IMAGE note in `configs/nas/media-automation/docker-compose.yml` and upstream issue blampe/rreading-glasses#574 — swap back to the upstream digest once fixed, task books-hc-upstream-swap). 429 = Hardcover's ~60 req/min quota, normal on a cold cache while background author refreshes run; it settles as the postgres cache warms. Separately, the token at vault `books.hardcover_api_token` EXPIRES every Jan 1 — renew at hardcover.app → Settings → Hardcover API, update `HARDCOVER_API_TOKEN` in the stack `.env`, and recreate the container.
- name: metube
  about: |-
    MeTube is a web UI for `yt-dlp` (paste a URL, get the video/audio) that serves as the one-off download companion to Pinchflat (which handles YouTube channel subscriptions). It runs on `mini` at `/opt/stacks/metube` from a locally-built image `metube-bgutil:local` (Dockerfile layers `bgutil-ytdlp-pot-provider` and a nightly pre-release `yt-dlp` onto `ghcr.io/alexta69/metube:latest`), exposed on `8081:8081` and fronted by Caddy at https://metube.tabaska.us. It joins the shared external `edge` bridge network so it can reach the `bgutil-pot` PO-token provider at `http://bgutil-pot:4416` (wired via `YTDL_OPTIONS`) — the same 2026-07-08 YouTube JS-challenge/403 workaround also forces `player_client: ["default","tv","web_safari"]`. Downloads land on the NAS via CIFS (`METUBE_DOWNLOADS=/mnt/nas-youtube/metube`, with an `/audio` path bound to `/mnt/nas-music-rw/YouTube`) so they index alongside Pinchflat archives; critically `STATE_DIR=/state` is kept on local disk because MeTube's dbm/shelve queue database does not work on CIFS.
  troubleshoot:
  - symptom: |-
      Downloads fail with HTTP 403 / 'Sign in to confirm you're not a bot' / n-signature errors from YouTube.
    fix: |-
      This is the recurring YouTube JS-challenge; the fix is already wired (bgutil PO-token provider + forced tv/web_safari player clients). If it recurs, the bundled yt-dlp has aged out of the current signature solver — rebuild the image to pull the nightly: ssh mini 'cd /opt/stacks/metube && docker compose build --pull && docker compose up -d'. Also confirm the shared bgutil-pot container is up: ssh mini 'docker ps | grep bgutil-pot'.
  - symptom: |-
      MeTube starts but the download queue is empty / corrupt after a restart, or write errors on the state DB.
    fix: |-
      MeTube's queue is a Python dbm/shelve database that breaks on CIFS. Ensure STATE_DIR stays on the local ./state bind mount (never point it at the NAS). Check ssh mini 'cd /opt/stacks/metube && docker compose logs --tail 50' for dbm errors.
  - symptom: Container fails to start with 'network edge not found'.
    fix: |-
      The edge network is external and owned by another stack (Caddy/dockge). Bring up the owning stack first; the network must already exist before metube can join it.
  - symptom: Downloads don't appear in Plex/on the NAS.
    fix: |-
      Downloads write to the CIFS mount /mnt/nas-youtube (via METUBE_DOWNLOADS) — verify the mount is live on mini: ssh mini 'mountpoint /mnt/nas-youtube && ls /mnt/nas-youtube/metube'. A stale/dropped CIFS mount silently fails writes.
- name: miniflux
  about: |-
    Miniflux is a minimalist, single-binary Go RSS/Atom reader backed by PostgreSQL, running on `mini` (192.168.10.2) from `foss-setup/configs/docker-stack/stacks/miniflux/compose.yaml` and served at https://rss.tabaska.us. It is a two-container stack: `miniflux/miniflux:2.3.1` (host port `8082`→container `8080`) and a private `postgres:17-alpine` db, connected via a bridge `miniflux` network for the DB plus the shared external `edge` network so Caddy fronts it (the container also stays directly reachable on LAN port 8082). `DATABASE_URL` uses `sslmode=disable` over the internal network and `RUN_MIGRATIONS=1` auto-migrates on boot. The single user is `btabaska`; the one-time `CREATE_ADMIN` bootstrap env and its leftover `admin` account were removed 2026-07-16 (fix-33, quality-gate L23), and an API key for `btabaska` lives in the secrets vault under `miniflux.api_key` (send it in an `X-Auth-Token` header). `POLLING_PARSING_ERROR_LIMIT=0` is set deliberately so feeds are never auto-excluded after consecutive fetch errors — see the frozen-feeds entry below. Postgres is deliberately pinned to `17-alpine` because pg18 moved the data path — the `./db:/var/lib/postgresql/data` mount would break on an unadjusted major bump.
  troubleshoot:
  - symptom: |-
      No new articles for days; every feed shows a "network error" from the same moment; `docker logs miniflux` shows hourly `Created a batch of feeds ... jobs_count=0`; UI and healthcheck stay green
    fix: |-
      The feeds were auto-excluded from polling: Miniflux permanently skips any feed whose `parsing_error_count` reaches `POLLING_PARSING_ERROR_LIMIT` (default 3), so a transient outage lasting a few poll cycles — like the 14-hour docker-DNS outage of 2026-07-08/09 (quality-gate H7) — silently freezes the entire reader while liveness checks stay green. Recover by resetting the counters and forcing a refresh: `ssh mini docker exec miniflux_db psql -U miniflux -d miniflux -c "UPDATE feeds SET parsing_error_count=0, parsing_error_msg=''"`, then `PUT /v1/feeds/refresh` with the vault API key (`curl -X PUT -H "X-Auth-Token: $KEY" http://192.168.10.2:8082/v1/feeds/refresh`). The stack now sets `POLLING_PARSING_ERROR_LIMIT=0` (never exclude — dead feeds just keep retrying hourly and stay visible in the UI), and the `mini-miniflux-feeds-fresh` / `mini-miniflux-articles-flowing` / `mini-container-dns` verification checks alert on scheduler stalls, zero-ingest, and the root-cause container-DNS failure respectively.
  - symptom: |-
      DATABASE_URL fails to parse / miniflux can't reach the DB after setting a password
    fix: |-
      MINIFLUX_DB_PASSWORD must be URL-safe — a `/` or `+` in the password breaks the `postgres://...@db/miniflux` connection string. Regenerate with `openssl rand -hex 24` (hex-only) and update `.env` on the host.
  - symptom: Postgres won't start after bumping the `db` image to Postgres 18
    fix: |-
      pg18 changed PGDATA from `/var/lib/postgresql/data` to `/var/lib/postgresql`. The stack pins `postgres:17-alpine` for this reason; if moving to 18, update the volume mount in `compose.yaml` accordingly (and dump/restore across a major version — data dirs are not forward-compatible).
- name: musicseerr
  about: |-
    MusicSeerr is the album-request and music-discovery portal (a Seerr-style front end for Lidarr), running as the `ghcr.io/habirabbu/musicseerr:v1.4.2` container on the Mac mini (`192.168.10.2`) from `foss-setup/configs/docker-stack/stacks/musicseerr/compose.yaml`, exposed on `8688` and fronted by Caddy at https://musicseerr.tabaska.us via the external `edge` network. It is the music counterpart to Seerr (movies/TV): user requests are forwarded to Lidarr on the NAS at `192.168.10.4:8686`, which handles the actual grab/download, while a read-only `${MUSIC_FOLDER:-/mnt/nas/music}:/music` mount (same path as Navidrome) enables local-file playback/browsing. Key config decision: the Lidarr API key MUST be supplied via the `LIDARR_API_KEY` env var and kept ABSENT from `config.json` — v1.4.2 encrypts the key on save but never decrypts it on load, so a key stored in config causes a 401 against Lidarr on every restart; env wins only while the config value is empty.
  troubleshoot:
  - symptom: |-
      A batch album request shows a phantom "Downloading 0%" in MusicSeerr that never progresses or completes.
    fix: |-
      Batch requests can land in Lidarr with monitored=False, so Lidarr never searches for them. Open Lidarr (http://192.168.10.4:8686), find the affected album/artist, toggle Monitor ON, and trigger a manual Search. The MusicSeerr status resolves once Lidarr actually grabs the release. Re-check after batch requests as a regression guard.
  - symptom: |-
      MusicSeerr repeatedly 401s against Lidarr after a container restart even though the key was set once.
    fix: |-
      The key was saved into config.json, which v1.4.2 encrypts-on-save but cannot decrypt-on-load. Ensure LIDARR_API_KEY is set in ./.env (gitignored) and remove/blank the Lidarr API key field from ./config/config.json, then `ssh mini 'cd /opt/stacks/musicseerr && docker compose up -d --force-recreate'`. The env var wins as long as the key is absent from config.
  - symptom: Need to inspect MusicSeerr's SQLite DB from inside the container.
    fix: |-
      The `sqlite3` CLI is not installed in the image. Copy the DB out and inspect on the host instead (`docker cp musicseerr:/app/config/<db> ./` then use a local sqlite3), or use a temporary container that bundles sqlite mounting ./config.
- name: navidrome
  about: |-
    Navidrome is the self-hosted music-streaming server (Subsonic/OpenSubsonic API) running on `mini` from `foss-setup/configs/docker-stack/stacks/navidrome/compose.yaml` as `deluan/navidrome:0.62.0`, fronted by Caddy at https://music.tabaska.us and also exposed directly on `4533` for LAN Subsonic clients (Symfonium/Amperfy). It reads the NAS music library read-only via `${MUSIC_FOLDER}` (`/mnt/nas/music`, a `vers=3.0` CIFS mount of `//192.168.10.4/music`) at `/music`, while its own SQLite DB lives under `./data` and nightly DB backups land in `./backup` (fix-37/M15, 2026-07-18: `ND_BACKUP_SCHEDULE` alone silently no-ops — Navidrome logs "Periodic backup is DISABLED" unless `ND_BACKUP_PATH` is ALSO set, so the intended nightly backup never ran until the path + `./backup:/backup` mount were added; restic picks the dir up via `/opt/stacks`, and the `navidrome-backup-fresh` check requires a <26h backup file on disk). The container runs as `${PUID}:${PGID}` (1000:1000, which must own `./data`). The load-bearing config decisions are `ND_SCANNER_SCHEDULE="@every 1h"` (the 0.62 new-scanner key — the legacy `ND_SCANSCHEDULE`/`ND_SCANNER_WATCHERWAIT` semantics changed) driving a periodic full scan, and `ND_SCANNER_WATCHERWAIT=0` disabling the fs-watcher because it is unreliable over CIFS. New tracks are ingested onto the NAS by MeTube/Pinchflat into `/volume1/music/YouTube` and picked up on the next hourly scan.
  troubleshoot:
  - symptom: |-
      Startup log shows "Periodic backup is DISABLED" even though ND_BACKUP_SCHEDULE and ND_BACKUP_COUNT are set.
    fix: |-
      Navidrome arms the backup scheduler only when ND_BACKUP_PATH is also set — schedule+count alone is a silent no-op (this bit us for weeks, M15). compose.yaml pins ND_BACKUP_PATH=/backup with a ./backup:/backup mount; if the message reappears after a recreate, the env or mount regressed — restore them and confirm the log says "Scheduling periodic backup". First backup can be forced with docker exec navidrome /app/navidrome backup create; the navidrome-backup-fresh (crit) and navidrome-backup-armed checks page on recurrence.
  - symptom: New music never appears in Navidrome; logs show "Periodic scan is DISABLED".
    fix: |-
      0.62 ignores the legacy `ND_SCANSCHEDULE` key. Ensure `ND_SCANNER_SCHEDULE: "@every 1h"` is set in the compose environment (already the case in `stacks/navidrome/compose.yaml`), then `ssh mini 'cd /opt/stacks/navidrome && docker compose up -d'`. Confirm with `docker compose logs --tail 20` — you should see hourly "Scanner: Starting scan" / "Finished scanning all libraries" lines.
  - symptom: |-
      Relying on the filesystem watcher to pick up NAS-side writes, but new files still do not show up until much later (or scans error).
    fix: |-
      The CIFS fs-watcher is unreliable — it misses NAS-side writes and dies on mount EBADF — so it is intentionally disabled via `ND_SCANNER_WATCHERWAIT: "0"`. Do not re-enable it; the hourly full scan is the source of truth. To force an immediate pickup, trigger a scan from the web UI (Settings) or restart the container.
  - symptom: |-
      After a NAS reboot the container throws EBADF / stale-handle errors reading `/music` and the library goes empty.
    fix: |-
      The read-only music mount uses `x-systemd.automount` in `/etc/fstab` on mini (`//192.168.10.4/music /mnt/nas/music cifs ...,ro,nofail,_netdev,x-systemd.automount`) so the autofs mount self-heals on next access. If it is still stale, remount with `ssh mini 'sudo systemctl restart mnt-nas-music.automount'` (or `sudo mount /mnt/nas/music`), then restart Navidrome: `ssh mini 'cd /opt/stacks/navidrome && docker compose restart'`.
- name: ntfy
  about: |-
    ntfy is the fleet's self-hosted push-notification server — the alert bus that backup jobs, the AER/NVMe monitor, net-selfheal watchdogs, Diun image-update checks, and other cron/scripts publish to, with the ntfy phone app subscribing per-topic. It runs as a single `binwiederhier/ntfy:v2.19.2` container on `mini` (port `8080`→`80` internally), fronted by Caddy at `https://ntfy.tabaska.us` on the external `edge` network, with `cache.db` and `auth.db`/attachments persisted in the bind-mounted `./cache` and `./lib` dirs. It is locked down: `NTFY_AUTH_DEFAULT_ACCESS=deny-all` with `NTFY_ENABLE_LOGIN=true`, so anonymous publish/subscribe is denied and publishers authenticate with per-user tokens created via the `ntfy` CLI (`ntfy user add`, `ntfy token add`). `NTFY_BEHIND_PROXY=true` is set because Caddy terminates TLS; `init: true` is required alongside the `/v1/health` healthcheck to reap zombie processes.
  troubleshoot:
  - symptom: |-
      A publisher (backup job, AER monitor, watchdog) gets HTTP 403 / 401 when posting to a topic.
    fix: |-
      Server is deny-all by design; the client needs a valid token with write access. Create/rotate one with `ssh mini 'cd /opt/stacks/ntfy && docker compose exec ntfy ntfy token list'` and grant access via `ntfy access <user> <topic> write`. Confirm the script sends `Authorization: Bearer <token>`.
  - symptom: Container won't start or messages/users vanish after a restart.
    fix: |-
      State lives in the bind mounts `./cache` (cache.db) and `./lib` (auth.db, attachments) owned by `PUID:PGID` (1000:1000). If perms drift, `ssh mini 'sudo chown -R 1000:1000 /opt/stacks/ntfy/cache /opt/stacks/ntfy/lib'` then `docker compose up -d`.
  - symptom: Topic URLs or iOS Web Push (PWA) break after a domain/proxy change.
    fix: |-
      `NTFY_BASE_URL` in `.env` must exactly match the public Caddy domain (`https://ntfy.tabaska.us`); Web Push and topic links are derived from it. Also keep `NTFY_BEHIND_PROXY=true` since Caddy terminates TLS. Fix `.env`, then `docker compose up -d`.
- name: palworld
  about: |-
    Dedicated Palworld server ("Robits Farm") running as the single `palworld` container (`ghcr.io/thijsvanloef/palworld-server-docker:latest`) on the 24/7 rig under `/opt/stacks/palworld`, with the world mounted at `./game:/palworld`. It deliberately runs on this standard glibc image rather than AMP, because AMP's minimal Alpine/musl container can't run the SteamCMD/Palworld binaries; the image self-manages the steamcmd install and daily updates (`AUTO_UPDATE_ENABLED=true` at 4AM ET, `AUTO_REBOOT_ENABLED=false`). Public play is UDP-only over a shared playit.gg tunnel (game port `8211/udp` -> `127.0.0.1:8211`, exposed as `palworld.tabaska.us:1105`) with the router left closed; the REST admin API (`8212/tcp`) is LAN-only and RCON (`25575/tcp`) is bound to localhost. Crucially `COMMUNITY=false` keeps the home IP out of the in-game community browser, and gameplay is tuned to Hard difficulty with softened pal damage (`PAL_DAMAGE_RATE_DEFENSE=0.8`) and 2x enemy drops.
  troubleshoot:
  - symptom: |-
      Palworld world saves would not be backed up by default — the rig's restic only covers /etc + /home, but saves live under /opt.
    fix: |-
      Already handled: `/etc/restic/env` explicitly adds `/opt/stacks/palworld/game/Pal/Saved` and `/opt/stacks/palworld/game/backups` to `BACKUP_PATHS` (see `env.bak-prepalworld` for the pre-change snapshot). The image also runs its own hourly local snapshot (`BACKUP_ENABLED=true`, `BACKUP_CRON_EXPRESSION=0 * * * *`, pruned after 30 days). If saves stop being captured, verify those two paths are still in `BACKUP_PATHS` on the rig.
  - symptom: Home/public IP leaking into the in-game community server browser.
    fix: |-
      Keep `COMMUNITY=false` in `compose.yaml`. It is currently set; do not enable the community listing or the rig's public IP is advertised.
  - symptom: |-
      Container shows unhealthy for up to ~15 minutes on a fresh boot or after an image pull.
    fix: |-
      Expected: `start_period` is 900s because the first boot downloads the server via steamcmd. The healthcheck curls `http://127.0.0.1:8212/v1/api/info` with the admin password. Wait it out; only investigate if it stays unhealthy past ~20 min. Check `ssh rig 'cd /opt/stacks/palworld && sudo docker compose logs --tail 50'`.
  - symptom: Players get disconnected / server restarts unexpectedly around 4AM ET.
    fix: |-
      That is the daily `AUTO_UPDATE` window (`AUTO_UPDATE_CRON_EXPRESSION=0 4 * * *`), which restarts the process to apply Steam updates and clears accumulated memory. `AUTO_REBOOT_ENABLED=false` so it won't reboot mid-session outside that window; `stop_grace_period: 30s` allows a clean save on shutdown.
  - symptom: Public UDP tunnel drops after a playit agent restart.
    fix: |-
      Palworld shares the playit.gg agent at `/opt/stacks/playit`; a playit UDP-claim can need re-establishing after the agent restarts. Confirm the UDP 8211 tunnel -> `127.0.0.1:8211` mapping is still active in the playit dashboard rather than opening the router.
- name: paperless-ngx
  about: |-
    Paperless-ngx is a document-management and OCR archive (scan once, find forever) running on the MINI (`192.168.10.2`) at https://paperless.tabaska.us, fronted by Caddy on the `edge` network and also reachable directly on LAN port 8000. It runs as a five-container stack from `foss-setup/configs/docker-stack/stacks/paperless-ngx/compose.yaml`: `webserver` (the app + web UI + Celery/OCR pipeline, pinned `ghcr.io/paperless-ngx/paperless-ngx:2.20.11`), `broker` = PostgreSQL 17-alpine, `redis` = Redis 7 task queue/cache, plus `gotenberg` (office-doc→PDF conversion) and `tika` (text/metadata extraction), the latter two enabled via `PAPERLESS_TIKA_ENABLED=1`. NOTE a local naming inversion: this compose names the Postgres service `broker` and Redis `redis`, the opposite of upstream (upstream calls Redis the "broker") — `PAPERLESS_DBHOST=broker` and all `depends_on`/`exec` references are consistent with the local naming. This is Tier-1 irreplaceable data: the bind-mounted `./data`, `./media`, `./consume` dirs hold documents + the search index, and Postgres must be backed up with a logical `pg_dump` (file-copying a live PGDATA is not a safe backup); Postgres is pinned to `17-alpine` because pg18 changed the PGDATA path and would break the `./pgdata:/var/lib/postgresql/data` mount.
  troubleshoot:
  - symptom: |-
      docker compose commands warn "PAPERLESS_ADMIN_PASSWORD variable is not set. Defaulting to a blank string" and secrets look empty.
    fix: |-
      This appears when compose is run without the `.env` sourced (e.g. an ad-hoc `ssh mini 'docker compose ps'`). The real values live in `.env` next to the compose file on the host (from the vault) and ARE loaded on normal `up`; run compose from `/opt/stacks/paperless-ngx` so it auto-loads `.env`. It is cosmetic when just inspecting a running stack — confirm the app itself is healthy with `ssh mini 'cd /opt/stacks/paperless-ngx && docker compose ps'`.
  - symptom: |-
      The Postgres data volume must be dumped for backup — a raw copy of ./pgdata is not restorable.
    fix: |-
      Run a nightly logical dump: `ssh mini 'cd /opt/stacks/paperless-ngx && docker compose exec -T broker pg_dump -U paperless paperless | gzip > paperless-$(date +%F).sql.gz'`, and back up the bind-mounted `./data`, `./media`, `./consume` dirs alongside it. Do not rely on file-copying the live `./pgdata` dir.
  - symptom: |-
      Upgrading PostgreSQL to 18 (bumping the `broker` image) breaks the container / data won't mount.
    fix: |-
      Postgres is intentionally pinned to `postgres:17-alpine` because pg18 changed the default PGDATA path. If moving to pg18, adjust the `./pgdata:/var/lib/postgresql/data` volume mount to the new path and perform a proper dump-and-restore migration rather than an in-place image bump.
  - symptom: Admin login fails or PAPERLESS_ADMIN_USER/PASSWORD changes don't take effect.
    fix: |-
      `PAPERLESS_ADMIN_USER`/`PAPERLESS_ADMIN_PASSWORD` create the superuser only on FIRST boot (empty DB). To reset an existing admin password, use the Django shell instead: `ssh mini 'cd /opt/stacks/paperless-ngx && docker compose exec -T webserver python3 manage.py changepassword admin'`.
- name: pinchflat
  about: |-
    Pinchflat is a "Sonarr for YouTube" channel/playlist archiver — a single self-contained Elixir/Oban app built on `yt-dlp` — running on `mini` from `foss-setup/configs/docker-stack/stacks/pinchflat/compose.yaml` (container `pinchflat`, port `8945`, fronted by Caddy at https://pinchflat.tabaska.us on the external `edge` network). It subscribes to channels/playlists, downloads new uploads on a schedule, applies SponsorBlock, and writes clean NFO metadata + thumbnails into `${PINCHFLAT_DOWNLOADS}` (`/mnt/nas-youtube/pinchflat` → the NAS "YouTube" Plex library path) so Plex indexes the archive as a show. The image is NOT stock upstream: it is a locally-built `pinchflat-bgutil:local` (`Dockerfile` `FROM ghcr.io/kieraneglin/pinchflat:latest`) that layers the nightly `yt-dlp` zipapp, a baked `/etc/yt-dlp.conf` (alternate player clients against the 403/JS-challenge, plus `youtubepot-bgutilhttp:base_url=http://bgutil-pot:4416`), and — since fix-37 (M14, 2026-07-18) — the bgutil PO-token plugin zip in `/etc/yt-dlp/plugins/`, pinned to the same version as the bgutil-pot server (1.3.1, bump together). Before that, the image's name promised bgutil but never installed the plugin, so the POT provider sat idle while 7 videos stranded on "Sign in to confirm you're not a bot" (2026-07-14); with the plugin wired, every download fetches a PO token (verified live: provider generated its first POT since 07-08 on the fix day). Refresh with `docker compose build --pull && docker compose up -d`; the `pinchflat-pot-provider` check fails if a rebuild loses the plugin/conf or the provider goes unreachable.
  troubleshoot:
  - symptom: |-
      A large bulk ingest from Pinchflat makes ALL Plex clients return 503 while the process shows "running" and drains glacially.
    fix: |-
      Bulk ingest floods Plex's none-agent metadata analysis and saturates the analysis worker pool. Diagnose via the Plex Media Server log (live analysis count / 408 trend); there is no fast fix — let it drain, or throttle Pinchflat's download concurrency and stage large channel back-catalogs in smaller batches rather than all at once.
  - symptom: Plex shows 0 items in the YouTube library even though Pinchflat wrote the files.
    fix: |-
      Files written to the NAS CIFS/DSM share by Pinchflat lack the PlexMediaServer ACL ACE, so Plex cannot read them. Apply the synoacltool fix + enable inheritance on the share (same class of fix as the NAS Plex share ACL issue). Confirm inheritance so newly-downloaded files inherit the ACE automatically.
  - symptom: |-
      Downloads fail with HTTP 403 / "Sign in to confirm you're not a bot" / n-signature errors.
    fix: |-
      Three escalating layers, all baked into the image since fix-37: (1) stale yt-dlp — rebuild for the latest nightly: ssh mini 'cd /opt/stacks/pinchflat && docker compose build --pull && docker compose up -d'; (2) PO tokens — verify the bgutil plugin is live with the pinchflat-pot-provider check or docker exec pinchflat yt-dlp -v --simulate <url> (look for "bgutil:http-x.y.z (external)" WITHOUT ", unavailable"; plugin and bgutil-pot server versions must match); (3) hard LOGIN_REQUIRED — if a video bot-checks even with a POT attached (confirmed for the 7 items stranded 2026-07-14; ids 409/702/895/915/939/1008/1333 accepted in the pinchflat-stuck-media check), the egress IP is hard-flagged for that video and only sign-in cookies would recover it — a deliberate non-goal (account-flagging risk). New items in that state page via pinchflat-stuck-media.
- name: playit
  about: |-
    `playit` is the playit.gg tunnel agent (`ghcr.io/playit-cloud/playit-agent:latest`, `container_name: playit`, `network_mode: host`) running on the rig at `/opt/stacks/playit`, source at `foss-setup/configs/gaming/playit/compose.yaml`. It is the live public path for the rig's game servers: on a premium dedicated IP (69.9.181.17) it forwards NS-delegated hostnames (e.g. `minecraft.tabaska.us`) to localhost ports without opening the Dream Wall or leaking the home IP — Minecraft Java (SRV :1105), Bedrock (:1111), and Palworld (:1105). ONE agent serves MANY tunnels: tunnels are created in the playit.gg dashboard and only `SECRET_KEY` (a read-only agent key, vaulted as `playit.secret_key`, injected via `.env`, never committed) lives on the host. The agent maintains a persistent control session to playit's edge and periodically reconnects.
  troubleshoot:
  - symptom: |-
      A newly-claimed UDP tunnel (e.g. a new Bedrock/Palworld port) does not carry traffic even though it shows in the dashboard.
    fix: |-
      Claiming a new UDP tunnel does not take effect until the agent process is restarted — the claim wedges until reload. Run `ssh rig 'cd /opt/stacks/playit && sudo docker compose up -d --force-recreate'` (or `sudo docker restart playit`).
  - symptom: |-
      Bedrock/Palworld (UDP) players cannot connect while Java (TCP) works; agent logs show `ERROR ... got unexpected response from register request other=...UdpChannelDetails`.
    fix: |-
      The known UDP-claim failure class (M30, historically ~daily): the agent's UDP channel registration wedges and every UDP tunnel goes dark until the agent restarts — TCP keeps flowing, so liveness checks stay green. Since fix-34 this self-heals: `playit-udp-guard.timer` on the rig RakNet-pings `bedrock.tabaska.us:1111` every 10 min (dead-man `playit-udp-rig` on healthchecks) and restarts the container only when the local Geyser origin is healthy but the public path is dead, with a 10-min flap guard. Manual fallback: `ssh rig 'sudo docker restart playit'`. See wiki/docs/runbooks/game-backups.md.
  - symptom: |-
      Logs show repeated `WARN timeout waiting for pong` / `control session expired; reconnecting reason=Forced`.
    fix: |-
      Benign — the agent's control session to the playit edge times out and auto-reconnects (seen every few hours). No action needed as long as the container stays `Up` and `New TCP Client` lines keep appearing; only intervene if reconnects loop continuously without recovering.
- name: recyclarr
  about: |-
    Recyclarr is a headless (no web UI) config-syncer that pushes TRaSH-Guides quality definitions, guide-backed quality profiles, and media-naming schemes into the *arr apps. It runs on `mini` (`/opt/stacks/recyclarr`) as a one-shot container (`ghcr.io/recyclarr/recyclarr:8.4.0`, `restart: "no"`), targeting Sonarr (`http://192.168.10.4:8989`) and Radarr (`http://192.168.10.4:7878`) on the NAS over LAN. It is not a long-running service: a weekly root crontab entry (`0 3 * * 0`) does `docker compose run --rm recyclarr sync`, appends to `config/logs/cron-sync.log`, and pings healthchecks (`recyclarr-sync-mini`, UUID `fb109ef5...`) as a dead-man's switch. The syncable behavior is entirely driven by `config/recyclarr.yml`: Sonarr uses TRaSH id `72dae194...` (WEB-1080p), Radarr uses `d1d67249...` (HD Bluray + WEB), both with `reset_unmatched_scores` enabled, and API keys live in that file on the host (not committed).
  troubleshoot:
  - symptom: |-
      `docker compose ps` shows nothing / recyclarr appears "not running" and looks broken.
    fix: |-
      This is expected — recyclarr is a one-shot syncer (`restart: "no"`), not a daemon. It only runs via the weekly root crontab (`0 3 * * 0`). Verify health by reading `/opt/stacks/recyclarr/config/logs/cron-sync.log` or the healthchecks check `recyclarr-sync-mini`, not by `ps`. Force a run with `ssh mini 'cd /opt/stacks/recyclarr && docker compose run --rm recyclarr sync'`.
  - symptom: |-
      Radarr movie naming may not apply — live `config/recyclarr.yml` sets `movie.standard: plex-tmdb`, but the file's own header comment says `plex-tmdb` is NOT a valid `recyclarr list naming radarr` key and would be skipped/error.
    fix: |-
      Confirm valid keys with `ssh mini 'cd /opt/stacks/recyclarr && docker compose run --rm recyclarr list naming radarr'`; the TRaSH-recommended value is `default` (as already used for Sonarr series/season/episodes). Change `plex-tmdb` to a real key (e.g. `default`) if Radarr renames aren't taking effect.
  - symptom: Sync fails with auth/connection errors against the *arr apps.
    fix: |-
      API keys are hard-coded in `/opt/stacks/recyclarr/config/recyclarr.yml` per instance (Sonarr `192.168.10.4:8989`, Radarr `192.168.10.4:7878`). If an *arr API key was rotated, or the NAS is unreachable, update the key / verify NAS reachability from mini before the next weekly run; a failed cron run also fails the healthchecks ping and will alert.
- name: romm
  about: |-
    RomM is a self-hosted retro-ROM manager and web library (retro-01/retro-02, tracker id game-14) running on the mini at `/opt/stacks/romm`, fronted by Caddy at https://romm.tabaska.us and reachable directly on the LAN at `mini:8998` (container port 8080). The stack is just two containers — `rommapp/romm:4.9.2` (pinned 2026-07-14, deliberately held below the 5.0 redesign/beta whose sync API changed) with Redis bundled inside the image, plus a `mariadb:11` sidecar (`romm-db`). The ROM library lives on the NAS `games` share, mounted rw on the mini via CIFS (uid=1000) at `/mnt/share/Games`; RomM's root is the `romm/` subfolder (`/mnt/share/Games/romm` → `/romm/library`) kept separate so Synology `#recycle`/`@eaDir` cruft stays out of view, and expects a `roms/<platform-slug>/` + `bios/<platform>/` tree. STATUS — populated (2026-07-20): the shelf was filled from the seedbox "manual" ROM collections (~790 GB copied NAS-side, seeds left seeding) — **8,364 games across 8 Nintendo platforms**: gb 622, gba 2,808, n64 299, nes 3,537, snes 786, ngc 101, wii 177, wiiu 34, each matching its on-disk file count 1:1 with IGDB metadata/covers. Provenance script: `scripts/nas/import-seedbox-roms.sh`. Scanning gotcha learned here: a single all-platforms scan of thousands of ROMs blows RomM's 4-hour per-job `SCAN_TIMEOUT` (IGDB matching ≈2.4 s/ROM) — split large imports into **per-platform scoped scans** (one rq job each; QUICK scan skips already-ingested ROMs so re-runs resume cleanly). Ancillary set extras (NES MiNI HackTool, SNES box art + HyperSpin XML) live at `/volume1/games/romm-extras/`, deliberately OUTSIDE the library root so RomM never indexes them. The `romm-content-ingest` check enforces share↔DB reconciliation — it pages when files land on the share but never reach the DB (scan broken/never run) or when the DB claims ROMs the share no longer has (the Immich-class vanished-library failure), and it fails loudly if the CIFS mount itself is down. Metadata/covers come from IGDB (Twitch app creds `igdb.client_id`/`igdb.client_secret` from the vault) with `HASHEOUS_API_ENABLED=true` as a supplementary matcher; saves/states/config stay on local disk under `./assets` and `./config`.
  troubleshoot:
  - symptom: |-
      The internal `romm-internal` network fails to come up or squats the LAN/IoT VLAN (192.168.16.0/20 overlapping IoT 192.168.20.x) when Docker auto-allocates a subnet.
    fix: |-
      The subnet is explicitly pinned to `172.19.30.0/24` in compose.yaml because the mini's default 172.x pools are exhausted. Do not remove the `ipam.config.subnet` block until the fleet-wide fix-19 (default-address-pools) lands; new stacks with private nets on the mini must each pin a free slice.
  - symptom: |-
      New ROMs dropped on the NAS don't appear, or IGDB matching misses/mislabels games.
    fix: |-
      ROMs must go under `/mnt/share/Games/romm/roms/<platform-slug>/` using RomM's exact platform slugs (see https://docs.romm.app/latest/Getting-Started/Folder-Structure/), then trigger a Scan in the web UI. Covers/metadata come from IGDB on scan; fix mismatches manually via the per-game match dialog.
  - symptom: |-
      Library shows empty or scan errors after a NAS/CIFS hiccup — `/romm/library` unreadable.
    fix: |-
      The library is a CIFS mount of the NAS `games` share on the mini (`/mnt/share/Games`, uid=1000). Verify the mount from the mini (`mountpoint /mnt/share/Games`) and that `/mnt/share/Games/romm/roms` is listable before re-scanning; a stale/dropped CIFS mount is the usual cause.
  - symptom: Accidental upgrade onto RomM 5.0 breaks the sync API / existing behavior.
    fix: |-
      The image is intentionally pinned to `rommapp/romm:4.9.2` (was `:latest`). Diun watches for updates but do not bump to 5.x without reviewing the redesign/sync-API migration; keep the pin in compose.yaml.
- name: seerr
  about: |-
    Seerr is the unified successor to Overseerr + Jellyseerr — a media request/discovery portal that lets users browse movies/TV and file requests that flow through to Radarr/Sonarr for automated grabbing. It runs on `mini` as a single container (`ghcr.io/seerr-team/seerr:v3.2.0`) defined in `foss-setup/configs/docker-stack/stacks/seerr/compose.yaml`, published on port `5055`, joined to the external `edge` Docker network, and fronted by Caddy at https://seerr.tabaska.us. All persistent state (settings, users, DB) lives in the bind mount `./config:/app/config`; existing Jellyseerr/Overseerr data migrates automatically on first start if that dir holds the old config. Two non-obvious deploy details: the image ships NO internal init process so `init: true` is required, and the only env var of note is `TZ` (defaults to `America/New_York`). Live logs show it integrated with Plex — running scheduled Plex Recently Added Scans and Plex Watchlist Sync jobs against the Movies and TV Shows libraries.
  troubleshoot:
  - symptom: |-
      Container restart-loops or exits immediately with a zombie/PID-1 signal-handling error after a version bump
    fix: |-
      The Seerr image bundles no init process. Ensure `init: true` remains under the `seerr` service in compose.yaml (it is already set); do not remove it. Redeploy with `ssh mini 'cd /opt/stacks/seerr && docker compose up -d'`.
  - symptom: |-
      Requests are approved in Seerr but nothing downloads / titles never appear in Plex
    fix: |-
      This is a downstream integration gap, not Seerr itself. Verify the Radarr/Sonarr connections under Settings and confirm the arr's are grabbing — the arr-plex-journey check (see arr sample-file imports memory) catches 'green but not watchable' cases where an arr imports a junk sample instead of the real file.
- name: stash
  about: |-
    Stash (`stashapp/stash:v0.31.1`) is an adult-media organizer running as a single Docker container on the Synology DS920+ NAS (`192.168.10.4`), deployed via DSM Container Manager from `foss-setup/configs/nas/stash/docker-compose.yml` at `/volume1/docker/stash/` on the host. It reuses a pre-existing library tree at `/volume1/stash` (`STASH_ROOT`), with `root/` as the ~915 GB media dir mounted to `/data`, plus sibling `metadata/` (SQLite DB), `generated/`, `blobs/`, and `cache/` dirs; scrapers/plugins/config live separately under `CONFIG_DIR` (`/volume1/docker/stash/config` → `/root/.stash`). It listens on host port 9999 (`STASH_PORT`) and is fronted by Caddy on mini at `stash.tabaska.us`, but is deliberately kept LAN/Tailscale-only with no public vhost given the content. No API key is stored in the vault, so it has no dashboard widget.
  troubleshoot:
  - symptom: |-
      After the first launch the library is empty or tags/performers are missing, even though media files are present.
    fix: |-
      The migration from the prior install carried over media files and generated thumbnails but no SQLite DB was found in the old tree (a fresh `metadata/stash-go.sqlite` is created on first run). Re-index by running Settings -> Tasks -> Scan against `/data`; previously-scraped tags/performers from the old install are gone and must be re-scraped.
  - symptom: |-
      `docker compose` commands over SSH fail or Stash won't come up after editing the compose file.
    fix: |-
      The NAS requires root and the full docker path. Deploy/verify with `ssh -t nas 'cd /volume1/docker/stash && sudo /usr/local/bin/docker compose pull && sudo /usr/local/bin/docker compose up -d'` and check with `ssh -t nas 'sudo /usr/local/bin/docker ps --filter name=stash'`.
- name: tautulli
  about: |-
    Tautulli is the Plex usage-analytics and notification engine for the homelab, running as a single container (`ghcr.io/tautulli/tautulli:v2.17.2`) on the always-on Mac mini (`192.168.10.2`) and reached at https://tautulli.tabaska.us (Caddy on the shared external `edge` network) or directly on `:8181`. It connects over WebSocket to the Plex Media Server (a separate host/LAN IP, configured through Tautulli's first-run wizard, not via env) to record watch history, per-user/per-library stats, and to drive notification rules; all state — including the Plex token and history DB — lives under the bind-mounted `./config` (`/opt/stacks/tautulli/config` on mini). The only compose env vars are `PUID`/`PGID`/`TZ`; there is a `curl http://localhost:8181/status` healthcheck.
  troubleshoot:
  - symptom: |-
      Logs show 'Tautulli WebSocket :: Connection timed out' / 'Plex server is down' then 'The Plex Media Server is back up' seconds later — history/streams briefly stop updating.
    fix: |-
      Usually transient and self-healing: Tautulli reconnects on a 60s backoff and reschedules its refresh tasks (observed live 2026-07-14). It coincides with Plex being unresponsive — during a bulk-ingest/none-agent metadata analysis storm Plex returns 503 to all clients (see the Plex bulk-ingest memory), so treat repeated timeouts as a Plex-side symptom, not a Tautulli fault. Confirm Plex health before acting; only re-check the Plex connection under Settings > Plex Media Server if it stays disconnected for many minutes.
  - symptom: |-
      After moving/reprovisioning, Tautulli shows no users/libraries or can't reach Plex.
    fix: |-
      Plex is not configured via env — re-run the connection in the web UI (Settings > Plex Media Server) and re-authenticate to mint a fresh Plex token, which is persisted in `/opt/stacks/tautulli/config`. Verify the container is up with `ssh mini 'cd /opt/stacks/tautulli && docker compose ps'`.
- name: unbound
  about: |-
    Unbound is a recursive, validating, DNSSEC-aware DNS resolver running as the `mvance/unbound:1.22.0` container on `mini` (`/opt/stacks/unbound`), acting as the private upstream for AdGuard Home. Instead of AdGuard forwarding queries to Google/Cloudflare, it points its upstream at this resolver (`unbound:5335`), which then queries the DNS root and authoritative servers directly and validates DNSSEC itself, so no third-party resolver ever sees the household's queries. Reachability is container-to-container over the external `edge` bridge (both AdGuard and Unbound sit on it and address each other by container name); the `127.0.0.1:5335` host port is optional and exists only for host-side testing (`drill -p 5335 example.com @127.0.0.1`). Config is bind-mounted from `./unbound/unbound.conf` — RFC1918-only `access-control`, `prefetch`/`prefetch-key`, `serve-expired`, and `edns-buffer-size: 1232`. A healthcheck resolves `cloudflare.com` via drill every 30s; it is currently Up and healthy.
  troubleshoot:
  - symptom: |-
      Logs repeatedly warn `so-rcvbuf 4194304 was not granted. Got 425984` at every start.
    fix: |-
      Benign — the container requests `so-rcvbuf: 4m` (in unbound.conf) but the host kernel caps it lower and Unbound falls back to the granted size. To silence it, either raise the host limit (`sysctl -w net.core.rmem_max=4194304`) or lower `so-rcvbuf` in `./unbound/unbound.conf` to match. Does not affect resolution.
  - symptom: |-
      AdGuard shows all upstream queries failing / no internet DNS after a compose change.
    fix: |-
      AdGuard cannot reach Unbound at `127.0.0.1` — that is AdGuard's own container loopback. Confirm both are on the external `edge` network (`docker network inspect edge`) and that AdGuard's upstream is set to `unbound:5335` (container name), not an IP or localhost.
  - symptom: |-
      `docker compose up -d` fails with `network edge declared as external, but could not be found`.
    fix: |-
      The `edge` bridge is owned by another stack (AdGuard). Bring that stack up first, or create it manually: `docker network create edge`, then re-run `cd /opt/stacks/unbound && docker compose up -d`.
  - symptom: Verifying DNSSEC validation actually works from the host.
    fix: |-
      Run `ssh mini 'drill -p 5335 sigok.verteiltesysteme.net @127.0.0.1'` (should return an answer with the AD flag) and `drill -p 5335 sigfail.verteiltesysteme.net @127.0.0.1` (should SERVFAIL). SERVFAIL on sigfail confirms validation is on.
- name: uptime-kuma
  about: |-
    Uptime Kuma is the homelab's self-hosted uptime/status monitor, running as the single `uptime-kuma` container (`louislam/uptime-kuma:2.1.1`) on `mini` from `foss-setup/configs/docker-stack/stacks/uptime-kuma/compose.yaml`, published at https://uptime.tabaska.us via Caddy (the container itself only exposes `3001:3001` on the external `edge` network). It runs 50+ monitors covering HTTP endpoints across the fleet (e.g. NAS Plex, Mini Navidrome/RoMM) plus TCP/HTTP probes of the game servers (e.g. `Rig Palworld` at `192.168.10.12:8212`). All state lives in the `./data:/app/data` bind mount; notably this instance uses Uptime Kuma v2's `embedded-mariadb` backend (see `data/db-config.json`) rather than the legacy SQLite `kuma.db` (which is present but empty), so the whole `data/` dir — including `data/mariadb/` — must be preserved on any move or restore. The only env var is `TZ` (defaults to `America/New_York`); there is no published status page yet, so Homepage integrates via `siteMonitor` rather than the status-page widget.
  troubleshoot:
  - symptom: |-
      Logs show a mysql2 `PROTOCOL_CONNECTION_LOST` / `fatal: true` crash on startup, suggesting the DB backend is broken.
    fix: |-
      This is a one-time artifact from the embedded-MariaDB first-boot/init sequence and does not recur (zero occurrences in the last 48h during live check). Confirm the container is healthy with `ssh mini 'cd /opt/stacks/uptime-kuma && docker compose ps'` — if it stays `(healthy)` and the UI loads, ignore it. Only investigate if `PROTOCOL_CONNECTION_LOST` appears repeatedly in recent logs.
  - symptom: |-
      A monitor flaps to Pending with `read ECONNRESET` or `ECONNREFUSED` (e.g. Mini Navidrome, NAS Plex, Rig Palworld).
    fix: |-
      These are the monitored target being transiently unreachable, not an Uptime Kuma fault. Verify the target service directly (e.g. the Palworld game server on rig `192.168.10.12:8212`, or the DHCP-lease 'frozen mini' class of outage) before touching Uptime Kuma. The 3-retry / 60s-interval default means brief blips self-recover.
  - symptom: |-
      Data volume won't survive a migration or the DB appears empty (`kuma.db` is 0 bytes).
    fix: |-
      Do NOT rely on `kuma.db` — this instance runs the v2 `embedded-mariadb` backend, so real state lives in `data/mariadb/` and is described by `data/db-config.json` (`"type": "embedded-mariadb"`). Back up / move the entire `./data` directory. Also note the compose header warning: the data volume must NOT be on NFS (use the local bind mount as configured).
  - symptom: Using the `:latest` image tag by mistake.
    fix: |-
      `:latest` still points to the deprecated v1 and is incompatible with this v2 embedded-mariadb data dir. Keep the pinned `louislam/uptime-kuma:2.1.1` (or a newer `:2`/`:2.x` tag) in `compose.yaml`; bump via the standard `docker compose pull && docker compose up -d` update loop.
- name: vaultwarden
  about: |-
    Vaultwarden is a self-hosted, Bitwarden-compatible password-manager server (`vaultwarden/server:1.36.0`, shipping web vault v2026.4.1) running on `mini` from `foss-setup/configs/docker-stack/stacks/vaultwarden/compose.yaml` and reachable at https://vault.tabaska.us. It publishes no host port; Caddy fronts it over the shared external `edge` network (`reverse_proxy vaultwarden:80`, websockets handled automatically), so its `DOMAIN` env var must exactly match the public URL for links, invites, and WebAuthn to work. State is a small SQLite DB plus attachments under `./data` (bind-mounted `./data:/data`), intentionally INCLUDED in restic backups (see `/etc/restic/excludes.txt`). The `/admin` panel is gated by `ADMIN_TOKEN` (recorded in the operator vault, `.handoff-secrets.yaml`), and `SIGNUPS_ALLOWED` should be flipped to false once the operator has registered. Task foss-01 is the in-progress Bitwarden to Vaultwarden data cutover.
  troubleshoot:
  - symptom: Login links, invites, or WebAuthn/passkeys fail or point to the wrong host
    fix: |-
      Ensure `DOMAIN` in `/opt/stacks/vaultwarden/.env` is set to the exact public URL (`https://vault.tabaska.us`) that clients use; correct it then `ssh mini 'cd /opt/stacks/vaultwarden && docker compose up -d'`.
  - symptom: Anyone can self-register a new account
    fix: |-
      After the operator has registered, set `SIGNUPS_ALLOWED=false` in `.env` and `docker compose up -d`; the compose default is already false but `.env.example` ships it true for initial setup.
  - symptom: /admin panel unreachable or asks for a token that doesn't work
    fix: |-
      `ADMIN_TOKEN` must be present in `.env` (generate with `openssl rand -base64 48`); the live token is also in the operator vault `.handoff-secrets.yaml`.
  - symptom: Container shows unhealthy after a restart
    fix: |-
      Healthcheck runs the image's `/healthcheck.sh` (curls /alive) with a 40s start_period; check `ssh mini 'cd /opt/stacks/vaultwarden && docker compose logs --tail 50'` and confirm `Rocket has launched from http://0.0.0.0:80`.
- name: wallabag
  about: |-
    Wallabag is a self-hosted read-it-later / article archiver (a Pocket replacement) running on the Mac mini Docker stack at `/opt/stacks/wallabag`, reached via Caddy at https://wallabag.tabaska.us and directly on the LAN at `mini:8085`. The stack is three containers — `wallabag/wallabag:2.6.14` (app, port 80 internally), `mariadb:11.4` for storage, and `redis:7-alpine` for async import / 2FA throttling — wired to the shared external `edge` network for the Caddy reverse proxy plus a private `wallabag` bridge for DB/Redis. It sits alongside Miniflux and Navidrome in the reading/media stack and feeds the Kobo's KOReader Wallabag plugin (see `guides/koreader-cwa-wallabag.md` §F), which pulls saved articles over the API. Key config: DB migrations run on boot when `POPULATE_DATABASE=true`; the public URL is fixed by `SYMFONY__ENV__DOMAIN_NAME` (must match how it's actually reached, since it drives links/cookies) and secrets (`WALLABAG_SECRET`, DB passwords) come from `.env` sourced from the vault, never committed. Two fix-41 (2026-07-19) notes: the repo mirror moved from `configs/docker-stack/wallabag/docker-compose.yml` to `configs/docker-stack/stacks/wallabag/compose.yaml` — now matching every other stack's location AND the live filename — and the compose interpolates `WALLABAG_FROM_EMAIL`/`WALLABAG_MAILER_DSN` that the live `.env` deliberately leaves unset: outbound mail (password-reset/2FA email) is OFF, with the keys documented in `.env.example` for whoever enables it.
  troubleshoot:
  - symptom: KOReader Wallabag plugin can't authenticate or sync articles from the Kobo.
    fix: |-
      The plugin needs an API client, not just the login. Log into https://wallabag.tabaska.us, go to Settings -> API clients management, create a client, and put its client_id/secret plus the wallabag user credentials into the KOReader plugin config with server_url set to the full https domain. See guides/koreader-cwa-wallabag.md §F.
  - symptom: Fresh install still has the default wallabag / wallabag login.
    fix: |-
      Default credentials on a new install are wallabag / wallabag. Log in and change the password immediately under User management before exposing it via Caddy.
  - symptom: |-
      Broken links, redirect loops, or session/cookie issues after changing how the site is reached.
    fix: |-
      SYMFONY__ENV__DOMAIN_NAME (from WALLABAG_DOMAIN_NAME in .env) must exactly match the public URL (https://wallabag.tabaska.us). If it drifts from the Caddy domain, fix .env on mini and `cd /opt/stacks/wallabag && docker compose up -d` to recreate the container.
  - symptom: Password reset or 2FA emails never arrive.
    fix: |-
      Intentional — WALLABAG_FROM_EMAIL/WALLABAG_MAILER_DSN are unset live, so symfony's mailer has no transport. Reset passwords via the console instead: ssh mini 'cd /opt/stacks/wallabag && docker compose exec wallabag /var/www/wallabag/bin/console fos:user:change-password USER --env=prod'. To enable mail, set both keys in .env (see .env.example) and docker compose up -d.
- name: lumiverse
  about: |-
    Lumiverse is a self-hosted creative/roleplay chat frontend (prolix-oc/Lumiverse, a TypeScript + Bun SillyTavern-style app) running on `rig` from `~/Documents/GitHub/local-ai-tooling/docker/docker-compose.yml` as container `lumiverse`, published on host `:3001` (container `:7860`) and reached through the mini Caddy at https://lumiverse.tabaska.us. It is pinned BY DIGEST to the current `:latest` (past the v1.0.0 git release that patches the CVE-2026-44449 RCE cluster) rather than a floating tag, because the app ships no semver image tags and has a live-CVE history — never float it, and keep it LAN/tailnet-only. It rides the same LiteLLM gateway as Open WebUI, but the connection is created IN THE APP (Connections -> Custom -> API URL http://litellm:4000/v1, the LUMIVERSE_LITELLM_KEY virtual key, model typed by hand) — there is no declarative env for it. Model choice is restricted to cydonia/dolphin-venice/goetia by scoping that virtual key at LiteLLM; the app itself has no allowlist. Auth is BetterAuth: the owner account is seeded from OWNER_USERNAME/OWNER_PASSWORD (in the rig `.env`, mirrored to the vault at ai_stack.lumiverse_owner_password), and protected API routes return 403 without a session. All state lives in the `lumiverse-data` volume, including `data/lumiverse.identity` — the master key for stored secrets, which must be backed up or every saved connection key is unrecoverable.
  troubleshoot:
  - symptom: |-
      A model dropdown / connection cannot reach the backend, or chats error with a connection failure.
    fix: |-
      The LiteLLM connection is per-install and set in the UI, not in compose. In Connections add a Custom (OpenAI-compatible) provider with API URL http://litellm:4000/v1, the LUMIVERSE_LITELLM_KEY value from the rig `.env` (or vault ai_stack.litellm_lumiverse_key), and one of cydonia / dolphin-venice / goetia as the model name. Confirm reachability from inside the container with `ssh rig "docker exec lumiverse bun -e 'fetch(\"http://litellm:4000/v1/models\",{headers:{Authorization:\"Bearer \"+process.env.K}}).then(r=>r.json()).then(j=>console.log(j.data.map(m=>m.id)))'"` after exporting K.
  - symptom: |-
      Only cydonia/dolphin-venice/goetia are usable even though LiteLLM serves more models.
    fix: |-
      By design. The frontend's virtual key is scoped to exactly those three at LiteLLM (the app has no model allowlist). To change the set, re-mint the key with the desired `models` list via the LiteLLM master key and update the in-app connection.
  - symptom: Lost owner password, or the app rejects the login.
    fix: |-
      Reset it with `ssh rig "docker exec lumiverse bun run reset-password"`, or set a fresh OWNER_PASSWORD in the rig docker/.env and recreate the container. The hashed credential lives in `data/owner.credentials` inside the lumiverse-data volume.
- name: marinara
  about: |-
    Marinara-Engine is a self-hosted creative/roleplay chat + game engine (pasta-devs/marinara-engine, AGPL-3.0, self-described ALPHA) running on `rig` from `~/Documents/GitHub/local-ai-tooling/docker/docker-compose.yml` as container `marinara`, pinned to image `1.5.0` (the GHCR image semver line differs from the repo's git tags), published on host `:3002` (container `:7860`) and reached through the mini Caddy at https://marinara.tabaska.us. It rides the LiteLLM gateway via an in-app connection (API URL http://litellm:4000/v1 with the MARINARA_LITELLM_KEY virtual key scoped to cydonia/dolphin-venice/goetia); PROVIDER_LOCAL_URLS_ENABLED=true is required so it may reach that private URL. The important operational fact: Marinara's own IP-based Basic Auth is INEFFECTIVE behind Docker's userland-proxy — the container only ever sees a trusted private/Docker source IP (gateway 10.201.1.1 or a 10.201.1.x peer), so no combination of BASIC_AUTH_*, BYPASS_AUTH_DOCKER=false, or REQUIRE_AUTH_FOR_DOCKER_PROXY makes it demand a password. Authentication is therefore enforced at the mini Caddy vhost with `basic_auth` (user `marinara`, bcrypt hash in the caddy `.env` as MARINARA_BASICAUTH_HASH, escaped `$$` so compose does not interpolate it). Auto-update is disabled and the image is pinned because it is alpha. State lives in the `marinara-data` volume; set ENCRYPTION_KEY so encrypted connection secrets survive restarts.
  troubleshoot:
  - symptom: |-
      marinara.tabaska.us serves without asking for a password, or the auth check rig-marinara-auth-gate fails.
    fix: |-
      The gate is the mini Caddy `basic_auth`, not the app. Confirm the caddy `.env` has MARINARA_BASICAUTH_USER and MARINARA_BASICAUTH_HASH (hash with every `$` written as `$$`) and that the caddy container has them: `ssh mini "docker exec caddy sh -c 'echo \$MARINARA_BASICAUTH_USER \${#MARINARA_BASICAUTH_HASH}'"`. Recreate caddy after any change (`cd /opt/stacks/caddy && docker compose up -d caddy`) — a plain `caddy reload` will NOT pick up a new env var. Regenerate a hash with `docker exec caddy caddy hash-password`.
  - symptom: |-
      Connections error with a blocked/refused local URL, or the model cannot be reached.
    fix: |-
      Marinara blocks private/loopback provider URLs unless PROVIDER_LOCAL_URLS_ENABLED=true (already set in compose). Verify it, then in the app add a Custom OpenAI-compatible connection to http://litellm:4000/v1 with the MARINARA_LITELLM_KEY value (rig `.env` / vault ai_stack.litellm_marinara_key) and a cydonia/dolphin-venice/goetia model.
  - symptom: Docker Compose warns "variable is not set. Defaulting to a blank string" when starting caddy.
    fix: |-
      The bcrypt hash in the caddy `.env` contains `$` which compose interprets as interpolation. Escape every `$` as `$$` on the MARINARA_BASICAUTH_HASH line, then recreate caddy. Confirm the container env holds the full 60-char `$2a$...` hash.
- name: syncthing
  about: |-
    Syncthing is the fleet's local-first, no-cloud file-sync mesh (task foss-03, replacing Proton Drive; the shared hub for game-12 save-sync). It runs a hub-and-spoke topology across three devices, all on Syncthing v2 (2.1.2) for protocol parity. The always-on HUB is a container on the NAS at `/volume1/docker/syncthing` (`syncthing/syncthing:2.1.2`, digest-pinned; PUID 1026/PGID 100), publishing the sync protocol on host `:22000` (tcp+udp) and its Web GUI/REST API on `:8384`. The two spokes are the rig (a systemd *user* service, task read-02, folder `~/Sync`) and a NODE container on the mini at `/opt/stacks/syncthing` (repo mirror dir `syncthing-node`). Both spokes pair only to the NAS hub, so the hub relays changes even when a peer is offline. One shared folder `default` (label "Sync") syncs across all three: `/volume1/docker/syncthing/Sync` on the hub, `~/Sync` on the rig, `/opt/stacks/syncthing/home/Sync` on the mini. NO CLOUD is enforced, not assumed: each device carries the others' STATIC LAN addresses (`tcp://192.168.10.4:22000` etc.), and relays + global discovery are DISABLED fleet-wide, so peers connect only over direct LAN TCP (verify with `/rest/system/connections` — type must be `tcp`/`quic`, never `relay`). HUB SAFETY NET: the shared folder carries STAGGERED file versioning on the NAS copy, so a delete or bad edit propagated from any peer is recoverable from `Sync/.stversions/` for up to 30 days. The GUI on the hub and node is behind admin auth (vault `syncthing.gui_user` / `syncthing.nas_gui_password` / `syncthing.mini_gui_password`); the rig GUI is bound to localhost only. Consumer probe: `syncthing-hub-mesh-direct` (verification, warn) asks the hub whether both spokes are connected over a direct transport.
  troubleshoot:
  - symptom: |-
      A peer shows connected but over a public relay (168.x address, type `relay-*`) instead of the LAN — file data is leaving the LAN, defeating the no-cloud goal. Most often the rig.
    fix: |-
      A firewall is blocking inbound `:22000` at the peer, so the hub can only reach it via relay. On the rig (CachyOS ships ufw active), open the LAN: `sudo ufw allow from 192.168.10.0/24 to any port 22000 proto tcp` (and `proto udp`, plus `21027/udp`). This is codified in `scripts/reading/syncthing-setup-cachyos.sh`. Then confirm the pair upgraded to `tcp` in each side's `/rest/system/connections`. Relays and global discovery are disabled in each node's options; do not re-enable them.
  - symptom: |-
      A file created on one device never appears on the others.
    fix: |-
      Check the pair is connected AND direct (`curl -H "X-API-Key: $API" http://127.0.0.1:8384/rest/system/connections`; API key in each host's `config.xml`). Then confirm the `default` folder is shared to that peer on BOTH ends (`/rest/config/folders/default` devices list must include the peer's ID) and not paused/errored (`/rest/db/status?folder=default` state should be `idle`). The folder path must exist on disk with a `.stfolder` marker.
  - symptom: |-
      A file was deleted or overwritten by a bad sync and you need it back.
    fix: |-
      On the NAS hub, look under `/volume1/docker/syncthing/Sync/.stversions/` — staggered versioning keeps timestamped copies (`name~YYYYMMDD-HHMMSS.ext`) for up to 30 days. Copy the wanted version back into `Sync/`; it re-propagates to the peers.
