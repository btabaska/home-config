# etckeeper.conf — version-control /etc with git.
# Installed to /etc/etckeeper/etckeeper.conf by etckeeper-setup.sh.
# Docs: https://etckeeper.branchable.com/
#
# >>> SECURITY: /etc holds secrets (shadow, ssh host keys, wg/tailscale state,
#     service tokens). If you set PUSH_REMOTE below, it MUST be a PRIVATE repo
#     (a per-host Forgejo repo). NEVER push /etc to anything public. <<<

# The VCS to use (git is the only one we support here).
VCS="git"

# Don't auto-commit on a daily cron. We commit on change via the etc-watch.path
# systemd unit instead (lower latency, no noise on quiet days).
AVOID_DAILY_AUTOCOMMITS=1

# Avoid committing during package installs only if you prefer manual control.
# Leaving these unset lets etckeeper's apt/pacman hooks snapshot pre/post install.
# AVOID_COMMIT_BEFORE_INSTALL=1

# Push after each commit to an off-box mirror. Leave EMPTY until you've created a
# PRIVATE per-host repo. Example (Forgejo): set per host, e.g.
#   PUSH_REMOTE="git@forgejo:home/etc-$(hostname -s).git"
# then add that remote: `cd /etc && sudo git remote add origin <url>`.
PUSH_REMOTE=""

# High-level package manager (what you install packages with).
#   Debian/Ubuntu: apt   |   Arch/CachyOS: pacman
HIGHLEVEL_PACKAGE_MANAGER=apt

# Low-level package manager (what the high-level one drives).
#   Debian/Ubuntu: dpkg  |   Arch/CachyOS: pacman
LOWLEVEL_PACKAGE_MANAGER=dpkg
