# Homepage (gethomepage.dev) widget snippets for the Inventory/SBOM stack.
# Paste these service entries into your Homepage `services.yaml`.
# customapi docs: https://gethomepage.dev/widgets/services/customapi/
#
# The Dependency-Track tile uses the portfolio metrics endpoint for headline
# counts. It needs an API key (Administration > Access Management > Teams, with at
# least VIEW_PORTFOLIO). Store it in Homepage's secret handling, e.g. set
# HOMEPAGE_VAR_DTRACK_API_KEY in the Homepage container env and reference it as
# {{HOMEPAGE_VAR_DTRACK_API_KEY}} below — do NOT commit the raw key.

- Inventory & Supply Chain:
    - Dependency-Track:
        href: https://deptrack.tabaska.us
        description: SBOM analysis + vulnerability intelligence
        icon: dependency-track.png
        widget:
          type: customapi
          # Current portfolio-wide metrics (projects, vulnerabilities by severity).
          url: https://deptrack.tabaska.us/api/v1/metrics/portfolio/current
          method: GET
          headers:
            X-Api-Key: "{{HOMEPAGE_VAR_DTRACK_API_KEY}}"
          refreshInterval: 600000 # 10 min
          mappings:
            - field: projects
              label: Projects
              format: number
            - field: vulnerabilities
              label: Vulns (total)
              format: number
            - field: critical
              label: Critical
              format: number

    # Plain link tiles to the rest of the monitoring trio (no widget needed,
    # but ping widgets give a live up/down dot).
    - Beszel:
        href: https://status.tabaska.us
        description: Lightweight host + container monitoring
        icon: beszel.png
        ping: status.tabaska.us

    - Uptime Kuma:
        href: https://uptime.tabaska.us
        description: Uptime monitoring / public status page
        icon: uptime-kuma.png
        widget:
          # Uptime Kuma ships a first-class Homepage widget; point it at a
          # status-page slug + the metrics endpoint API key if you enable it.
          type: uptimekuma
          url: https://uptime.tabaska.us
          slug: homelab
