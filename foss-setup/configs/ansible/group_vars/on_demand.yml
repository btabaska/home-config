---
# group_vars/on_demand.yml — the CachyOS rig (glue-08)
#
# HISTORY: this group existed because the rig used to auto-suspend and its
# timers had to be wake-gated. DECISION 2026-07-08: the rig now runs 24/7
# (~130W idle ≈ $23/mo accepted for availability; idle-power-tuning task open),
# so wake-gating is DISABLED. The group is retained for inventory shape and so
# the wake-gated code paths stay exercisable, but cachyos schedules like every
# other host (plain OnCalendar; Persistent=true as generic catch-up).
# Wake-on-LAN is now RECOVERY tooling (power outage / accidental shutdown),
# not workflow. Rig down = incident.

# Roles read this to pick the timer shape. false = standard OnCalendar
# schedule, same as always_on hosts.
wake_gated: false

# ansible-pull still converges shortly after boot — harmless on a 24/7 box and
# useful after a recovery boot (see ansible-pull.timer notes).
ansible_pull_on_boot: true
