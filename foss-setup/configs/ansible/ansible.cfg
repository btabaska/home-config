# ansible.cfg — fleet maintenance for the homelab (glue-07)
#
# Agentless: Ansible just SSHes in over the tailnet using your ~/.ssh/config
# (net-14) or Tailscale SSH (net-13). Run from the Mac mini or your laptop.
[defaults]
inventory = ./inventory.ini
host_key_checking = True
interpreter_python = auto_silent
# Keep output readable when running across several hosts. The yaml callback moved
# out of ansible-core into community.general (already pinned in requirements.yml),
# so it must be referenced by its FQCN or recent ansible-core won't load it (L2).
stdout_callback = community.general.yaml
callbacks_enabled = ansible.posix.profile_tasks
retry_files_enabled = False

[ssh_connection]
# Reuse the OpenSSH client config (Host aliases, agent, MagicDNS names).
ssh_args = -F ~/.ssh/config -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
