---
# roles/state — make the state-tracking tools themselves reproducible (glue-08).
# Installs + bootstraps etckeeper (sbom-03) and chezmoi (glue-04) so even the
# tools that capture your state are present on a fresh box without hand-steps.

# chezmoi is NOT in the Ubuntu jammy archive (it is in Arch's) — apt-installing
# it hard-fails every pull run (Run 0 fix-06). Use the official installer with
# a `creates:` guard instead; etckeeper stays on apt.
- name: Install etckeeper (Debian/Ubuntu)
  when: ansible_os_family == 'Debian'
  ansible.builtin.apt:
    name:
      - etckeeper
    state: present
    update_cache: true

- name: Install chezmoi via official installer (Debian/Ubuntu)
  when: ansible_os_family == 'Debian'
  ansible.builtin.shell:
    cmd: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
    creates: /usr/local/bin/chezmoi

- name: Install etckeeper + chezmoi (Arch/CachyOS)
  when: ansible_os_family == 'Archlinux'
  community.general.pacman:
    name:
      - etckeeper
      - chezmoi
    state: present

- name: Initialize etckeeper (sbom-03)
  ansible.builtin.command:
    cmd: etckeeper init
    creates: /etc/.git

# fix-42: `home/dotfiles` does not exist in Forgejo yet (glue-04 still open) —
# the old task claimed "needs the control-plane SSH key" but the key works fine
# (ansible-pull clones with it nightly); the REPO is what's missing. It masked
# that with failed_when:false and reported a phantom "changed" on every pull
# and in --check (poisoning ansible-site-converged-mini). Probe the repo and
# skip cleanly until it exists; once it does, a real init failure goes RED.
- name: Check the dotfiles repo exists in Forgejo (glue-04 not seeded yet)
  become: false
  ansible.builtin.command:
    cmd: "git ls-remote {{ chezmoi_repo }} HEAD"
  register: dotfiles_repo
  changed_when: false
  failed_when: false
  check_mode: false

- name: Apply dotfiles with chezmoi (glue-04)
  become: false
  when: dotfiles_repo.rc == 0
  ansible.builtin.command:
    cmd: "chezmoi init --apply {{ chezmoi_repo }}"
    creates: "{{ ansible_env.HOME }}/.local/share/chezmoi/.git"
