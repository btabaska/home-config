---
# roles/backup — Restic on a timer (sec-06), driven by the control repo (glue-08).
# The repo URL + password are secrets (SOPS, glue-06). On the on-demand rig the
# timer is WAKE-GATED (wake_gated in group_vars/on_demand.yml) so a sleeping box
# doesn't miss every window.

- name: Install restic (Debian/Ubuntu)
  when: ansible_os_family == 'Debian'
  ansible.builtin.apt:
    name: restic
    state: present
    update_cache: true

- name: Install restic (Arch/CachyOS)
  when: ansible_os_family == 'Archlinux'
  community.general.pacman:
    name: restic
    state: present

- name: Drop the restic environment (repo + password from SOPS)
  ansible.builtin.copy:
    dest: /etc/restic/backup.env
    mode: "0600"
    content: "{{ lookup('community.sops.sops', 'secrets/restic.sops.env', age_keyfile=sops_age_keyfile) }}"

- name: Install the restic-backup service
  ansible.builtin.copy:
    dest: /etc/systemd/system/restic-backup.service
    mode: "0644"
    content: |
      [Unit]
      Description=Restic backup (sec-06)
      [Service]
      Type=oneshot
      EnvironmentFile=/etc/restic/backup.env
      # M-an4: extra_backup_paths defaults (group_vars/all.yml) to
      # "/opt/stacks /var/lib/docker/volumes" so this set matches the restore runbook.
      ExecStart=/usr/bin/restic backup --verbose --exclude-caches /home {{ extra_backup_paths | default('') }}

- name: Install the restic-backup timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/restic-backup.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Schedule restic backup (sec-06)
      [Timer]
      {% if wake_gated | default(false) %}
      # On-demand rig: run shortly after wake, not on a clock it sleeps through.
      OnBootSec=5min
      Persistent=true
      {% else %}
      OnCalendar=*-*-* {{ restic_timer_oncalendar }}:00
      RandomizedDelaySec=20m
      Persistent=true
      {% endif %}
      [Install]
      WantedBy=timers.target

- name: Enable the restic-backup timer
  ansible.builtin.systemd_service:
    name: restic-backup.timer
    enabled: true
    state: started
    daemon_reload: true
