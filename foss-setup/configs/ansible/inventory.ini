; inventory.ini — the homelab fleet (glue-07)
;
; ansible_host values use the ssh-config aliases from net-14 (configs/network/
; ssh-config.example), so connectivity, user, and key all come from ~/.ssh/config.
; Group hosts by OS family so playbooks pick the right package manager.
;
; The on-demand rig (cachyos) must be awake before Ansible can reach it — wake it
; with scripts/gaming/wake-rig.sh (game-08) first, or skip it with --limit.

[debian]
; Ubuntu Server (Mac mini) uses apt. NOTE: the off-site seedbox is deliberately
; NOT here — it's a no-root managed box (see [managed_userspace] below). Putting
; it in [debian] would drag it into [fleet] (site.yml OS roles) AND the root
; `apt upgrade` in playbooks/patch.yml, neither of which it can run.
macmini  ansible_host=mini

[arch]
; CachyOS rig uses pacman. On-demand — wake before running (see above).
cachyos  ansible_host=rig

[fleet:children]
; "fleet" = boxes we own at the OS level. site.yml applies base/docker/tailscale/
; backup/sbom/state to everything in here, so ONLY root-capable hosts belong.
debian
arch

; --- managed user-space-only hosts (M-an5) -------------------------------------
; The Bytesized seedbox is a NO-ROOT MANAGED box: we control only its user-space
; (rootless Docker, userspace Tailscale, seedbox-sync), NEVER its OS. It is kept
; OUT of [fleet] (and out of [debian]/[always_on]/[docker_hosts]) on purpose so
; the OS-level roles in site.yml and the root `apt upgrade`/reboot push playbooks
; never target it. It's listed here only so it stays addressable for ad-hoc,
; user-space tasks over the tailnet — run those with `--limit managed_userspace`.
[managed_userspace]
seedbox  ansible_host=seedbox

; --- power tiers (glue-08): used by site.yml roles + group_vars/ ---
; always_on converge on a clock; on_demand (the rig) is wake-gated so a sleeping
; box doesn't miss every window (group_vars/on_demand.yml).
[always_on]
macmini

[on_demand]
cachyos

; docker_hosts gets the docker role (engine + edge network + log caps). The
; seedbox is managed/jailed — we touch only its user-space, not its OS Docker.
; cachyos is here because the rig's Docker runs the LLM stack — without it the
; sec-02 log caps never reached the rig's daemon.json.
[docker_hosts]
macmini
cachyos

; Notes:
; - The NAS (DSM) and Home Assistant (HAOS) are intentionally NOT managed by
;   Ansible — they're appliance-like and locked down. Patch them via their own
;   UIs (DSM Update & Restore; HA Supervisor), per sec-05 / ssh-maintenance-access.md.
