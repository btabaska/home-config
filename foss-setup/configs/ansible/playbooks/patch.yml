---
# patch.yml — apply OS security/package updates across the fleet (glue-07)
#
# The MANUAL fleet lever. It does NOT replace per-host unattended-upgrades
# (sec-05) — that keeps each box current on its own; this is for pushing a
# deliberate update everywhere at once.
#
# Dry run first:
#   ansible-playbook -i inventory.ini playbooks/patch.yml --check
# Then for real:
#   ansible-playbook -i inventory.ini playbooks/patch.yml
#
# Wake the on-demand rig first (game-08) or skip it: --limit '!cachyos'

# Targets [debian] = Mac mini only. The no-root managed seedbox is intentionally
# NOT in [debian]/[fleet] (see inventory.ini, M-an5), so it never gets root apt.
- name: Update Debian/Ubuntu hosts (Mac mini)
  hosts: debian
  become: true
  serial: 1                      # one host at a time — never patch the whole fleet at once
  tasks:
    - name: apt update + safe upgrade (security + normal)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        upgrade: safe
      register: apt_result

    - name: Report whether a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Notice
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}: apt changed={{ apt_result.changed }};
          reboot_required={{ reboot_required.stat.exists }}
          (run playbooks/reboot.yml when convenient)

- name: Update Arch/CachyOS hosts (rig)
  hosts: arch
  become: true
  serial: 1
  tasks:
    - name: Full system upgrade (pacman -Syu)
      community.general.pacman:
        update_cache: true
        upgrade: true
      register: pacman_result

    - name: Notice
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: pacman changed={{ pacman_result.changed }}"
