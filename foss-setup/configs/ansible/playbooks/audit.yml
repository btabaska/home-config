---
# audit.yml — collect package/version drift across the fleet (glue-07)
#
# Read-only. Gathers each host's explicitly-installed package list, kernel, and
# pending-update count into ./audit/<host>.txt so you can diff against the
# sbom-04 manifests committed under hosts/<box>/ in the control repo.
#
#   ansible-playbook -i inventory.ini playbooks/audit.yml
#   # then: diff audit/macmini.txt ../../hosts/macmini/pkglist.apt-manual.txt
#
# The continuous SBOM/CVE view (Dependency-Track, sbom-01/02) was retired
# 2026-07-11; this is the quick "what differs from what I committed" spot check.

- name: Audit Debian/Ubuntu hosts
  hosts: debian
  gather_facts: true
  tasks:
    - name: Collect manually-installed packages + pending updates
      ansible.builtin.shell: |
        set -o pipefail
        echo "# host: {{ inventory_hostname }}  kernel: $(uname -r)"
        echo "# generated: $(date -u +%FT%TZ)"
        echo "## apt: upgradable"
        apt list --upgradable 2>/dev/null | grep -v '^Listing' || true
        echo "## apt: manually installed"
        apt-mark showmanual | sort
      args:
        executable: /bin/bash
      changed_when: false
      register: deb_audit

    - name: Write report
      ansible.builtin.copy:
        content: "{{ deb_audit.stdout }}\n"
        dest: "./audit/{{ inventory_hostname }}.txt"
      delegate_to: localhost

- name: Audit Arch/CachyOS hosts
  hosts: arch
  gather_facts: true
  tasks:
    - name: Collect explicit packages (native + AUR) + pending updates
      ansible.builtin.shell: |
        set -o pipefail
        echo "# host: {{ inventory_hostname }}  kernel: $(uname -r)"
        echo "# generated: $(date -u +%FT%TZ)"
        echo "## pacman: updates available (-Qu)"
        checkupdates 2>/dev/null || pacman -Qu 2>/dev/null || true
        echo "## pacman: explicit native"
        pacman -Qqen | sort
        echo "## pacman: explicit foreign/AUR"
        pacman -Qqem | sort
      args:
        executable: /bin/bash
      changed_when: false
      register: arch_audit

    - name: Write report
      ansible.builtin.copy:
        content: "{{ arch_audit.stdout }}\n"
        dest: "./audit/{{ inventory_hostname }}.txt"
      delegate_to: localhost
