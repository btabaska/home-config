# Nextcloud — EVAL deployment on the rig (cloud.tabaska.us). Added 2026-07-22 (cloud-01).
#
# DELIBERATELY self-contained (own bridge network + NAMED volumes, no host bind mounts,
# not on the shared `edge` net) so the whole eval tears down in two commands:
#   ssh rig 'cd /opt/stacks/nextcloud && docker compose down -v'
#   ssh rig 'rm -rf /opt/stacks/nextcloud'
# (then drop the mini Caddy vhost + homepage tile + vault block — see README.md / cloud-10).
#
# HTTPS terminates on the Mac-mini Caddy: cloud.{$DOMAIN} -> {$RIG_IP}:11000. This stack
# publishes ONE plain-HTTP port (11000). Nextcloud is told it is behind that proxy via the
# OVERWRITE*/TRUSTED_PROXIES env below, so it emits https:// URLs and trusts the mini.
#
# Secrets come from ./.env (gitignored, chmod 600) sourced from the vault `nextcloud.*` keys.
# This is an EVAL — hardening / monitoring / backups / plugins are the cloud-03..cloud-10
# follow-up tasks. Do NOT treat as production yet.

services:
  db:
    image: mariadb:lts
    container_name: nextcloud-db
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_AUTO_UPGRADE: "1"
      TZ: America/New_York
    volumes:
      - nextcloud_db:/var/lib/mysql
    networks:
      - nextcloud
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 5s
      retries: 20

  redis:
    image: redis:alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: America/New_York
    networks:
      - nextcloud
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 20

  app:
    image: nextcloud:apache
    container_name: nextcloud
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "11000:80"
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_HOST_PORT: "6379"
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      # cloud.tabaska.us for the proxied hostname; the LAN IP so the homepage
      # siteMonitor (http://192.168.10.12:11000) isn't rejected as untrusted.
      NEXTCLOUD_TRUSTED_DOMAINS: "cloud.tabaska.us 192.168.10.12"
      # The mini's LAN IP is what Nextcloud sees as the client (Caddy SNATs to host).
      TRUSTED_PROXIES: "192.168.10.2"
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: cloud.tabaska.us
      OVERWRITECLIURL: https://cloud.tabaska.us
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 2G
      TZ: America/New_York
    volumes:
      - nextcloud_app:/var/www/html
      - nextcloud_data:/var/www/html/data
    networks:
      - nextcloud

networks:
  nextcloud:

volumes:
  nextcloud_app:
  nextcloud_db:
  nextcloud_data:
