# Rig journald retention floor — quality-gate L7 (2026-07-19).
#
# The rig's persistent journal history was found truncated to ~2 boots at the
# 2026-07-16 audit (and further reduced since — that history is gone for good).
# This box has NVMe/PCIe crash history (fix-20), so forensic journal depth
# matters here more than anywhere else in the fleet.
#
# Sorts AFTER the fleet-wide 10-size-cap.conf (fix-31, deployed by
# configs/host/common/journald/apply-journald-cap.sh), so for any key set in
# both files this one wins. SystemMaxUse stays at the fleet's 1G cap;
# MaxRetentionSec=3month adds an explicit time-based retention target so
# journals are kept ~a quarter back (within the 1G budget) instead of being
# vacuumed opportunistically.
#
# Deploy (rig only — NOT deployed by ansible; no role owns journald):
#   ssh rig 'sudo tee /etc/systemd/journald.conf.d/50-retention.conf' \
#     < foss-setup/configs/host/rig/journald/50-retention.conf
#   ssh rig 'sudo systemctl restart systemd-journald'
[Journal]
SystemMaxUse=1G
MaxRetentionSec=3month
