# Immich remote machine-learning — GPU offload to the rig (RTX 3090 Ti, 24 GB).
#
# WHY: the Immich SERVER runs on the NAS (192.168.10.4) and its ML inference was
# pinned to the DS920+ Intel J4125 iGPU (OpenVINO) — the weakest link in the photo
# pipeline. This container runs the SAME models on the rig's CUDA GPU and the NAS
# server routes ML to it via its machineLearning.urls list (rig PRIMARY, the NAS's
# local OpenVINO container = automatic fallback via Immich availabilityChecks).
#
# Deployed live at /opt/stacks/immich-ml/ on rig; mirror of this dir. Managed by
# `docker compose` (btabaska is in the docker group — no sudo). restart=unless-stopped
# so it survives the rig's 24/7 (suspend-masked) reboots.
#
# ── ANTI-DRIFT (critical) ────────────────────────────────────────────────────
# IMMICH_VERSION MUST equal the NAS immich-server version EXACTLY. A mismatched
# ML/server version breaks the ML API. NAS pins the version in
# foss-setup/configs/nas/immich/.env  → bump BOTH in the same change. A verification
# check (immich-ml-rig) alerts on version skew and on the server dropping the rig URL.
#
# ── SECURITY ─────────────────────────────────────────────────────────────────
# The ML endpoint is UNAUTHENTICATED and receives plaintext image previews. Keep it
# on the trusted LAN only: it is published to the rig's LAN IP (not 0.0.0.0, not the
# tailnet) and a ufw rule allows only the NAS. NB: Docker's published-port DNAT sits
# ahead of ufw's INPUT filtering, so the ufw rule documents intent; true single-host
# scoping would need a DOCKER-USER rule. LAN-wide exposure matches the rig's existing
# ollama (11434) posture and is acceptable on this trusted /24.
name: immich-ml

services:
  immich-machine-learning:
    container_name: immich_machine_learning
    # -cuda variant for the NVIDIA RTX 3090 Ti. Tag tracks IMMICH_VERSION (no float).
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:?set IMMICH_VERSION in .env}-cuda
    environment:
      # REQUIRED: the -cuda base image defaults to an ASCII locale. Without this,
      # Python's open() reads the SigLIP2 tokenizer config as ascii and dies with
      # UnicodeDecodeError when loading the TEXTUAL model — text queries then
      # silently fall back to the NAS ML (visual/indexing still works, so /ping is
      # green but text search is broken). Force UTF-8 for file I/O + locale libs.
      - PYTHONUTF8=1
      - LC_ALL=C.UTF-8
      - LANG=C.UTF-8
    volumes:
      # Named volume: models (CLIP ViT-B-16-SigLIP2__webli, buffalo_l, PP-OCRv5)
      # download here on first use. ~1-3 GB — persist it or every recreate re-downloads.
      - model-cache:/cache
    restart: unless-stopped
    ports:
      # Bind to the LAN IP only. The NAS immich-server reaches this at :3003.
      - '192.168.10.12:3003:3003'
    devices:
      # CDI GPU passthrough — matches the rig AI stack convention (comfyui, llama-swap).
      # The rig has NO nvidia docker runtime; CDI (/etc/cdi/nvidia.yaml, generated by
      # nvidia-ctk) is the only GPU path, so the `deploy.reservations` form does NOT work.
      - nvidia.com/gpu=all
    healthcheck:
      # Use the image's built-in /ping healthcheck.
      disable: false

volumes:
  model-cache:
