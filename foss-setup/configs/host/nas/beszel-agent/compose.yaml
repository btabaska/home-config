# Beszel agent (WebSocket mode) — dials the hub on the mini, no inbound port needed.
# .env (NOT committed): BESZEL_HUB_URL, BESZEL_AGENT_TOKEN (vault: beszel.agent_token_nas),
#                       BESZEL_AGENT_KEY (hub public key).
services:
  beszel-agent:
    image: henrygd/beszel-agent:0.18.7
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./beszel_agent_data:/var/lib/beszel-agent
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: "45876"
      HUB_URL: ${BESZEL_HUB_URL}
      TOKEN: ${BESZEL_AGENT_TOKEN}
      KEY: ${BESZEL_AGENT_KEY}
