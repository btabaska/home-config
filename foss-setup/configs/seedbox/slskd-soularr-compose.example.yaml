# slskd + Soularr — Soulseek-powered music acquisition glued to Lidarr
# Phase 2. Docs: slskd    https://github.com/slskd/slskd
#                Soularr  https://github.com/mrusse/soularr
#
# RUNS ON THE SEEDBOX, next to Lidarr (see lidarr-slskd-soularr.md). Soulseek is a
# P2P network, so the daemon must be where the *arrs and the shared data tree live.
#   - slskd   : self-hosted Soulseek daemon + web UI (search/download the network)
#   - soularr : reads Lidarr's "Wanted" list, searches slskd, downloads matches,
#               and triggers Lidarr to import them. Runs on a cron-like interval.
#
# Both share ONE downloads dir so Soularr/Lidarr see the same files slskd writes.
#
# DEPLOYMENT (M-ma1): slskd + Soularr are NOT in Bytesized's one-click catalog.
# Deploy them yourself via the plan's rootless Docker (no root needed). A provider
# with neither a one-click nor Docker for these would require a root-capable/VPS tier.
#
# Copy to docker-compose.yml on the seedbox, fill the .env values, then:
#   docker compose up -d   # rootless Docker — no sudo needed on the managed box

services:
  slskd:
    image: slskd/slskd:0.25.1
    container_name: slskd
    restart: unless-stopped
    user: ${PUID:-1000}:${PGID:-1000}
    ports:
      - "5030:5030"   # web UI / API
      - "50300:50300" # Soulseek listening port (forward/allow this for better sources)
    environment:
      - TZ=${TZ:-America/New_York}
      - SLSKD_REMOTE_CONFIGURATION=true
      # Soulseek account credentials (free; register in the app or at slsknet.org).
      - SLSKD_SLSK_USERNAME=${SLSKD_SLSK_USERNAME}
      - SLSKD_SLSK_PASSWORD=${SLSKD_SLSK_PASSWORD}
      # Web UI login (Soularr authenticates to slskd with these / an API key).
      - SLSKD_USERNAME=${SLSKD_WEB_USERNAME:-slskd}
      - SLSKD_PASSWORD=${SLSKD_WEB_PASSWORD}
    volumes:
      - ./slskd:/app                          # slskd config + state
      - ${MUSIC_DOWNLOADS:-./downloads}:/downloads  # SHARED with soularr below
    networks:
      - default

  soularr:
    # ghcr tags are unprefixed (1.2.2, NOT v1.2.2 — that tag does not exist).
    image: ghcr.io/mrusse/soularr:1.2.2
    container_name: soularr
    restart: unless-stopped
    depends_on:
      - slskd
    user: ${PUID:-1000}:${PGID:-1000}
    environment:
      - TZ=${TZ:-America/New_York}
      # How often (seconds) Soularr re-checks Lidarr's wanted list and searches.
      - SCRIPT_INTERVAL=${SOULARR_INTERVAL:-300}
    volumes:
      # config.ini lives here (set Lidarr URL+API key and slskd URL+API key in it).
      - ./soularr:/data
      # MUST match slskd's /downloads so Soularr finds what slskd downloaded.
      - ${MUSIC_DOWNLOADS:-./downloads}:/downloads
    networks:
      - default
