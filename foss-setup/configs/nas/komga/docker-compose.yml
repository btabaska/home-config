# Komga — comics + manga reader (read-17)
# Role : self-hosted comics/manga library server on the NAS (Synology DS920+, 192.168.10.4).
#        Native ComicInfo.xml, OPDS, huge client ecosystem (Mihon/Tachiyomi, Panels, Paperback, KOReader).
# Docs : https://komga.org/docs/  •  https://github.com/gotson/komga
# WHY  : gives the manually-acquired comics (IPT/GetComics CBZ packs) a real reader with
#        cross-device progress + OPDS; the Manga/ subtree is the drop target read-18 (Suwayomi) fills.
# Libraries (created via API): Comics -> /data/Comics (/data = /volume1/comics),
#        Manga -> /manga (/manga = the dedicated DSM shared folder /volume1/manga).
#        The Manga tree is its OWN DSM shared folder (read-18) so the rig's Suwayomi can
#        CIFS-mount it RW and drop grabbed CBZ where Komga scans; /volume1/comics is a plain
#        (non-SMB) dir, hence the split. Config + SQLite DB live in /volume1/docker/komga/config.
# To upgrade: bump the tag+digest below, then
#        ssh -t nas 'cd /volume1/docker/komga && sudo /usr/local/bin/docker compose pull && sudo /usr/local/bin/docker compose up -d'
name: komga
services:
  komga:
    image: gotson/komga:1.25.0@sha256:c4f9885fc077e2e9cd684dc95e8f6cfa5e33b100b46712b2de7f5cc2ff59e6fb   # digest-pinned (fix-38/I68 supply-chain posture); pulled on the NAS 2026-07-23
    container_name: komga
    user: "1026:100"                     # btabaska:users — matches NAS volume ownership, non-root (Komga's default port 25600 is >1024 so binds fine)
    environment:
      - TZ=America/New_York
      - JAVA_TOOL_OPTIONS=-Xmx1g         # cap the JVM heap ~1G on the shared 19G NAS (task pitfall); bump if the library grows large
    volumes:
      - /volume1/docker/komga/config:/config   # Komga SQLite DB + generated thumbnails
      - /volume1/comics:/data                  # Comics library root (manual CBZ packs)
      - /volume1/manga:/manga                  # Manga library root — dedicated DSM share, Suwayomi (rig, read-18) writes here over SMB
    ports:
      - '25600:25600'
    restart: always
