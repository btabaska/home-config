# Immich on Synology DS920+ (Container Manager / Docker Compose)
#
# Source of truth (use the compose of the CURRENT release, not main):
#   https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
#   Install guide:   https://docs.immich.app/install/docker-compose
#   HW transcoding:  https://docs.immich.app/features/hardware-transcoding
#
# PINNED to Immich v2.7.5 (set IMMICH_VERSION in .env). The DB and Redis/Valkey
# images are pinned by digest below to match that release exactly.
#
# DS920+ note: the Celeron J4125 has Intel Quick Sync (UHD 600). Quick Sync video
# transcoding and OpenVINO ML acceleration are enabled by passing /dev/dri into
# the server and machine-learning containers. Confirm /dev/dri exists on the host
# (ls -l /dev/dri) before deploying; if it is missing, remove the `devices:` blocks.

name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # Quick Sync (Intel) transcoding, inlined instead of using `extends:` so this
    # works in Synology Container Manager (single-file deploys). After deploy, set
    # Admin > Settings > Video Transcoding > Hardware Acceleration = Quick Sync.
    devices:
      - /dev/dri:/dev/dri
    volumes:
      # Do not edit the next line. Change the media storage path via UPLOAD_LOCATION in .env
      - ${UPLOAD_LOCATION}:/data
      # OPTIONAL read-only external library (existing Synology photo share). Uncomment + adjust.
      # - /volume1/photo:/usr/src/app/external/photo:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    # OpenVINO image variant enables Intel iGPU inference on the J4125 Quick Sync GPU.
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-openvino
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    # Pinned by digest to match the v2.7.5 release compose.
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    # VectorChord Postgres image, pinned by digest (matches v2.7.5 release compose).
    # Do NOT use a generic `release` tag here: Postgres major upgrades are not automatic.
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # DS920+ stores the DB on spinning disks (Btrfs volume), not SSD: tell Postgres so.
      DB_STORAGE_TYPE: 'HDD'
    volumes:
      # Do not edit the next line. Change the DB storage path via DB_DATA_LOCATION in .env
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

volumes:
  model-cache:
