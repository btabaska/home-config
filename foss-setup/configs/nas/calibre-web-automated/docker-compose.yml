# Calibre-Web-Automated (CWA) on Synology DS920+ (Container Manager / Docker Compose)
#
# IMAGE DECISION (June 2026): upstream crocodilestick/calibre-web-automated on Docker
# Hub stops at v4.0.6. CVE-2026-7713 (Kobo auth-token IDOR) is fixed in v4.0.7,
# published only on the community fork Calibre-Web-NextGen:
#   https://github.com/new-usemame/Calibre-Web-NextGen/releases/tag/v4.0.7
# Drop-in replacement — same /config, /calibre-library, /cwa-book-ingest mounts.
#
# To upgrade: bump the tag below, read release notes, then:
#   ssh -t nas 'cd /volume1/docker/calibre-web-automated && sudo /usr/local/bin/docker compose pull && sudo /usr/local/bin/docker compose up -d'
#
# SECURITY: keep CWA LAN/Tailscale-only (no public :8083). With v4.0.7+, Kobo sync
# and KOSync are safe to enable when you wire read-06.

name: calibre-web-automated

services:
  calibre-web-automated:
    image: ghcr.io/new-usemame/calibre-web-nextgen:v4.0.7   # CVE-2026-7713 fixed; not on Docker Hub crocodilestick repo
    container_name: calibre-web-automated
    environment:
      # PUID/PGID must match the Synology user that owns the volume paths below.
      # Find them via SSH: `id btabaska`  (DSM users are often 1026/100, etc.)
      - PUID=1026
      - PGID=100
      - TZ=America/New_York
      # Synology shared folders are typically SMB/NFS-backed; polling avoids missed inotify events.
      - NETWORK_SHARE_MODE=true
    volumes:
      # Persistent app config + the CWA SQLite app DB (Tier 1: small, back this up).
      - /volume1/docker/calibre-web-automated/config:/config
      - /volume1/docker/calibre-web-automated/ingest:/cwa-book-ingest
      - /volume1/books:/calibre-library
    ports:
      - '8083:8083'
    restart: unless-stopped
