# Calibre-Web-Automated (CWA) on Synology DS920+ (Container Manager / Docker Compose)
#
# Project (the actively-developed fork): https://github.com/crocodilestick/Calibre-Web-Automated
# Reference compose:                     https://github.com/crocodilestick/Calibre-Web-Automated/blob/main/docker-compose.yml
# Image tags:                            https://hub.docker.com/r/crocodilestick/calibre-web-automated/tags
#
# PINNED to v4.0.6 (latest tagged release as of writing). To upgrade, bump the tag,
# read the release notes, then `docker compose pull && docker compose up -d`.
#
# SECURITY (load-bearing until a patched image ships): CVE-2026-7713 is a Kobo
# auth-token IDOR/bypass in cps/kobo_auth.py affecting CWA up to and including
# v4.0.6 (fixed upstream in 4.0.7, commit 9f50bb2). As of writing, v4.0.6 AND
# :latest are still the vulnerable builds — v4.0.7 is not published on Docker Hub.
# Until a patched stable tag lands: do NOT expose CWA to the internet (LAN/VPN only,
# behind reverse-proxy auth); disable Kobo sync if you are not actively using it;
# re-check https://hub.docker.com/r/crocodilestick/calibre-web-automated/tags before
# every deploy and bump the pin the moment v4.0.7+ appears.

name: calibre-web-automated

services:
  calibre-web-automated:
    image: crocodilestick/calibre-web-automated:v4.0.6
    container_name: calibre-web-automated
    environment:
      # PUID/PGID must match the Synology user that owns the volume paths below.
      # Find them via SSH: `id your_user`  (DSM admin users are often 1026/100, etc.)
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      # Default listen port inside the container; only change if you also change the mapping.
      # - CWA_PORT_OVERRIDE=8083
      # Synology shared folders are typically SMB/NFS-backed; polling avoids missed inotify events.
      - NETWORK_SHARE_MODE=true
    volumes:
      # Persistent app config + the CWA SQLite app DB (Tier 1: small, back this up).
      - /volume1/docker/calibre-web-automated/config:/config
      - /volume1/docker/calibre-web-automated/ingest:/cwa-book-ingest
      - /volume1/books:/calibre-library
    ports:
      - '8083:8083'
    restart: unless-stopped
