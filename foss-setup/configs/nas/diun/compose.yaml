# Diun on the NAS — watches NAS containers for image updates (notify-only).
# Companion to mini's Diun (which only sees mini's docker socket).
# Publishes to ntfy on mini over LAN http (internal-CA https would fail Go TLS).
services:
  diun:
    image: crazymax/diun:4.33.0
    container_name: diun
    command: serve
    restart: unless-stopped
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=America/New_York
      - LOG_LEVEL=info
      - DIUN_WATCH_WORKERS=6
      - DIUN_WATCH_SCHEDULE=30 6 * * * # daily 06:30 (mini's Diun runs 06:00)
      - DIUN_WATCH_JITTER=30s
      - DIUN_PROVIDERS_DOCKER=true
      - DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT=true
      - DIUN_NOTIF_NTFY_ENDPOINT=http://192.168.10.2:8080
      - DIUN_NOTIF_NTFY_TOPIC=diun
      - DIUN_NOTIF_NTFY_TOKEN=${DIUN_NTFY_TOKEN}
      - DIUN_NOTIF_NTFY_PRIORITY=3
