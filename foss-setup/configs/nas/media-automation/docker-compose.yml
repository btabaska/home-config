# ==============================================================================
# Home media-automation stack — Synology DS920+ (Container Manager / Compose)
# ==============================================================================
# Phase 2. This is the FULL home *arr stack. It runs on the NAS (DS920+),
# co-located with libraries split across three Basic volumes (Vol1 TV, Vol2
# Movies, Vol3 Music + CWA ingest). Plex, the iPod pipeline, and CWA read from
# those paths. The off-site seedbox "Betty" (Bytesized AppBox, 185.162.184.38)
# runs ONLY Deluge + slskd (Soulseek, native binary — not rootless Docker) — P2P
# stays off-site. Nothing else is added to the seedbox beyond those two download
# daemons.
#
# HOW THE TWO HALVES CONNECT
#   - Home apps reach remote Deluge over its API via the TAILNET
#     (host 100.119.134.94:5945 — fix-21: Deluge binds loopback on Betty, the
#     public IP exposes nothing; needs NAS Tailscale TUN mode, configs/nas/tailscale/).
#   - Home apps READ completed downloads through an rclone SFTP mount of the
#     seedbox `files/` folder (see ../../../scripts/media/rclone-seedbox-mount.sh):
#         seedbox:/home/hd34/btabaska/files  ->  /volume1/mounts/seedbox-files
#   - Each *arr's Completed Download Handling works via a Remote Path Mapping:
#         remote /home/hd34/btabaska/files/  ->  local /seedbox/
#     so the path Deluge reports resolves to the rclone mount inside the
#     container. (Set the mapping per-*arr in the UI — see README.md §7.)
#
# ------------------------------------------------------------------------------
# SHARED INVARIANTS (change-one-change-all — a self-check must verify these)
# ------------------------------------------------------------------------------
#   1. Every DOWNLOAD-TOUCHING service (sonarr, radarr, lidarr, readarr,
#      whisparr, unpackerr) mounts the seedbox files at the IDENTICAL in-container
#      path `/seedbox`. If you change the host mount path or container path, change
#      it in ALL of them at once.
#   2. DSM + rclone FUSE cannot satisfy Docker's :rslave propagation (kernel
#      rejects shared/slave on fuse.rclone). Use a plain bind here; after a
#      watchdog remount, restart download-touching containers (watchdog does this).
#   3. Identical PUID/PGID across all services (TODO: fill from `id <user>` on
#      the NAS), TZ=America/New_York, restart: always, and /config on
#      ${DOCKER_ROOT}/<app> (default /volume1/docker/<app>).
#
# ------------------------------------------------------------------------------
# PINNED IMAGE TAGS (verified current as of June 2026 — never :latest/:develop)
# ------------------------------------------------------------------------------
#   sonarr          lscr.io/linuxserver/sonarr:4.0.19          (Sonarr 4.0.19.2979)
#   radarr          lscr.io/linuxserver/radarr:6.2.1           (Radarr 6.2.1.10461)
#   prowlarr        lscr.io/linuxserver/prowlarr:2.4.0         (Prowlarr 2.4.0.5391)
#   lidarr          lscr.io/linuxserver/lidarr:3.1.0           (stable; bare 3.1.2 tag does not exist)
#   readarr         docker.io/linuxserver/readarr:develop-0.4.18.2805-ls157  (EOL; pinned tag only on Docker Hub — removed from lscr.io/ghcr)
#   rreading-glasses blampe/rreading-glasses@sha256:<digest>   (rolling tag -> pin by digest)
#   postgres        postgres:17.6
#   unpackerr       golift/unpackerr:0.15.2
#   flaresolverr    ghcr.io/flaresolverr/flaresolverr:v3.5.0
# To upgrade any image: bump the tag, read release notes, then
#   docker compose pull && docker compose up -d
#
# ------------------------------------------------------------------------------
# RAM-PHASED ROLLOUT (DS920+ ships 4 GB; recommended 20 GB. Bring up in order.)
# Full checklist is in README.md and the living guide. You can bring services up
# incrementally with `docker compose up -d <service>`:
#   Phase A (core):     prowlarr flaresolverr sonarr radarr
#   Phase B (extend):   lidarr  +  readarr + rreading-glasses + rreading-glasses-db
#   Phase C (polish):   unpackerr
#   Phase D (Soulseek): soularr  (requires slskd on Betty — seed-09)
#   Phase E (optional): beets    (tag-only; schedule beet write via DSM cron)
#   Phase F (adult):    whisparr (seed-13; feeds the existing Stash library)
# ==============================================================================

name: media-automation

# ------------------------------------------------------------------------------
# YAML anchors keep the shared invariants literally identical across services.
# Edit the anchor once; every service that references it updates together.
# ------------------------------------------------------------------------------
x-common-env: &common-env
  # TODO: set PUID/PGID to the Synology user that OWNS ${DOCKER_ROOT} and the
  # library shares — find them via SSH: `id <user>` (DSM users are often
  # 1026/100, etc.). MUST be identical across every service below.
  PUID: ${PUID:?run 'id <user>' on the NAS and set PUID in .env}
  PGID: ${PGID:?run 'id <user>' on the NAS and set PGID in .env}
  TZ: ${TZ:-America/New_York}

# Host paths — set in .env (see nas-storage-schema.md three-volume layout).

x-seedbox-mount: &seedbox-mount
  type: bind
  source: ${SEEDBOX_MOUNT:-/volume1/mounts/seedbox-files}
  target: /seedbox
  # No propagation: rslave — DSM fuse.rclone cannot be shared/slave; plain bind only.

services:

  # ----------------------------------------------------------------------------
  # Prowlarr — indexer manager (Phase A). NOT download-touching: no /seedbox.
  # Pushes indexers to sonarr/radarr/lidarr/readarr. Music + book acquisition
  # each need a CAPABLE indexer added here (see README §4/§5).
  # ----------------------------------------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.4.0   # Prowlarr 2.4.0.5391 (stable, May 2026)
    container_name: prowlarr
    environment: *common-env
    volumes:
      - ${DOCKER_ROOT:-/volume1/docker}/prowlarr/config:/config
    ports:
      - "9696:9696"
    restart: always

  # ----------------------------------------------------------------------------
  # FlareSolverr — Cloudflare solver for Prowlarr (Phase A). Stateless, no mounts.
  # ----------------------------------------------------------------------------
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0   # FlareSolverr v3.5.0 (May 2026)
    container_name: flaresolverr
    environment:
      LOG_LEVEL: info
      TZ: ${TZ:-America/New_York}
    ports:
      - "8191:8191"   # add to Prowlarr as a FlareSolverr proxy: http://flaresolverr:8191
    restart: always

  # ----------------------------------------------------------------------------
  # Sonarr — TV (Phase A). DOWNLOAD-TOUCHING -> /seedbox:rslave.
  # Root folder: /tv (Volume 1). Download client: remote Deluge (label `sonarr`).
  # ----------------------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.19   # Sonarr 4.0.19.2979 (Jun 2026)
    container_name: sonarr
    environment: *common-env
    volumes:
      - ${DOCKER_ROOT:-/volume1/docker}/sonarr/config:/config
      - ${TV_LIBRARY:-/volume3/tv}:/tv
      - *seedbox-mount
    ports:
      - "8989:8989"
    restart: always

  # ----------------------------------------------------------------------------
  # Radarr — Movies (Phase A). DOWNLOAD-TOUCHING -> /seedbox:rslave.
  # Root folder: /movies (Volume 2). Download client: remote Deluge (label `radarr`).
  # ----------------------------------------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:6.2.1   # Radarr 6.2.1.10461 (stable, Jun 2026)
    container_name: radarr
    environment: *common-env
    volumes:
      - ${DOCKER_ROOT:-/volume1/docker}/radarr/config:/config
      - ${MOVIES_LIBRARY:-/volume2/movies}:/movies
      - *seedbox-mount
    ports:
      - "7878:7878"
    restart: always

  # ----------------------------------------------------------------------------
  # Lidarr — Music (Phase B). Root folder: /music (Volume 1).
  # Dual acquisition: torrents via Deluge (/seedbox/music) + Soulseek via Soularr
  # (/seedbox/slskd). beets (Phase E) is tag-only — see README §4.
  # NOTE: /music is consumed by Plex AND Rhythmbox/libgpod iPod sync (README §4).
  # ----------------------------------------------------------------------------
  lidarr:
    image: lscr.io/linuxserver/lidarr:3.1.0   # stable 3.1.x (3.1.2 bare tag never published; alt: develop-3.1.2.4938-ls249)
    container_name: lidarr
    environment: *common-env
    volumes:
      - ${DOCKER_ROOT:-/volume1/docker}/lidarr/config:/config
      - ${MUSIC_LIBRARY:-/volume1/music}:/music
      - *seedbox-mount
    ports:
      - "8686:8686"
    restart: always

  # ----------------------------------------------------------------------------
  # Soularr — Soulseek bridge (Phase D). Reads Lidarr Wanted; drives remote slskd
  # on Betty over Tailscale. Downloads land in files/slskd/ on Betty → Lidarr
  # imports from /seedbox/slskd/. Config: soularr/config.ini (see config.ini.example).
  # ----------------------------------------------------------------------------
  soularr:
    image: ghcr.io/mrusse/soularr:1.2.2
    container_name: soularr
    restart: always
    depends_on:
      - lidarr
    user: ${PUID:?set PUID in .env}:${PGID:?set PGID in .env}
    environment:
      TZ: ${TZ:-America/New_York}
      SCRIPT_INTERVAL: ${SOULARR_INTERVAL:-300}
    volumes:
      - ${DOCKER_ROOT:-/volume1/docker}/soularr:/data
      - *seedbox-mount
    # No host port — headless cron-like bridge.

  # ----------------------------------------------------------------------------
  # beets — tag-only metadata layer (Phase E, optional). Lidarr owns layout.
  # Not started by default; run on demand or via DSM Task Scheduler:
  #   docker compose run --rm beets beet write
  # Web UI on :8337 if you `docker compose up -d beets` for manual review.
  # ----------------------------------------------------------------------------
  beets:
    image: lscr.io/linuxserver/beets:2.1.0
    container_name: beets
    environment: *common-env
    volumes:
      - ${DOCKER_ROOT:-/volume1/docker}/beets:/config
      - ${MUSIC_LIBRARY:-/volume1/music}:/music
    ports:
      - "8337:8337"
    profiles:
      - music-tags
    restart: always

  # ----------------------------------------------------------------------------
  # Readarr — Books (Phase B). DOWNLOAD-TOUCHING -> /seedbox:rslave.
  # Download client: remote Deluge (label `readarr` -> seedbox files/books).
  # IMPORT TARGET = permanent inventory at /readarr-library (host: READARR_LIBRARY).
  # A Connect custom script copies each import to /cwa-book-ingest for CWA; Readarr
  # keeps its file for inventory tracking (ebook-mgmt workstream — README §5).
  # Set Readarr's ROOT FOLDER to /readarr-library, NOT /cwa-book-ingest.
  #
  # METADATA: point Readarr's metadata provider at the SELF-HOSTED
  # rreading-glasses below (http://rreading-glasses:8788), NOT a public instance.
  #
  # EOL NOTE: the original Readarr project is retired (metadata service dead).
  # We pin the FINAL immutable LinuxServer build (develop-0.4.18.2805-ls157) —
  # this is a specific build number, NOT the floating `develop` tag. It works
  # fine once its metadata provider points at rreading-glasses (Goodreads
  # upstream is fully backward-compatible with existing Readarr DBs/images).
  # Maintained community forks exist if you'd rather migrate later:
  #   ghcr.io/pennydreadful/bookshelf  and  ghcr.io/faustvii/readarr
  # ----------------------------------------------------------------------------
  readarr:
    image: docker.io/linuxserver/readarr:develop-0.4.18.2805-ls157   # EOL final LS build — pinned tag on Docker Hub only (lscr.io removed June 2025)
    container_name: readarr
    environment: *common-env
    volumes:
      - ${DOCKER_ROOT:-/volume1/docker}/readarr/config:/config
      - ${READARR_LIBRARY:-/volume1/docker/readarr/library}:/readarr-library
      - ${CWA_INGEST:-/volume1/docker/calibre-web-automated/ingest}:/cwa-book-ingest
      - ${DOCKER_ROOT:-/volume1/docker}/readarr/scripts:/scripts:ro
      - *seedbox-mount
    ports:
      - "8787:8787"
    restart: always
    depends_on:
      - rreading-glasses

  # ----------------------------------------------------------------------------
  # rreading-glasses — self-hosted Readarr metadata provider (Phase B).
  # Canonical compose: github.com/blampe/rreading-glasses (docker-compose-gr.yml).
  # Goodreads upstream = backward-compatible with existing Readarr installs.
  # Point Readarr at http://rreading-glasses:8788 in Settings > Development
  # (Metadata Provider Source) — that page is hidden; browse to it directly.
  #
  # PINNING: this project publishes NO semver releases — only the rolling tags
  # `latest` (Goodreads) and `hardcover`. To honor "never :latest", pin by
  # IMMUTABLE DIGEST. Refresh the digest deliberately when you choose to update:
  #   docker buildx imagetools inspect blampe/rreading-glasses:latest
  # PINNING: refresh deliberately when Goodreads auth breaks — `docker buildx imagetools inspect blampe/rreading-glasses:latest`
  # Verified amd64 index digest 2026-06-28 (replaces sha256:8d5062e2… which 400s on credential generation).
  rreading-glasses:
    image: blampe/rreading-glasses@sha256:dd996a1db19ac4ef18df47f1671f608c0f097ed43c4776ebde94dee20c6b43c8
    container_name: rreading-glasses
    hostname: rreading-glasses
    entrypoint: ["/main", "serve"]
    command:
      - --upstream=www.goodreads.com
      - --verbose
      - --postgres-host=rreading-glasses-db
      - --postgres-user=${RG_DB_USER:-rreading-glasses}
      - --postgres-password=${RG_DB_PASSWORD:?set RG_DB_PASSWORD in .env (no special symbols)}
      - --postgres-database=${RG_DB_NAME:-rreading-glasses}
    mem_limit: 128m   # uses all available RAM for cache; cap it (upstream guidance)
    ports:
      - "8788:8788"
    restart: always
    depends_on:
      rreading-glasses-db:
        condition: service_healthy

  rreading-glasses-db:
    image: postgres:17.6   # any version works; pin a specific 17.x minor (verify latest)
    container_name: rreading-glasses-db
    environment:
      POSTGRES_USER: ${RG_DB_USER:-rreading-glasses}
      POSTGRES_PASSWORD: ${RG_DB_PASSWORD:?set RG_DB_PASSWORD in .env}
      POSTGRES_DB: ${RG_DB_NAME:-rreading-glasses}
    volumes:
      - ${DOCKER_ROOT:-/volume1/docker}/rreading-glasses/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rreading-glasses -d rreading-glasses"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: always
    # No host port published — only rreading-glasses needs it, on the compose net.

  # ----------------------------------------------------------------------------
  # Unpackerr — extracts multi-part archives so the *arrs can import (Phase C).
  # DOWNLOAD-TOUCHING -> /seedbox:rslave at the SAME path as the *arrs, with NO
  # separate mapping: it acts on the path each *arr reports AFTER that *arr's
  # Remote Path Mapping (i.e. /seedbox/...). Config in ./unpackerr/unpackerr.conf
  # (fill the TODO url/api_key per app). delete_after removes extracted files so
  # they don't linger on the seedbox.
  # ----------------------------------------------------------------------------
  unpackerr:
    image: golift/unpackerr:0.15.2   # Unpackerr 0.15.2
    container_name: unpackerr
    user: ${PUID:?set PUID in .env}:${PGID:?set PGID in .env}
    environment:
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./unpackerr/unpackerr.conf:/etc/unpackerr/unpackerr.conf:ro
      - *seedbox-mount                 # /seedbox (rslave) — MUST match the *arrs exactly
    restart: always
    # Liveness for the "process up but poller WEDGED" class (2026-07-10:
    # unpackerr ran 2 days doing nothing while "Up", invisible to container-
    # liveness monitoring). Probes unpackerr's own webserver (enabled in
    # unpackerr.conf [webserver]); a fully-wedged process stops answering ->
    # container goes "unhealthy" -> the fleet HEALTH check (containers-health-
    # nas) pages. `wget` ships in the image. Pairs with the media.yaml
    # *-queue-stuck checks, which catch the user-visible symptom tool-agnostically.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T5 -O /dev/null http://localhost:5656/metrics || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      - sonarr
      - radarr
      - lidarr
      - readarr

  # ----------------------------------------------------------------------------
  # Whisparr v2 — adult scene automation (seed-13). DOWNLOAD-TOUCHING -> /seedbox.
  # IMAGE: not a LinuxServer image — LSIO does not publish Whisparr; hotio's is the
  # canonical, well-maintained one. Pinned by DIGEST (hotio 'latest' tracks the v2
  # release channel = github.com/hotio/whisparr/tree/v2). Digest below = version
  # 2.2.0-release.108 (pulled 2026-07-14). hotio honors the same PUID/PGID/TZ.
  #   Refresh deliberately: docker buildx imagetools inspect ghcr.io/hotio/whisparr:latest
  #
  # ROOT FOLDER = /data, bound to the Stash library subfolder
  # ${WHISPARR_LIBRARY:-/volume1/stash/root/whisparr}. Whisparr only sees its own
  # subfolder (isolated from the 557 GB hand-curated pile at /volume1/stash/root),
  # and Stash indexes new scenes on its next scan of that library path.
  #
  # DOWNLOAD CLIENT: remote Deluge on Betty via tailnet (100.119.134.94:5945, fix-21) — SAME client and
  # Remote Path Mapping (/home/hd34/btabaska/files/ -> /seedbox/) as radarr; set in
  # the Whisparr UI/API, not here. INDEXERS: Prowlarr fullSyncs ONLY its adult-capable
  # indexers here (XXX-category match; live sync landed BitPorn + IPTorrents) — Prowlarr gates app sync on category
  # match — private-only, no public indexers (respects the seed-11 decision).
  #
  # AUTO-INDEX: a Whisparr Connect (Custom Script) fires on import and runs
  # /config/stash-scan.sh (repo copy: ./whisparr/stash-scan.sh) which POSTs a
  # Stash metadataScan of /data/whisparr so new scenes index automatically.
  # Whisparr auth = Forms (set post-deploy; API key unaffected).
  # ----------------------------------------------------------------------------
  whisparr:
    image: ghcr.io/hotio/whisparr@sha256:dfa198dc37a89f9f6b7a0fad39e66cfaa1153659a80e22fd9d9475b8b08bcac5   # v2 (2.2.0-release.108)
    container_name: whisparr
    environment: *common-env
    volumes:
      - ${DOCKER_ROOT:-/volume1/docker}/whisparr/config:/config
      - ${WHISPARR_LIBRARY:-/volume1/stash/root/whisparr}:/data
      - *seedbox-mount
    ports:
      - "6969:6969"
    restart: always

# A single user-defined default network is created automatically by Compose;
# every service resolves the others by name (e.g. http://flaresolverr:8191,
# http://rreading-glasses:8788). Remote Deluge is reached by its public IP.
