# ==============================================================================
# unpackerr.conf — auto-extract multi-part archives for the home *arr stack
# ==============================================================================
# Runs on the NAS in the media-automation stack (NOT on the seedbox).
# Docs: https://unpackerr.zip/docs/  | config ref: https://unpackerr.zip/docs/install/configuration
#
# WHY THIS IS HERE (not on the seedbox): the *arrs run at home now; the seedbox
# runs ONLY Deluge. Some releases arrive as multi-part RAR/ZIP that the *arrs
# can't import until extracted. Unpackerr watches each *arr's queue over its API
# and extracts finished archives.
#
# CRITICAL — PATHS MUST MATCH THE *ARRS (post-mapping):
#   Unpackerr acts on the path each *arr REPORTS, which is already the *arr's
#   Remote-Path-Mapped path: /home/hd34/btabaska/files/ -> /seedbox/. So
#   Unpackerr must see /seedbox at the SAME in-container path as the *arrs, with
#   NO mapping of its own. The compose mounts /seedbox:rslave identically here.
#
# CRITICAL — SEEDING SAFETY:
#   delete_orig = false EVERYWHERE. The original archive lives on the seedbox
#   (reached through the rclone mount) and is being SEEDED. Deleting it would
#   break seeding. We only clean up the EXTRACTED files, after the *arr imports
#   them, via delete_delay — that is the "delete_after" so extracted files do
#   not linger on the seedbox.
# ==============================================================================

# --- global ------------------------------------------------------------------
debug        = false
interval     = "2m"     # how often to poll the *arr queues
start_delay  = "1m"     # wait after a download finishes before extracting
retry_delay  = "5m"
parallel     = 1        # one extraction at a time (gentle on the SFTP mount)

# --- Sonarr ------------------------------------------------------------------
[[sonarr]]
  url          = "http://sonarr:8989"   # in-compose DNS name
  api_key      = "TODO_SONARR_API_KEY"  # Sonarr -> Settings -> General
  paths        = ['/seedbox/tv']        # must match the path Sonarr reports (post-mapping); use '/seedbox' if unsure
  protocols    = "torrent"
  delete_orig  = false                  # NEVER delete originals — they keep seeding
  delete_delay = "10m"                  # remove EXTRACTED files 10m after import

# --- Radarr ------------------------------------------------------------------
[[radarr]]
  url          = "http://radarr:7878"
  api_key      = "TODO_RADARR_API_KEY"  # Radarr -> Settings -> General
  paths        = ['/seedbox/movies']
  protocols    = "torrent"
  delete_orig  = false
  delete_delay = "10m"

# --- Lidarr ------------------------------------------------------------------
[[lidarr]]
  url          = "http://lidarr:8686"
  api_key      = "TODO_LIDARR_API_KEY"  # Lidarr -> Settings -> General
  paths        = ['/seedbox/music']
  protocols    = "torrent"
