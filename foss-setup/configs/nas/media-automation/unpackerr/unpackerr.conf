# --- Whisparr (adult; seed-13) -----------------------------------------------
# Added 2026-07-17 for fix-27 / finding M27: whisparr is download-touching and
# uses the same Deluge client + /seedbox mount as the others, but had no block,
# so any rar'd scene grab would stall as an un-extracted stuck import (invisible
# to monitors). Queue is empty today; this closes the gap before it bites.
[[whisparr]]
  url          = "http://whisparr:6969"  # in-compose DNS name (Whisparr v2 API)
  api_key      = "ffa708068d354043be79329b3526aa0e"  # Whisparr -> Settings -> General
  paths        = ['/seedbox']            # whisparr downloads land under /seedbox; broadest safe match (queue empty, exact subpath unknown)
  protocols    = "torrent"
  delete_orig  = false                   # NEVER delete originals — they keep seeding
  delete_delay = "10m"                   # remove EXTRACTED files 10m after import
